tem 2 tool \u2014 it forces the slow, deliberate, analytical mode onto decisions that System 1 would otherwise shortcut through emotional or heuristic processing."}, {"source": 114, "target": 115, "relationship": "extends", "description": "The SCQA Framework is a specific narrative structure for building the setup that leads to BLUF's conclusion-first delivery \u2014 SCQA answers 'how do I set up the pyramid?'"}, {"source": 116, "target": 117, "relationship": "complements", "description": "Monroe's Motivated Sequence provides the temporal structure (Attention \u2192 Action) while the Rhetorical Triangle provides the three persuasive channels \u2014 together they cover both the order and the modes of persuasion."}, {"source": 133, "target": 134, "relationship": "sequence", "description": "Cialdini developed both: Pre-Suasion is his later discovery that what happens before the influence attempt matters as much as the 7 Principles during it \u2014 they are sequentially integrated."}, {"source": 132, "target": 29, "relationship": "complements", "description": "Steel-Manning builds the best counter-argument for personal reasoning; Inoculation Theory uses weakened counter-arguments to pre-emptively protect audiences against persuasion \u2014 both work by engaging opposing arguments before the critical moment."}, {"source": 129, "target": 128, "relationship": "complements", "description": "BATNA/ZOPA define the positional parameters of a negotiation; Principled Negotiation provides the process for expanding the pie within those parameters by focusing on interests rather than positions."}, {"source": 130, "target": 113, "relationship": "complements", "description": "Both frameworks center on surfacing needs and emotions beneath stated positions \u2014 NVC uses a four-part structure for collaborative contexts; Tactical Empathy uses mirroring and labeling for adversarial ones."}, {"source": 131, "target": 149, "relationship": "alternative", "description": "These are the same phenomenon in different domains: Anchoring Effect (cognitive-bias) is the descriptive observation; Anchoring (negotiation) is the prescriptive exploitation of that bias to gain advantage."}, {"source": 122, "target": 136, "relationship": "complements", "description": "The Johari Window shows what information is hidden between self and others; Psychological Safety is the team condition that makes it safe to expand the Open quadrant by reducing Hidden and Blind areas."}, {"source": 137, "target": 112, "relationship": "complements", "description": "Radical Candor defines the management philosophy (care personally + challenge directly); SBI provides the tactical communication structure for delivering that challenging feedback without judgment."}, {"source": 139, "target": 136, "relationship": "extends", "description": "The Five Dysfunctions pyramid's base (Absence of Trust) is precisely what Psychological Safety addresses \u2014 Edmondson's research on safety operationalizes and measures what Lencioni diagnoses narratively."}, {"source": 142, "target": 189, "relationship": "complements", "description": "ZPD defines the learning zone relative to capability; Situational Leadership maps management style to that same capability-commitment matrix, applying ZPD principles to leadership."}, {"source": 138, "target": 136, "relationship": "extends", "description": "SCARF provides the neurological mechanism for why Psychological Safety matters \u2014 the Status, Certainty, Autonomy, Relatedness, and Fairness domains are the specific threat triggers that Psychological Safety neutralizes."}, {"source": 135, "target": 137, "relationship": "complements", "description": "The Trust Equation makes Self-Orientation the dominant denominator (high self-orientation destroys trust); Radical Candor's 'care personally' dimension is the behavioral expression of low self-orientation."}, {"source": 123, "target": 113, "relationship": "complements", "description": "TA diagnoses ego-state mismatches that cause communication breakdowns; NVC provides the language pattern that moves both parties toward the Adult-Adult transaction TA identifies as productive."}, {"source": 225, "target": 226, "relationship": "contains", "description": "Bottleneck Analysis is the analytical step within TOC's five focusing steps \u2014 TOC is the complete management philosophy; Bottleneck Analysis is the identification phase."}, {"source": 234, "target": 225, "relationship": "contains", "description": "Drum-Buffer-Rope is the scheduling algorithm derived from TOC \u2014 it operationalizes the constraint-focus principle into production planning rules."}, {"source": 227, "target": 225, "relationship": "complements", "description": "CPM identifies the longest chain of task dependencies; TOC identifies the binding capacity constraint \u2014 in projects (Critical Chain), the combination protects the critical path with buffer management."}, {"source": 236, "target": 225, "relationship": "complements", "description": "Kanban's WIP limits are a practical implementation of TOC's principle of subordinating everything to the constraint \u2014 limiting work-in-progress prevents building inventory ahead of bottlenecks."}, {"source": 237, "target": 222, "relationship": "complements", "description": "Agile/Scrum provides the team process and cadence (sprints, ceremonies); Build-Measure-Learn provides the learning philosophy that should guide what gets built in each sprint."}, {"source": 213, "target": 214, "relationship": "complements", "description": "The North Star Metric is the ultimate direction; OKRs cascade that direction into quarterly objectives with measurable results \u2014 the North Star prevents OKRs from optimizing locally at the expense of the overall mission."}, {"source": 215, "target": 216, "relationship": "complements", "description": "Porter's Five Forces systematically maps the external competitive environment (informing the Opportunities and Threats quadrants); SWOT then combines that external view with internal Strengths and Weaknesses."}, {"source": 216, "target": 232, "relationship": "complements", "description": "PESTLE provides structured macro-environmental scanning that populates the Opportunities and Threats cells of SWOT \u2014 PESTLE is the analytical input; SWOT is the strategic synthesis."}, {"source": 217, "target": 215, "relationship": "complements", "description": "Porter's Five Forces analyzes competitive intensity within an industry; Blue Ocean Strategy prescribes creating new market space where those five forces are irrelevant \u2014 it is a strategic response to unattractive Five Forces analysis."}, {"source": 241, "target": 242, "relationship": "complements", "description": "Disruption Theory explains the incumbent's strategic failure to respond; the Chasm model explains the innovator's execution challenge \u2014 together they map both sides of a market disruption."}, {"source": 229, "target": 233, "relationship": "extends", "description": "Wardley Mapping adds evolutionary maturity as a second dimension to Value Chain Analysis \u2014 it asks not just 'what creates value?' but 'how mature is each component and where is it heading?'"}, {"source": 218, "target": 230, "relationship": "complements", "description": "The BCG Matrix diagnoses the current portfolio; the Ansoff Matrix prescribes growth vectors \u2014 together they answer 'what do we have?' and 'where should we go?'"}, {"source": 220, "target": 221, "relationship": "sequence", "description": "The Lean Canvas is the hypothesis document that specifies what the MVP should test \u2014 you identify the riskiest assumption in the canvas, then build the MVP to validate it."}, {"source": 219, "target": 220, "relationship": "complements", "description": "JTBD provides the deep customer motivation insight that should anchor the Problem and Customer Segments boxes of the Lean Canvas \u2014 it ensures the canvas reflects real demand."}, {"source": 231, "target": 81, "relationship": "complements", "description": "Conway's Law predicts that systems mirror organizational communication structures (a subset of 7S); McKinsey 7S provides the full map of organizational elements that must align \u2014 Structure, Systems, Staff, Style, Skills, Strategy, Shared Values."}, {"source": 93, "target": 246, "relationship": "complements", "description": "Platform Business Models are the organizational structure designed to capture Network Effects \u2014 the platform exists specifically to aggregate users whose interactions create the compounding value described by Metcalfe's Law."}, {"source": 94, "target": 93, "relationship": "extends", "description": "Preferential Attachment is the generative mechanism explaining how Network Effects produce winner-take-all hub structures \u2014 it shows why network effects tend toward concentration."}, {"source": 243, "target": 93, "relationship": "contains", "description": "Network Effects are one of the most powerful sources of Competitive Moat \u2014 the self-reinforcing value growth makes the advantage structurally durable against competitors."}, {"source": 243, "target": 102, "relationship": "extends", "description": "Switching costs and lock-in effects are a key category of Competitive Moat \u2014 Path Dependence explains the structural mechanism by which customers cannot easily leave even when alternatives exist."}, {"source": 239, "target": 220, "relationship": "complements", "description": "The Revenue Streams and Cost Structure sections of the Lean Canvas require unit economics analysis \u2014 you cannot validate a business model without understanding per-customer contribution margin."}, {"source": 34, "target": 206, "relationship": "complements", "description": "Parkinson's Law explains why unstructured time gets wasted; Time Blocking is the countermeasure \u2014 assigning specific work to specific hours prevents work from expanding to fill available slack."}, {"source": 210, "target": 211, "relationship": "complements", "description": "Deep Work is the deliberate practice discipline (scheduled blocks, distraction elimination); Flow State is the psychological optimal experience that Deep Work creates conditions for \u2014 one is the discipline, the other is the reward."}, {"source": 204, "target": 211, "relationship": "complements", "description": "The Pomodoro Technique provides time structure that protects against interruption; however, its frequent breaks can disrupt Flow \u2014 skilled practitioners adapt interval length to extend flow states once entered."}, {"source": 207, "target": 8, "relationship": "complements", "description": "The Eisenhower Matrix identifies what is Important but not Urgent (Q2 work); Eat the Frog prescribes doing the most important/dreaded task first \u2014 together they align daily execution with strategic priority."}, {"source": 205, "target": 208, "relationship": "contains", "description": "The Two-Minute Rule is a specific decision rule within GTD's processing step \u2014 if a captured item takes less than two minutes, do it now rather than organizing it into the system."}, {"source": 205, "target": 209, "relationship": "complements", "description": "GTD's context lists (e.g., '@phone', '@computer') are a form of Batching \u2014 grouping similar tasks by context to enable efficient sequential execution."}, {"source": 4, "target": 12, "relationship": "complements", "description": "The Hard Choice Model categorizes by impact \u00d7 comparability; the Type 1/Type 2 framework categorizes by reversibility \u2014 together they create a richer decision-routing system that matches effort to both stakes and reversibility."}, {"source": 27, "target": 32, "relationship": "complements", "description": "The WRAP Framework's 'Widen options' and 'Reality-test assumptions' steps directly target Confirmation Bias \u2014 the framework is essentially a structured debiasing protocol for the four decision biases."}, {"source": 26, "target": 11, "relationship": "alternative", "description": "Both models use temporal distancing to reduce present-emotional bias in decisions \u2014 10-10-10 uses three specific time horizons; Regret Minimization uses a single extreme projection (age 80)."}, {"source": 35, "target": 7, "relationship": "complements", "description": "Scenario Planning generates multiple futures for strategic hedging; Pre-Mortem focuses that same imaginative capacity on a single failure scenario to extract actionable risk mitigations before launch."}, {"source": 35, "target": 5, "relationship": "complements", "description": "Scenario Planning builds narratives of alternative futures; Second-Order Thinking provides the recursive 'and then what?' mechanism for extending those scenarios beyond first-level projections."}, {"source": 51, "target": 37, "relationship": "alternative", "description": "Both tools solve the 'wrong problem' trap by moving to more abstract formulations \u2014 Concept Fan explicitly builds multiple branches at each level; Abstraction Laddering uses a single vertical Why?/How? axis."}, {"source": 52, "target": 38, "relationship": "alternative", "description": "Both are radial visual decomposition tools, but Mind Maps are associative and non-MECE (for exploration), while Issue Trees are logical and strictly MECE (for exhaustive problem-solving)."}, {"source": 197, "target": 187, "relationship": "complements", "description": "Bloom's Taxonomy defines the levels of cognitive engagement with knowledge; Munger's Latticework prescribes building a diverse cross-domain library that can be applied at the synthesis/evaluation levels."}, {"source": 196, "target": 188, "relationship": "alternative", "description": "Both are reflective learning frameworks that move from experience through meaning to action \u2014 What/So What/Now What is a simplified three-step variant of Kolb's four-stage cycle."}, {"source": 17, "target": 21, "relationship": "complements", "description": "First Principles builds up from foundational truths; Occam's Razor prunes back to the simplest sufficient explanation \u2014 together they prevent both under-thinking (accepting convention) and over-engineering (adding unnecessary complexity)."}, {"source": 18, "target": 161, "relationship": "complements", "description": "Fundamental Attribution Error causes us to attribute others' negative behavior to malice or character; Hanlon's Razor is the corrective heuristic \u2014 assume incompetence before malice to avoid that attribution error."}, {"source": 23, "target": 30, "relationship": "extends", "description": "Goodhart's Law is a specific application of Map/Territory confusion: the metric is a map of the underlying reality, and when it becomes a target (is treated as the territory), the map-territory distinction collapses destructively."}, {"source": 82, "target": 84, "relationship": "complements", "description": "Gall's Law prescribes evolutionary design from working simple systems; CAS theory explains why \u2014 complex adaptive systems cannot be designed top-down because their behavior is emergent from component interactions."}, {"source": 83, "target": 84, "relationship": "contains", "description": "Emergence is the defining property of Complex Adaptive Systems \u2014 the system-level behaviors that cannot be predicted from or reduced to the properties of individual components."}, {"source": 107, "target": 84, "relationship": "contains", "description": "Self-Organization is a core mechanism of Complex Adaptive Systems \u2014 ordered structures arise from local agent interactions without central control, which is what makes CAS systems CAS systems."}, {"source": 90, "target": 104, "relationship": "contains", "description": "Chaos Theory is the mathematical study of extreme nonlinear sensitivity to initial conditions \u2014 nonlinearity is the necessary structural property that makes chaotic behavior possible."}, {"source": 91, "target": 90, "relationship": "complements", "description": ip": "alternative", "description": "Both are structured multi-step creative problem-solving processes that alternate divergent and convergent phases \u2014 Productive Thinking Model uses six named steps; CPS uses six distinct stages with different framing."}, {"source": 64, "target": 9, "relationship": "alternative", "description": "Both are structured group decision-making processes that counteract social pressure biases \u2014 Delphi uses iterative anonymous rounds; Six Thinking Hats uses simultaneous parallel perspectives."}, {"source": 63, "target": 129, "relationship": "complements", "description": "The Evaporating Cloud surfaces the hidden assumption behind conflicting requirements; Principled Negotiation uses interests-not-positions thinking to find the same hidden win-win space \u2014 both dissolve apparent conflicts rather than compromise."}, {"source": 145, "target": 121, "relationship": "extends", "description": "SPIN Selling is an application of Socratic questioning in a sales context \u2014 it uses guided questions to help buyers discover their own needs rather than the seller asserting solutions."}, {"source": 146, "target": 120, "relationship": "extends", "description": "Theory U's four listening levels begin at Downloading (the opposite of active listening) and progress through Active Listening toward Generative Listening \u2014 it provides a developmental hierarchy that places Active Listening in a larger framework."}, {"source": 144, "target": 138, "relationship": "complements", "description": "Mendelow's Matrix tells you who to engage and how; SCARF tells you what those stakeholders' neurological threat triggers are \u2014 combining them enables both strategic targeting and emotionally intelligent engagement."}, {"source": 118, "target": 119, "relationship": "alternative", "description": "Both are narrative structure templates \u2014 the Hero's Journey provides a rich twelve-stage arc for complex stories; Story Spine is a minimal fill-in-the-blank template for quick well-formed story generation."}, {"source": 127, "target": 132, "relationship": "complements", "description": "The Overton Window describes the current range of acceptable ideas; Inoculation Theory provides a mechanism for both defending that window against manipulation and deliberately shifting it over time."}, {"source": 167, "target": 180, "relationship": "contains", "description": "The Affect Heuristic is a specific System 1 operation \u2014 emotional state is used as information input to judgment, bypassing the deliberate evidential analysis of System 2."}, {"source": 198, "target": 31, "relationship": "complements", "description": "Base Rate Fallacy describes the cognitive tendency to ignore base rates; Reference Class Forecasting is the structured technique that forces base rate incorporation into estimates."}, {"source": 199, "target": 179, "relationship": "contains", "description": "The Conjunction Fallacy is caused by the Representativeness Heuristic \u2014 the detailed scenario feels more representative of the prototype than the broader category, so it incorrectly seems more probable."}, {"source": 173, "target": 181, "relationship": "complements", "description": "False Consensus overestimates how many people share your views; Ingroup Bias shows you also favor those who do share your views \u2014 together they create echo chambers where your group seems like the rational majority."}, {"source": 178, "target": 165, "relationship": "extends", "description": "Availability Cascade is a societal-scale amplification of the Illusory Truth Effect \u2014 repeated public discussion makes ideas feel truer (Illusory Truth), and that perceived truth further amplifies discussion in a cascade."}, {"source": 155, "target": 117, "relationship": "complements", "description": "The Peak-End Rule shows that endings disproportionately shape memory of an experience; Monroe's Motivated Sequence ends with an Action step designed to be a strong, memorable close \u2014 leveraging peak-end dynamics."}, {"source": 170, "target": 205, "relationship": "complements", "description": "The Zeigarnik Effect explains why incomplete tasks occupy mental bandwidth (open loops); GTD's external capture system closes those loops, eliminating the cognitive load the Zeigarnik Effect predicts."}, {"source": 169, "target": 153, "relationship": "extends", "description": "The IKEA Effect is an extension of the Endowment Effect \u2014 we over-value things we own, and even more so things we partially built ourselves, because the construction effort amplifies the ownership sense."}, {"source": 172, "target": 114, "relationship": "complements", "description": "The Serial Position Effect shows primacy and recency dominate memory; BLUF exploits the primacy effect by placing the conclusion first \u2014 the most important information occupies the strongest memory position."}, {"source": 174, "target": 33, "relationship": "extends", "description": "Loss Aversion is a specific domain application of the broader Negativity Bias \u2014 the general asymmetric weighting of negative over positive stimuli manifests in economic contexts as the ~2:1 loss/gain sensitivity ratio."}, {"source": 175, "target": 164, "relationship": "extends", "description": "Planning Fallacy is the project/time-estimate manifestation of the broader Optimism Bias \u2014 the same unrealistic positive expectations that make us believe we're less likely to experience bad events also make us underestimate project duration."}, {"source": 177, "target": 133, "relationship": "complements", "description": "Mere Exposure Effect increases liking through repetition \u2014 this is the psychological mechanism underlying Cialdini's Liking principle when applied to repeated brand/message contact."}, {"source": 168, "target": 182, "relationship": "complements", "description": "Curse of Knowledge makes experts unable to communicate simply; Feynman Technique is the practice that forces experts to confront that curse by requiring plain-language explanation to an imagined novice."}, {"source": 200, "target": 163, "relationship": "alternative", "description": "Both are errors about random sequences \u2014 Gambler's Fallacy expects reversion after a streak (the sequence is 'due'); Hot-Hand Fallacy expects continuation of a streak (momentum is 'real') \u2014 opposite errors from the same misunderstanding of independence."}, {"source": 203, "target": 205, "relationship": "complements", "description": "Google Effect shows we fail to encode externally-stored information; GTD exploits this intentionally \u2014 by externalizing commitments, it frees cognitive RAM, treating the system as intended cognitive offloading rather than memory failure."}, {"source": 201, "target": 26, "relationship": "complements", "description": "Impact Bias causes us to overestimate how intensely future events will affect us; 10-10-10 corrects this by revealing that at 10 years, even major decisions lose their emotional charge \u2014 reducing fear-based inaction."}, {"source": 202, "target": 2, "relationship": "complements", "description": "Plan Continuation Bias causes dangerous persistence with original plans despite new disconfirming information; the OODA Loop's Observe-Orient cycle is a structural forcing function for continuous re-assessment that combats this bias."}, {"source": 166, "target": 132, "relationship": "complements", "description": "Backfire Effect shows that direct counter-evidence can entrench beliefs; Inoculation Theory sidesteps this by pre-exposing people to weakened arguments before they form strong attachments \u2014 avoiding the defensive entrenchment."}, {"source": 176, "target": 116, "relationship": "complements", "description": "Ethos (credibility) is the persuasive channel that exploits Authority Bias \u2014 establishing speaker authority activates the cognitive shortcut that makes people defer to credible sources."}, {"source": 154, "target": 133, "relationship": "contains", "description": "The Bandwagon Effect is the cognitive mechanism underlying Cialdini's Social Proof principle \u2014 we adopt beliefs/behaviors because others do, especially under uncertainty."}, {"source": 158, "target": 20, "relationship": "complements", "description": "Recency Bias over-weights recent observations; Bayesian Updating corrects this by weighting new evidence proportionally to its likelihood ratio, preventing any single recent observation from dominating the posterior."}, {"source": 156, "target": 161, "relationship": "complements", "description": "Halo Effect generalizes positive traits across unrelated dimensions; Fundamental Attribution Error attributes those traits to stable character rather than situation \u2014 together they produce systematically biased person-assessments."}, {"source": 165, "target": 127, "relationship": "extends", "description": "Availability Cascades are a mechanism for shifting the Overton Window \u2014 repeated public discussion makes previously extreme ideas feel normal and mainstream, expanding the window of acceptable discourse."}, {"source": 245, "target": 25, "relationship": "complements", "description": "The Pareto Principle shows that 20% of inputs drive 80% of outputs; the Law of Diminishing Returns explains why \u2014 each additional unit of input yields less than the previous, making the first inputs disproportionately valuable."}, {"source": 235, "target": 22, "relationship": "extends", "description": "The Hedgehog Concept (passion + best-at + economic engine) is an organizational version of Circle of Competence \u2014 it defines the intersection where an organization has genuine, defensible expertise worth concentrating on."}, {"source": 214, "target": 30, "relationship": "complements", "description": "North Star Metric deliberately selects a metric that best captures customer value rather than a narrow business output \u2014 it is an attempt to choose a measure resistant to Goodhart's Law by anchoring on genuine value creation."}, {"source": 60, "target": 38, "relationship": "extends", "description": "Issue Trees formalize Problem Decomposition by adding the MECE constraint \u2014 Problem Decomposition is the general act; Issue Trees are the structured, logically rigorous methodology for doing it correctly."}, {"source": 59, "target": 6, "relationship": "extends", "description": "Working Backwards is constructive Inversion \u2014 instead of asking 'what causes failure?', you ask 'what defines success?' and reason back. Both start from an end state and work backward to present conditions."}, {"source": 10, "target": 129, "relationship": "complements", "description": "The Veil of Ignorance helps design fair rules by removing positional self-interest; Principled Negotiation achieves similar fairness in live negotiations by using objective criteria rather than positional bargaining."}, {"source": 42, "target": 55, "relationship": "complements", "description": "TRIZ identifies 40 inventive principles for resolving engineering contradictions \u2014 many of those principles involve specific forms of constraint relaxation, segmentation, or dimension change."}, {"source": 195, "target": 210, "relationship": "complements", "description": "Deep Work creates conditions for sustained focused thinking; Focused vs. Diffuse Thinking shows that deliberately alternating with relaxed diffuse states (walks, sleep) produces better insights than unbroken focus \u2014 the two are compatible at different timescales."}, {"source": 191, "target": 185, "relationship": "complements", "description": "Learning Pyramid shows that active/teaching methods produce highest retention; Deliberate Practice is the methodology that operates at those highest-retention levels through feedback-driven challenge."}, {"source": 34, "target": 204, "relationship": "complements", "description": "Parkinson's Law explains why tasks expand to fill available time; Pomodoro Technique counters this by imposing artificial time constraints (25-minute sprints) that compress work into focused units."}, {"source": 124, "target": 112, "relationship": "alternative", "description": "Both are assertive communication scripts for delivering feedback or addressing conflict without triggering defensiveness \u2014 DESC covers Describe/Express/Specify/Consequences; SBI covers Situation/Behavior/Impact with different framing."}, {"source": 125, "target": 113, "relationship": "contains", "description": "I-Messages are the communication form that NVC operationalizes \u2014 NVC provides the full framework (observation, feeling, need, request) of which I-Messages are the feeling-expression component."}, {"source": 143, "target": 122, "relationship": "complements", "description": "Authentic Leadership requires deep self-knowledge and transparent values; the Johari Window is a tool for developing that self-awareness and reducing the Hidden and Unknown quadrants through feedback and disclosure."}, {"source": 140, "target": 136, "relationship": "complements", "description": "Servant Leadership puts followers' needs first; this creates the caring environment that is a precondition for Psychological Safety \u2014 leaders who are seen as servants rather than threats make it safe to speak up."}, {"source": 141, "target": 186, "relationship": "complements", "description": "Transformational Leadership's Intellectual Stimulation and Individualized Consideration dimensions directly cultivate Growth Mindset in followers \u2014 the leader creates the conditions for belief in developable capability."}, {"source": 235, "target": 215, "relationship": "complements", "description": "Porter's Five Forces identifies where industry profit is defensible from outside forces; the Hedgehog Concept identifies where organizational capability is genuinely world-class \u2014 combining them finds the intersection of structural advantage and internal excellence."}, {"source": 103, "target": 97, "relationship": "complements", "description": "Panarchy describes how systems cycle through adaptive phases including collapse; Hysteresis explains why systems don't simply return to their prior state after disturbance \u2014 the path through the \u03a9 phase determines the \u03b1 reorganization outcome."}, {"source": 95, "target": 65, "relationship": "extends", "description": "The Tipping Point is the moment when a Reinforcing Feedback Loop crosses a threshold and takes over \u2014 the shift from slow growth to exponential expansion as the loop's gain exceeds 1."}, {"source": 74, "target": 101, "relationship": "complements", "description": "Both describe failures where individually rational behavior produces collective harm \u2014 Tragedy of the Commons in resource depletion; Braess's Paradox in network routing. Together they illustrate that rational self-interest can systematically degrade shared systems."}, {"source": 109, "target": 77, "relationship": "complements", "description": "The Drifting Goals archetype explains the systemic mechanism of standard erosion; the Boiling Frog metaphor explains why humans fail to notice and respond \u2014 gradual change falls below the threshold of conscious detection."}, {"source": 3, "target": 0, "relationship": "sequence", "description": "Cynefin classifies the domain first; only in Complicated/Clear domains does a weighted Decision Matrix apply \u2014 applying it in Complex domains produces false precision."}, {"source": 3, "target": 2, "relationship": "sequence", "description": "Cynefin's Chaotic domain prescribes act-first; OODA is the correct loop for chaotic, time-pressured situations where sensing precedes analysis."}, {"source": 50, "target": 69, "relationship": "sequence", "description": "Root Cause Analysis surfaces the true cause; Leverage Points identifies at which level of the system intervening on that cause will actually change behavior."}, {"source": 70, "target": 68, "relationship": "sequence", "description": "Iceberg surfaces the structural layer beneath events; CLD makes those structures explicit by mapping the feedback loops that generate the patterns."}, {"source": 40, "target": 41, "relationship": "complements", "description": "Five Whys traces one causal chain vertically; Fishbone expands horizontally across all causal categories \u2014 together they prevent premature fixation on a single root cause."}, {"source": 6, "target": 7, "relationship": "extends", "description": "Inversion is the abstract principle (ask what causes failure); Pre-Mortem is the structured team ritual that operationalizes inversion before a project launches."}, {"source": 7, "target": 0, "relationship": "sequence", "description": "Pre-Mortem generates the failure modes and risk factors that should become weighted criteria in a Decision Matrix evaluation of alternatives."}, {"source": 5, "target": 35, "relationship": "sequence", "description": "Second-Order Thinking asks 'and then what?' on a single path; Scenario Planning fans those second-order branches into coherent alternative futures for structured stress-testing."}, {"source": 56, "target": 21, "relationship": "sequence", "description": "Reframing shifts the problem statement; First Principles then decomposes the new framing to bedrock truths \u2014 preventing reframing from landing on an equally flawed problem."}, {"source": 37, "target": 219, "relationship": "extends", "description": "Abstraction Laddering moves up the purpose hierarchy; Jobs to Be Done is the product-specific instantiation of that upward move \u2014 asking what job the customer is actually hiring the product to do."}, {"source": 48, "target": 58, "relationship": "contains", "description": "Divergent/Convergent is the meta-principle; Brainstorming, SCAMPER, and Reverse Brainstorming are specific techniques for the divergent phase before convergence tools (Decision Matrix, MECE) apply."}, {"source": 73, "target": 50, "relationship": "sequence", "description": "Recognizing a Shifting the Burden dynamic diagnoses the pattern; Root Cause Analysis is the corrective \u2014 find and fix the fundamental solution the symptomatic fix is bypassing."}, {"source": 30, "target": 214, "relationship": "opposes", "description": "Goodhart's Law warns that any single metric becomes corrupted when used as a target; North Star Metric deliberately picks one number to optimize \u2014 the tension requires North Star to be defined at the level of genuine customer value, not a proxy."}, {"source": 225, "target": 226, "relationship": "contains", "description": "Theory of Constraints is the complete management philosophy (including Drum-Buffer-Rope, exploit/elevate sequence); Bottleneck Analysis is the diagnostic step within it that finds which single constraint is binding."}, {"source": 65, "target": 223, "relationship": "extends", "description": "Reinforcing Feedback Loop is the systems-thinking concept; Flywheel Effect is its strategic application \u2014 deliberately designing a business model whose growth creates the conditions for more growth."}, {"source": 95, "target": 96, "relationship": "sequence", "description": "The Tipping Point marks the threshold at which adoption becomes self-sustaining; on the S-curve it corresponds to the inflection between early-majority uptake and mainstream acceleration."}, {"source": 20, "target": 19, "relationship": "extends", "description": "Probabilistic Thinking is the disposition to hold multiple outcomes with assigned likelihoods; Bayesian Updating is the formal mechanism for revising those likelihoods as new evidence arrives."}, {"source": 114, "target": 115, "relationship": "alternative", "description": "Both are top-down communication structures; Minto is best for recommendations and reports (answer first, then evidence); SCQA is best for narrative problem-framing where the audience needs context before the answer lands."}, {"source": 136, "target": 137, "relationship": "sequence", "description": "Psychological Safety is the precondition \u2014 without it, Radical Candor's direct feedback triggers threat responses. Safety must exist before candid challenge becomes productive rather than punishing."}, {"source": 137, "target": 139, "relationship": "sequence", "description": "Radical Candor directly addresses Dysfunction 2 (Fear of Conflict) and Dysfunction 3 (Lack of Commitment) by creating a culture of productive direct challenge."}, {"source": 190, "target": 186, "relationship": "complements", "description": "Growth Mindset is the motivational belief that effort improves ability; Double-Loop Learning is the cognitive process that makes that improvement systematic \u2014 questioning the assumptions behind the action, not just the action itself."}, {"source": 185, "target": 189, "relationship": "sequence", "description": "ZPD defines where learning happens (just beyond current ability with guidance); Deliberate Practice specifies how to practice within that zone \u2014 targeted, feedback-rich, weakness-focused sessions."}, {"source": 25, "target": 1, "relationship": "sequence", "description": "Pareto identifies that a vital few inputs dominate outputs; the Impact-Effort Matrix operationalizes this by visually mapping which initiatives are the vital few (high impact, low effort)."}, {"source": 241, "target": 219, "relationship": "complements", "description": "Disruption Theory explains how new entrants beat incumbents structurally; JTBD explains why customers switch \u2014 together they diagnose both the competitive mechanism and the customer motivation driving disruption."}, {"source": 197, "target": 3, "relationship": "sequence", "description": "Munger's Latticework is the meta-recommendation to build a diverse model library; Cynefin is the most important single node in that lattice \u2014 the routing model that tells you which other model to apply in a given context."}, {"source": 228, "target": 190, "relationship": "sequence", "description": "PDCA is single-loop \u2014 it improves execution within existing assumptions. When PDCA cycles fail to converge on improvement, Double-Loop Learning is the escalation: question the plan's underlying assumptions, not just the execution."}, {"source": 224, "target": 185, "relationship": "complements", "description": "Compounding explains why small consistent skill gains accumulate to massive long-term advantage; Deliberate Practice is the operational mechanism \u2014 it ensures each session produces genuine skill increment rather than plateauing repetition."}, {"source": 102, "target": 12, "relationship": "complements", "description": "Path Dependence explains the systemic mechanism by which early choices constrain later ones; Type 1/Type 2 is the decision-time heuristic that prompts extra rigor on precisely those early choices before lock-in sets in."}, {"source": 147, "target": 31, "relationship": "complements", "description": "Survivorship Bias explains why success stories mislead; Reference Class Forecasting corrects this by anchoring estimates on the full distribution of similar past attempts \u2014 including failures \u2014 not only the visible winners."}, {"source": 88, "target": 16, "relationship": "sequence", "description": "Black Swan establishes that extreme rare events dominate outcomes and are unpredictable; Margin of Safety is the practical design response \u2014 build buffers large enough to survive events your models did not anticipate."}, {"source": 215, "target": 217, "relationship": "sequence", "description": "Porter's Five Forces analyzes the existing competitive structure; Blue Ocean Strategy prescribes a response when that analysis reveals all five forces are strongly unfavorable \u2014 make the competitive map irrelevant by creating uncontested space."}, {"source": 149, "target": 131, "relationship": "extends", "description": "Anchoring Effect is the cognitive bias description (first number disproportionately skews judgment); Anchoring in negotiation is the deliberate weaponization of that bias to set the reference point advantageously."}, {"source": 159, "target": 134, "relationship": "extends", "description": "Framing Effect is the cognitive bias (same information presented differently changes choices); Pre-Suasion extends this into a proactive influence strategy \u2014 shape what people attend to before they encounter the message."}, {"source": 108, "target": 111, "relationship": "sequence", "description": "Collective Action Problem diagnoses why shared resources get destroyed by rational individual behavior; Ostrom's Design Principles provide the empirically-validated governance architecture that solves it without privatization or state control."}, {"source": 85, "target": 46, "relationship": "sequence", "description": "Wicked Problems identifies the class of problems with no definitive formulation \u2014 exactly the class for which Design Thinking's empathy-first, iterative, prototype-and-test approach is prescribed over analytical decomposition."}, {"source": 39, "target": 38, "relationship": "contains", "description": "MECE is the quality criterion (no overlaps, no gaps); Issue Trees are the structural form that satisfies it \u2014 every branch of an issue tree must be MECE with its siblings at that level."}, {"source": 32, "target": 29, "relationship": "sequence", "description": "Confirmation Bias is the failure mode (seeking only confirming evidence); Steel-Manning is the deliberate corrective discipline \u2014 construct the strongest opposing argument before deciding, forcing genuine engagement with disconfirming views."}, {"source": 72, "target": 230, "relationship": "sequence", "description": "Limits to Growth Archetype predicts that a reinforcing loop will be stopped by a constraint; Ansoff Matrix provides the strategic options (market development, product development, diversification) for growth when the current market loop hits its ceiling."}, {"source": 148, "target": 22, "relationship": "complements", "description": "Dunning-Kruger describes the failure mode \u2014 incompetent people cannot recognize their incompetence; Circle of Competence is the structural remedy \u2014 explicitly map your domain edge so you know when you're outside it before the consequences arrive."}]</script>
<script>
"use strict";
var nodes=JSON.parse(document.getElementById("jn").textContent);
var links=JSON.parse(document.getElementById("jl").textContent);
var CL={"decision-making": "Decision Making", "problem-solving": "Problem Solving", "systems-thinking": "Systems Thinking", "communication": "Communication", "creativity": "Creativity", "strategic-thinking": "Strategic Thinking", "learning": "Learning", "cognitive-bias": "Cognitive Bias", "productivity": "Productivity", "leadership": "Leadership", "negotiation": "Negotiation"};
var CC={"decision-making": "#4a90d9", "problem-solving": "#e67e22", "systems-thinking": "#27ae60", "communication": "#8e44ad", "creativity": "#f39c12", "strategic-thinking": "#2980b9", "learning": "#16a085", "cognitive-bias": "#c0392b", "productivity": "#7f8c8d", "leadership": "#d35400", "negotiation": "#1abc9c"};
var cats=Object.keys(CL).sort();
var activeCats=new Set(cats);
var svg=d3.select("#graph");
var W,H;
function resize(){var r=svg.node().getBoundingClientRect();W=r.width;H=r.height}
resize();
window.addEventListener("resize",resize);

var g=svg.append("g");
var zoom=d3.zoom().scaleExtent([0.1,5]).on("zoom",function(e){g.attr("transform",e.transform)});
svg.call(zoom);

var sim=d3.forceSimulation(nodes)
  .force("link",d3.forceLink(links).id(function(d){return d.id}).distance(80).strength(0.3))
  .force("charge",d3.forceManyBody().strength(-120).distanceMax(400))
  .force("center",d3.forceCenter(W/2,H/2))
  .force("collision",d3.forceCollide().radius(function(d){return d.r+2}))
  .force("x",d3.forceX(W/2).strength(0.03))
  .force("y",d3.forceY(H/2).strength(0.03));

var linkG=g.append("g").attr("class","links");
var nodeG=g.append("g").attr("class","nodes");
var labelG=g.append("g").attr("class","labels");

var linkEls=linkG.selectAll("line").data(links).join("line")
  .attr("stroke","#ccc").attr("stroke-width",0.8).attr("stroke-opacity",0.3);

var nodeEls=nodeG.selectAll("circle").data(nodes).join("circle")
  .attr("r",function(d){return d.r})
  .attr("fill",function(d){return d.color})
  .attr("stroke","#fff").attr("stroke-width",1.5)
  .attr("cursor","pointer")
  .call(d3.drag().on("start",dragStart).on("drag",dragging).on("end",dragEnd));

var labelEls=labelG.selectAll("text").data(nodes).join("text")
  .text(function(d){return d.name.length>22?d.name.slice(0,20)+"..":d.name})
  .attr("font-size",function(d){return Math.max(7,d.r*0.7)})
  .attr("text-anchor","middle").attr("dy",function(d){return d.r+10})
  .attr("fill","#555").attr("pointer-events","none");

var tip=document.getElementById("tip");
nodeEls.on("mouseover",function(e,d){
  tip.style.opacity=1;tip.textContent=d.name+" ("+d.catLabel+")";
  tip.style.left=(e.pageX+12)+"px";tip.style.top=(e.pageY-10)+"px";
}).on("mousemove",function(e){
  tip.style.left=(e.pageX+12)+"px";tip.style.top=(e.pageY-10)+"px";
}).on("mouseout",function(){tip.style.opacity=0});

nodeEls.on("click",function(e,d){
  e.stopPropagation();showSB(d);highlight(d);
});
svg.on("click",function(){clearHighlight();document.getElementById("sb").classList.remove("open")});

sim.on("tick",function(){
  linkEls.attr("x1",function(d){return d.source.x}).attr("y1",function(d){return d.source.y})
    .attr("x2",function(d){return d.target.x}).attr("y2",function(d){return d.target.y});
  nodeEls.attr("cx",function(d){return d.x}).attr("cy",function(d){return d.y});
  labelEls.attr("x",function(d){return d.x}).attr("y",function(d){return d.y});
});

function dragStart(e,d){if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}
function dragging(e,d){d.fx=e.x;d.fy=e.y}
function dragEnd(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}

function highlight(d){
  var connected=new Set();connected.add(d.id);
  links.forEach(function(l){
    var s=typeof l.source==="object"?l.source.id:l.source;
    var t=typeof l.target==="object"?l.target.id:l.target;
    if(s===d.id)connected.add(t);if(t===d.id)connected.add(s);
  });
  nodeEls.attr("opacity",function(n){return connected.has(n.id)?1:0.1});
  labelEls.attr("opacity",function(n){return connected.has(n.id)?1:0.05});
  linkEls.attr("stroke-opacity",function(l){
    var s=typeof l.source==="object"?l.source.id:l.source;
    var t=typeof l.target==="object"?l.target.id:l.target;
    return(s===d.id||t===d.id)?0.6:0.03;
  }).attr("stroke",function(l){
    var s=typeof l.source==="object"?l.source.id:l.source;
    var t=typeof l.target==="object"?l.target.id:l.target;
    return(s===d.id||t===d.id)?d.color:"#ccc";
  }).attr("stroke-width",function(l){
    var s=typeof l.source==="object"?l.source.id:l.source;
    var t=typeof l.target==="object"?l.target.id:l.target;
    return(s===d.id||t===d.id)?2:0.8;
  });
}
function clearHighlight(){
  nodeEls.attr("opacity",1);labelEls.attr("opacity",1);
  linkEls.attr("stroke-opacity",0.3).attr("stroke","#ccc").attr("stroke-width",0.8);
}

function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML}
function showSB(d){
  document.getElementById("sb-title").textContent=d.name;
  var sb=document.getElementById("sb");sb.classList.add("open");
  var h='<span class="badge" style="background:'+d.color+'">'+esc(d.catLabel)+'</span>';
  if(d.origin)h+='<div class="sec"><h3>Origin</h3><p>'+esc(d.origin)+'</p></div>';
  h+='<div class="sec"><h3>Problem</h3><p>'+esc(d.problem)+'</p></div>';
  h+='<div class="sec"><h3>How it works</h3><p>'+esc(d.howItWorks||d.oneLiner)+'</p></div>';
  var rels=links.filter(function(l){
    var s=typeof l.source==="object"?l.source.id:l.source;
    var t=typeof l.target==="object"?l.target.id:l.target;
    return s===d.id||t===d.id;
  });
  if(rels.length){
    h+='<div class="sec"><h3>Connections ('+rels.length+')</h3><div class="rel-list">';
    rels.forEach(function(l){
      var s=typeof l.source==="object"?l.source:nodes[l.source];
      var t=typeof l.target==="object"?l.target:nodes[l.target];
      var other=s.id===d.id?t:s;
      var dir=s.id===d.id?"\u2192":"\u2190";
      h+='<div class="rel-row" data-id="'+other.id+'"><span class="rel-type">'+esc(l.relationship)+'</span>'+dir+' '+esc(other.name)+'</div>';
    });
    h+='</div></div>';
  }
  document.getElementById("sb-body").innerHTML=h;
}
document.getElementById("sb-body").addEventListener("click",function(e){
  var row=e.target.closest(".rel-row");
  if(row){var id=parseInt(row.dataset.id);var n=nodes[id];if(n){showSB(n);highlight(n)}}
});
document.getElementById("sb-x").addEventListener("click",function(){
  document.getElementById("sb").classList.remove("open");clearHighlight();
});

// Filters
var pillsEl=document.getElementById("pills");
cats.forEach(function(c){
  var p=document.createElement("button");
  p.className="pill on";p.style.background=CC[c];p.textContent=CL[c];p.dataset.cat=c;
  p.addEventListener("click",function(){
    if(activeCats.has(c)){activeCats.delete(c);p.classList.remove("on");p.classList.add("off")}
    else{activeCats.add(c);p.classList.add("on");p.classList.remove("off")}
    applyFilter();
  });
  pillsEl.appendChild(p);
});
function applyFilter(){
  nodeEls.attr("display",function(d){return activeCats.has(d.category)?null:"none"});
  labelEls.attr("display",function(d){return activeCats.has(d.category)?null:"none"});
  linkEls.attr("display",function(l){
    var s=typeof l.source==="object"?l.source:nodes[l.source];
    var t=typeof l.target==="object"?l.target:nodes[l.target];
    return(activeCats.has(s.category)&&activeCats.has(t.category))?null:"none";
  });
}

// Search
document.getElementById("q").addEventListener("input",function(e){
  var q=e.target.value.toLowerCase();
  if(!q){nodeEls.attr("opacity",1);labelEls.attr("opacity",1);return}
  nodeEls.attr("opacity",function(d){return d.name.toLowerCase().indexOf(q)>=0?1:0.08});
  labelEls.attr("opacity",function(d){return d.name.toLowerCase().indexOf(q)>=0?1:0.03});
});

// Legend
var leg=document.getElementById("legend");
cats.forEach(function(c){
  var s=document.createElement("span");s.className="leg";
  s.innerHTML='<span class="dot" style="background:'+CC[c]+'"></span>'+CL[c];
  leg.appendChild(s);
});

// Toolbar
document.getElementById("btn-reset").addEventListener("click",function(){
  svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity);
});
var paused=false;
document.getElementById("btn-pause").addEventListener("click",function(){
  paused=!paused;
  if(paused){sim.stop();this.textContent="Resume"}
  else{sim.alpha(0.3).restart();this.textContent="Pause"}
});

// Initial zoom to fit
setTimeout(function(){
  svg.transition().duration(1000).call(zoom.transform,
    d3.zoomIdentity.translate(W/2,H/2).scale(0.7).translate(-W/2,-H/2));
},2000);
</script>
</body>
</html>
