cts_to": ["PDCA", "Build-Measure-Learn", "Theory of Constraints"], "source_url": "https://deming.org/explore/pdsa/"}, {"name": "Unit Economics", "category": "strategic-thinking", "one_liner": "Analyze revenue and costs at the single-customer level \u2014 profitability per unit determines whether growth creates or destroys value.", "problem": "Growing companies can appear healthy at an aggregate level while losing money on every customer \u2014 scale amplifies a broken unit model.", "how_it_works": "Key metrics: LTV (lifetime gross profit per customer), CAC (cost to acquire one customer), LTV:CAC ratio (healthy = 3:1+), Payback Period (months to recover CAC). If LTV < CAC, growth destroys value. Fix unit economics before scaling. Each pricing, retention, or acquisition lever shifts the ratio.", "origin": "Venture capital and startup practice; formalized in the 2010s growth hacking and SaaS communities", "connects_to": ["North Star Metric", "BCG Matrix", "Lean Canvas", "Flywheel Effect"], "source_url": "https://pitchgrade.com/blog/unit-economics-ltv-cac-explained"}, {"name": "Network Effects", "category": "strategic-thinking", "one_liner": "Each additional user makes the product more valuable for all existing users \u2014 creating compounding competitive moats.", "problem": "Products compete on features alone without building the structural advantages that make switching costs and scale self-reinforcing.", "how_it_works": "Direct network effects: each new user directly benefits others (messaging apps). Indirect: each new user benefits a different user group (Uber \u2014 more drivers benefit riders). Data: more users \u2192 better ML models \u2192 better product \u2192 more users. Identify which type you have, then design to accelerate network density before competitors.", "origin": "Theodore Vail (AT&T, 1908) first observed the concept; formalized by Robert Metcalfe (Metcalfe's Law, 1980); popularized for startups by NFX and a16z in 2010s", "connects_to": ["Flywheel Effect", "Competitive Moat", "Platform Business Model", "Critical Mass"], "source_url": "https://fourweekmba.com/mental-models-business-strategy/"}, {"name": "Disruption Theory (Disruptive Innovation)", "category": "strategic-thinking", "one_liner": "Smaller companies overthrow incumbents by starting with simpler, cheaper products for overlooked customers, then moving upmarket.", "problem": "Incumbents dismiss threats that start at the low end of their market \u2014 until those competitors take the whole market.", "how_it_works": "Disruptors enter at the low end (or in a new market) with a simpler, cheaper solution that incumbents ignore (it's not profitable for them). Disruptors improve over time. When the product is 'good enough' for mainstream customers, the incumbent's core market collapses. Sustaining innovation (improving for existing customers) is not disruption.", "origin": "Clayton M. Christensen, Harvard Business School, 'The Innovator's Dilemma' (1997)", "connects_to": ["Jobs to Be Done", "Blue Ocean Strategy", "Technology Adoption Lifecycle", "Porter's Five Forces"], "source_url": "https://fourweekmba.com/mental-models-business-strategy/"}, {"name": "Technology Adoption Lifecycle (Crossing the Chasm)", "category": "strategic-thinking", "one_liner": "Innovations cross a market chasm between early adopters and the early majority \u2014 this gap kills most new products.", "problem": "Companies succeed with early adopters but fail to cross into mainstream markets because these groups have fundamentally different needs and reference systems.", "how_it_works": "The S-curve has segments: Innovators \u2192 Early Adopters \u2192 Early Majority \u2192 Late Majority \u2192 Laggards. The 'Chasm' lies between Early Adopters and Early Majority. To cross it: focus on a single 'bowling pin' niche, dominate it completely, then use it as a beachhead for adjacent segments.", "origin": "Everett Rogers, 'Diffusion of Innovations' (1962) \u2014 S-curve; Geoffrey Moore, 'Crossing the Chasm' (1991) \u2014 the Chasm", "connects_to": ["Disruption Theory", "Minimum Viable Product", "Network Effects", "Platform Business Model"], "source_url": "https://fourweekmba.com/mental-models-business-strategy/"}, {"name": "Competitive Moat", "category": "strategic-thinking", "one_liner": "A durable structural advantage that prevents competitors from replicating your position and compressing your returns.", "problem": "Competitive advantages from product features or execution erode quickly; sustainable profitability requires structural barriers.", "how_it_works": "Seven types of moats (Hamilton Helmer's 7 Powers): Scale Economies, Network Effects, Switching Costs, Cornered Resource, Counter-Positioning, Branding, Process Power. Identify which moats your business has or can build. Moats compound \u2014 a business with multiple types is exponentially harder to attack.", "origin": "Warren Buffett coined the metaphor; Hamilton Helmer formalized seven types in '7 Powers: The Foundations of Business Strategy' (2016)", "connects_to": ["Network Effects", "Flywheel Effect", "Porter's Five Forces", "Compounding"], "source_url": "https://www.polymathinvestor.com/p/35-mental-models-to-better-understand"}, {"name": "Pre-mortem Analysis", "category": "decision-making", "one_liner": "Before starting a project, imagine it has already failed catastrophically \u2014 then work backward to identify why.", "problem": "Teams are subject to groupthink and optimism bias during planning, failing to surface plausible failure modes.", "how_it_works": "At project kickoff, announce: 'It's 12 months from now and this project failed completely. What happened?' Everyone writes reasons independently (prevents anchoring), then shares. Identify the most plausible failure modes and build mitigations into the plan. Psychological safety is critical \u2014 it's safe to voice doubts.", "origin": "Gary Klein, cognitive psychologist, developed the pre-mortem technique in the 1990s; popularized by Daniel Kahneman in 'Thinking, Fast and Slow' (2011)", "connects_to": ["Inversion", "Margin of Safety", "Scenario Planning", "Second-Order Thinking"], "source_url": "https://fourweekmba.com/mental-models-business-strategy/"}, {"name": "Law of Diminishing Returns", "category": "problem-solving", "one_liner": "Each additional unit of input yields progressively smaller incremental output beyond an optimal point.", "problem": "Resources are applied uniformly without recognizing that marginal returns degrade \u2014 overspending past the inflection point.", "how_it_works": "Map input vs. output. Returns rise steeply at first, flatten, then decline. The optimal input level is just before the plateau. Application: stop optimizing a feature past the point of diminishing returns; redistribute effort to higher-ROI areas. Closely related to Pareto \u2014 most gains come early.", "origin": "Anne Robert Jacques Turgot (1767) and Thomas Robert Malthus (1798) in economics; now cross-domain", "connects_to": ["Pareto Principle", "Theory of Constraints", "Opportunity Cost", "Compounding"], "source_url": "https://fs.blog/mental-models/"}, {"name": "Platform Business Model", "category": "strategic-thinking", "one_liner": "Build infrastructure that facilitates value exchange between two or more user groups \u2014 the platform captures value without producing it directly.", "problem": "Linear business models (make \u2192 sell) hit growth ceilings; platforms scale without proportional cost increases.", "how_it_works": "Identify two or more user groups with complementary needs (buyers/sellers, drivers/riders, developers/users). Build the infrastructure connecting them. Remove friction on both sides. Seed one side to attract the other (solving the chicken-and-egg problem). Revenue comes from facilitating interactions, not producing outputs.", "origin": "Network effects research in economics; popularized as a concept by Geoffrey Parker and Marshall Van Alstyne in 'Platform Revolution' (2016)", "connects_to": ["Network Effects", "Competitive Moat", "Flywheel Effect", "Technology Adoption Lifecycle"], "source_url": "https://fourweekmba.com/mental-models-business-strategy/"}]</script>
<script id="jd-connections" type="application/json">[{"from": "First Principles Thinking", "to": "Issue Trees (Logic Trees)", "relationship": "sequence", "description": "First Principles strips away assumptions to foundational truths; Issue Trees then structure those truths into a MECE decomposition for solving. Use First Principles to validate the branches you put in your Issue Tree."}, {"from": "Issue Trees (Logic Trees)", "to": "MECE Principle", "relationship": "contains", "description": "Issue Trees are built by applying the MECE Principle at every node \u2014 MECE is the structural rule that makes Issue Trees valid."}, {"from": "Inversion", "to": "Pre-Mortem", "relationship": "extends", "description": "Pre-Mortem is a structured team application of Inversion: instead of asking 'what would cause failure?' abstractly, the team imagines failure has already occurred and inverts from that concrete starting point."}, {"from": "Pre-Mortem", "to": "Regret Minimization Framework", "relationship": "complements", "description": "Pre-Mortem surfaces concrete failure modes before launch; Regret Minimization calibrates emotional stakes. Together they prevent both cognitive and emotional decision traps."}, {"from": "Second-Order Thinking", "to": "Causal Loop Diagram (CLD)", "relationship": "extends", "description": "Second-Order Thinking asks 'and then what?' verbally; CLDs formalize those downstream chains into visual feedback loops capturing nonlinear dynamics."}, {"from": "Causal Loop Diagram (CLD)", "to": "Reinforcing Feedback Loop", "relationship": "contains", "description": "CLDs are composed of two primitive building blocks: Reinforcing Feedback Loops and Balancing Feedback Loops."}, {"from": "Causal Loop Diagram (CLD)", "to": "Balancing Feedback Loop", "relationship": "contains", "description": "CLDs are composed of two primitive building blocks: Balancing Feedback Loops and Reinforcing Feedback Loops."}, {"from": "Reinforcing Feedback Loop", "to": "Limits to Growth Archetype", "relationship": "extends", "description": "The Limits to Growth archetype begins with a Reinforcing Feedback Loop that eventually encounters a Balancing constraint \u2014 you cannot understand the archetype without the primitive loop."}, {"from": "Reinforcing Feedback Loop", "to": "Network Effects (Metcalfe's Law)", "relationship": "extends", "description": "Network Effects are a specific real-world manifestation of a Reinforcing Feedback Loop: more users \u2192 more value \u2192 more users."}, {"from": "Reinforcing Feedback Loop", "to": "Flywheel Effect", "relationship": "extends", "description": "The Flywheel Effect is a business-strategy framing of a Reinforcing Feedback Loop: strategic actions create momentum that compounds through the same cycle."}, {"from": "Reinforcing Feedback Loop", "to": "Compounding", "relationship": "extends", "description": "Compounding is the mathematical / financial expression of a Reinforcing Feedback Loop applied to a stock (money, knowledge, reputation) over time."}, {"from": "Balancing Feedback Loop", "to": "Drifting Goals Archetype", "relationship": "extends", "description": "The Drifting Goals archetype occurs when a Balancing Loop intended to close a gap is gamed by lowering the goal instead of improving performance."}, {"from": "Shifting the Burden Archetype", "to": "Fixes That Fail Archetype", "relationship": "complements", "description": "Both archetypes involve symptomatic fixes that undermine long-term solutions, but Shifting the Burden emphasizes dependency creation while Fixes That Fail emphasizes delayed blowback."}, {"from": "Cobra Effect", "to": "Goodhart's Law", "relationship": "extends", "description": "Goodhart's Law states that measures become corrupted when used as targets; the Cobra Effect is a vivid historical case where an incentive perversely increased the problem it was meant to solve \u2014 a concrete instance of Goodhart in action."}, {"from": "Goodhart's Law", "to": "Campbell's Law", "relationship": "extends", "description": "Campbell's Law is the social-science formulation of the same insight as Goodhart's Law, specifying that high-stakes use of indicators corrupts them \u2014 the two are parallel expressions of the same phenomenon in different domains."}, {"from": "Iceberg Model", "to": "Five Whys", "relationship": "complements", "description": "The Iceberg Model provides a four-level map (events \u2192 patterns \u2192 structures \u2192 mental models) of where root causes live; Five Whys is the drilling technique used to traverse those levels."}, {"from": "Five Whys", "to": "Root Cause Analysis", "relationship": "contains", "description": "Five Whys is one specific technique within the broader Root Cause Analysis discipline, which also includes Fishbone Diagrams and fault trees."}, {"from": "Fishbone Diagram (Ishikawa / Cause-and-Effect Diagram)", "to": "Root Cause Analysis", "relationship": "contains", "description": "The Fishbone Diagram is a visual tool within Root Cause Analysis, structuring potential causes across standard categories to reveal the root."}, {"from": "Root Cause Analysis", "to": "PDCA Cycle (Plan-Do-Check-Act)", "relationship": "sequence", "description": "Root Cause Analysis is the analytical phase that informs the Plan step of PDCA \u2014 you need to understand root causes before designing a corrective change."}, {"from": "PDCA Cycle (Plan-Do-Check-Act)", "to": "PDSA Cycle (Plan-Do-Study-Act)", "relationship": "alternative", "description": "PDSA is Deming's preferred refinement of PDCA, substituting 'Study' for 'Check' to emphasize learning over verification \u2014 both serve iterative improvement but with different epistemological emphasis."}, {"from": "PDCA Cycle (Plan-Do-Check-Act)", "to": "Build-Measure-Learn", "relationship": "alternative", "description": "Build-Measure-Learn is the Lean Startup variant of PDCA, optimized for product validation under uncertainty rather than process improvement in stable systems."}, {"from": "Build-Measure-Learn", "to": "Minimum Viable Product (MVP)", "relationship": "contains", "description": "MVP is the artifact produced in the Build phase of Build-Measure-Learn \u2014 it is the minimum experiment needed to generate validated learning."}, {"from": "Design Thinking", "to": "Double Diamond", "relationship": "extends", "description": "The Double Diamond is a spatial visualization of the Design Thinking process, making its two diverge-converge cycles (problem space + solution space) structurally explicit."}, {"from": "Design Thinking", "to": "Empathy Map", "relationship": "contains", "description": "The Empathy Map is a specific tool used in the Empathize phase of Design Thinking to build a structured understanding of user context."}, {"from": "Design Thinking", "to": "Jobs to Be Done (JTBD)", "relationship": "complements", "description": "JTBD reframes what problem Design Thinking should be solving \u2014 defining the job the user wants done before the empathy/ideation phases begin."}, {"from": "Double Diamond", "to": "Divergent / Convergent Thinking", "relationship": "contains", "description": "Each diamond in the Double Diamond model is a diverge-converge cycle \u2014 Divergent/Convergent Thinking is the cognitive mechanism the model formalizes."}, {"from": "Creative Problem Solving (CPS) Model", "to": "Divergent / Convergent Thinking", "relationship": "contains", "description": "CPS explicitly alternates divergent and convergent phases at each of its six stages \u2014 the cognitive pattern is the engine of the entire model."}, {"from": "Brainstorming", "to": "Divergent / Convergent Thinking", "relationship": "contains", "description": "Brainstorming is the pure divergent phase \u2014 it defers all convergent judgment to a later step, directly enacting divergent thinking."}, {"from": "Reverse Brainstorming", "to": "Brainstorming", "relationship": "extends", "description": "Reverse Brainstorming applies the Inversion mental model to standard Brainstorming, generating ideas about how to cause the problem then flipping them into solutions."}, {"from": "Reverse Brainstorming", "to": "Inversion", "relationship": "contains", "description": "Reverse Brainstorming is a creativity technique that operationalizes Inversion \u2014 it is Inversion applied in a group ideation context."}, {"from": "SCAMPER", "to": "Lateral Thinking", "relationship": "contains", "description": "SCAMPER provides seven specific lateral moves (Substitute, Combine, Adapt\u2026) that systematize what Lateral Thinking does intuitively \u2014 breaking dominant patterns through structured provocations."}, {"from": "Analogical Thinking", "to": "Synectics", "relationship": "contains", "description": "Synectics is a structured group creativity method built entirely on four types of analogical thinking, making Analogical Thinking the foundational cognitive operation."}, {"from": "Morphological Analysis (Zwicky Box)", "to": "MECE Principle", "relationship": "complements", "description": "The Zwicky Box generates all possible combinations across independent dimensions; MECE ensures those dimensions are properly non-overlapping and exhaustive before the matrix is built."}, {"from": "Constraint Relaxation", "to": "First Principles Thinking", "relationship": "complements", "description": "First Principles strips away false assumptions; Constraint Relaxation temporarily removes assumed constraints \u2014 together they clear the solution space of inherited limitations."}, {"from": "Abstraction Laddering", "to": "Issue Trees (Logic Trees)", "relationship": "complements", "description": "Abstraction Laddering moves up (Why?) to reframe the problem space and down (How?) to generate alternatives; Issue Trees then structure the decomposed problem for systematic solving."}, {"from": "Reframing", "to": "Abstraction Laddering", "relationship": "extends", "description": "Abstraction Laddering is a structured technique for achieving the cognitive shift that Reframing describes \u2014 moving up or down the abstraction hierarchy to see the problem differently."}, {"from": "Cynefin Framework", "to": "Complex Adaptive Systems (CAS)", "relationship": "complements", "description": "Cynefin's 'Complex' domain describes precisely the territory that CAS theory analyzes \u2014 the framework tells you when you're in that domain; CAS theory explains what to do there."}, {"from": "Wicked Problems", "to": "Cynefin Framework", "relationship": "contains", "description": "Wicked Problems are a subset of the problems that live in Cynefin's Complex or Chaotic domains \u2014 the Cynefin Framework provides the classification system that identifies a problem as wicked."}, {"from": "OODA Loop", "to": "Cynefin Framework", "relationship": "complements", "description": "The Cynefin Framework classifies the decision environment; OODA Loop provides the action cycle optimized for Chaotic and Complex domains where speed of iteration matters most."}, {"from": "Decision Tree", "to": "Expected Value", "relationship": "contains", "description": "Decision Trees are computational structures for calculating Expected Value across branching paths \u2014 each leaf is an outcome weighted by probability, summed along each branch."}, {"from": "Expected Value", "to": "Probabilistic Thinking", "relationship": "contains", "description": "Expected Value is the mathematical operationalization of Probabilistic Thinking \u2014 it forces explicit probability estimates and multiplies them by magnitude to compare options."}, {"from": "Bayesian Updating", "to": "Probabilistic Thinking", "relationship": "extends", "description": "Bayesian Updating provides the formal mechanism for how probabilities should change in Probabilistic Thinking as new evidence arrives \u2014 it is dynamic probabilistic reasoning."}, {"from": "Reference Class Forecasting", "to": "Planning Fallacy", "relationship": "complements", "description": "Planning Fallacy describes the bias of inside-view optimism; Reference Class Forecasting is the debiasing technique that corrects it by anchoring on outside-view historical base rates."}, {"from": "Reference Class Forecasting", "to": "Bayesian Updating", "relationship": "complements", "description": "Reference Class Forecasting provides the prior from historical data; Bayesian Updating then combines that prior with inside-view project-specific evidence to form a calibrated forecast."}, {"from": "Margin of Safety", "to": "Antifragility", "relationship": "complements", "description": "Margin of Safety is a defensive buffer against downside; Antifragility goes further by structuring exposure so that volatility itself becomes a source of gain \u2014 they address different points on the robustness-to-optionality spectrum."}, {"from": "Black Swan", "to": "Antifragility", "relationship": "complements", "description": "Black Swans are the events that destroy fragile systems; Antifragility is the design principle that transforms Black Swan exposure into upside \u2014 Taleb developed both concepts in tandem."}, {"from": "Black Swan", "to": "Tail Risk", "relationship": "extends", "description": "Black Swans are the qualitative concept; Power Laws/Fat Tails provide the statistical framework explaining why they occur \u2014 heavy-tailed distributions make extreme events far more probable than Gaussian models suggest."}, {"from": "Power Laws / Fat Tails", "to": "Pareto Principle (80/20 Rule)", "relationship": "extends", "description": "The Pareto Principle is an empirical observation of power-law distribution \u2014 the 80/20 rule is a special case of the broader mathematical phenomenon of power-law scaling."}, {"from": "Tipping Point", "to": "Diffusion of Innovation (S-Curve)", "relationship": "contains", "description": "The Tipping Point is the moment in a Diffusion of Innovation S-curve where adoption crosses the threshold that triggers exponential spread \u2014 it is a specific feature of the S-curve."}, {"from": "Diffusion of Innovation (S-Curve)", "to": "Technology Adoption Lifecycle (Crossing the Chasm)", "relationship": "extends", "description": "Crossing the Chasm refines the S-curve by identifying a dangerous gap between Early Adopters and Early Majority that the original Diffusion of Innovation model smooths over."}, {"from": "Path Dependence / Lock-In", "to": "Hysteresis", "relationship": "extends", "description": "Hysteresis is the physics/engineering term for the same phenomenon as Path Dependence \u2014 the current state depends on history. Hysteresis is used in physical systems; Path Dependence in social/economic ones."}, {"from": "Panarchy / Adaptive Cycle", "to": "Resilience", "relationship": "extends", "description": "Panarchy is the ecological theory explaining how resilience is maintained across scales through adaptive cycles \u2014 the Resilience concept is formalized within Panarchy's r-K-\u03a9-\u03b1 model."}, {"from": "Ostrom's Design Principles", "to": "Tragedy of the Commons", "relationship": "complements", "description": "Tragedy of the Commons diagnoses why shared resources fail; Ostrom's Design Principles provide the empirically-derived solution \u2014 the eight conditions under which commons actually succeed."}, {"from": "Collective Action Problem", "to": "Tragedy of the Commons", "relationship": "extends", "description": "Tragedy of the Commons is a specific spatial/resource case of the broader Collective Action Problem \u2014 rational individual behavior leading to collective suboptimality."}, {"from": "Leverage Points", "to": "Causal Loop Diagram (CLD)", "relationship": "sequence", "description": "Build a CLD first to map the system's structure; then apply Meadows' Leverage Points hierarchy to identify where in that map intervention will be most effective."}, {"from": "Stock and Flow", "to": "Causal Loop Diagram (CLD)", "relationship": "complements", "description": "Stock-and-Flow diagrams make the accumulations and rates explicit; CLDs show the feedback structure \u2014 together they form a complete system dynamics model."}, {"from": "Dunning-Kruger Effect", "to": "Circle of Competence", "relationship": "complements", "description": "The Dunning-Kruger Effect explains why people don't know the boundaries of their competence; Circle of Competence is the discipline of deliberately mapping and respecting those boundaries."}, {"from": "Feynman Technique", "to": "Dunning-Kruger Effect", "relationship": "complements", "description": "The Feynman Technique is an operational debiasing tool for the Dunning-Kruger Effect \u2014 attempting plain-language explanation exposes the gaps that overconfident knowers cannot see."}, {"from": "Double-Loop Learning", "to": "Iceberg Model", "relationship": "complements", "description": "The Iceberg Model maps the four levels where assumptions live; Double-Loop Learning is the learning process that reaches below the surface to question those underlying structures and mental models."}, {"from": "Metacognition", "to": "System 1 / System 2 Thinking", "relationship": "complements", "description": "System 1/2 describes the two cognitive modes; Metacognition is the self-monitoring capacity that notices when System 1 is running and decides whether to engage System 2."}, {"from": "Deliberate Practice", "to": "Zone of Proximal Development (ZPD)", "relationship": "complements", "description": "ZPD defines the learning sweet spot between known and unknown; Deliberate Practice is the method for continuously operating in that zone through targeted, feedback-driven challenge."}, {"from": "Spacing Effect (Spaced Repetition)", "to": "Ebbinghaus Forgetting Curve", "relationship": "complements", "description": "The Forgetting Curve shows when memories decay; Spaced Repetition schedules reviews precisely when decay is about to occur \u2014 the technique is designed as the antidote to the curve."}, {"from": "Retrieval Practice / Testing Effect", "to": "Spacing Effect (Spaced Repetition)", "relationship": "complements", "description": "Spaced Repetition optimizes the timing of retrieval; the Testing Effect shows that retrieval itself (not re-reading) is what strengthens memory \u2014 they are the timing and mechanism of the same learning process."}, {"from": "Interleaving", "to": "Deliberate Practice", "relationship": "complements", "description": "Deliberate Practice identifies targeted weakness work; Interleaving is a practice schedule that mixes topics to force discriminative retrieval \u2014 together they accelerate skill acquisition beyond blocked practice."}, {"from": "Kolb's Learning Cycle", "to": "Double-Loop Learning", "relationship": "complements", "description": "Kolb's cycle describes how experience becomes knowledge through reflection and conceptualization; Double-Loop Learning adds a meta-level where the governing assumptions of the cycle itself are questioned."}, {"from": "Bloom's Taxonomy", "to": "Feynman Technique", "relationship": "complements", "description": "Bloom's Taxonomy shows that teaching others sits at the highest cognitive level (Synthesis/Create); Feynman Technique operationalizes that level as a self-assessment tool for any learner."}, {"from": "Growth Mindset", "to": "Deliberate Practice", "relationship": "complements", "description": "Growth Mindset is the belief system that makes Deliberate Practice possible \u2014 without believing ability is developable, people avoid the productive difficulty that deliberate practice requires."}, {"from": "Confirmation Bias", "to": "Bayesian Updating", "relationship": "complements", "description": "Confirmation Bias is the failure to update properly on disconfirming evidence; Bayesian Updating is the normative corrective \u2014 the mathematical rule that forces symmetric updating on all evidence."}, {"from": "Availability Heuristic", "to": "Reference Class Forecasting", "relationship": "complements", "description": "Availability Heuristic causes overweighting of vivid memorable examples; Reference Class Forecasting corrects this by anchoring on full statistical distributions rather than recalled instances."}, {"from": "Survivorship Bias", "to": "Reference Class Forecasting", "relationship": "complements", "description": "Survivorship Bias pollutes the visible sample by hiding failures; Reference Class Forecasting must explicitly include failures in its base rate to generate unbiased priors."}, {"from": "Narrative Fallacy", "to": "Bayesian Updating", "relationship": "complements", "description": "Narrative Fallacy creates false causal explanations for random sequences; Bayesian Updating demands explicit probability assignments that resist the post-hoc story-fitting that narratives enable."}, {"from": "Hindsight Bias", "to": "Pre-Mortem", "relationship": "complements", "description": "Hindsight Bias makes past failures seem inevitable; Pre-Mortem exploits that same imaginative capacity prospectively \u2014 using the brain's tendency to construct post-hoc inevitability to surface real risks before the fact."}, {"from": "Framing Effect", "to": "Reframing", "relationship": "complements", "description": "Framing Effect shows that how problems are presented systematically changes decisions; Reframing is the deliberate technique of exploiting that same mechanism to open new solution spaces."}, {"from": "Sunk Cost Fallacy", "to": "Sunk Cost Awareness", "relationship": "alternative", "description": "These are the same phenomenon described from different angles: Sunk Cost Fallacy is the bias (descriptive), Sunk Cost Awareness is the debiasing discipline (prescriptive)."}, {"from": "Loss Aversion", "to": "Prospect Theory", "relationship": "contains", "description": "Loss Aversion is the central empirical finding of Kahneman and Tversky's Prospect Theory \u2014 the roughly 2:1 asymmetry between loss pain and gain pleasure is the engine of the entire theory."}, {"from": "Overconfidence Bias", "to": "Margin of Safety", "relationship": "complements", "description": "Overconfidence Bias explains why our estimates are systematically too narrow; Margin of Safety is the engineering discipline that compensates for that overconfidence by building explicit buffers."}, {"from": "Planning Fallacy", "to": "SMART Goals", "relationship": "complements", "description": "Planning Fallacy describes the bias toward optimistic time/cost estimates; SMART Goals' 'Achievable' and 'Time-bound' criteria are partial correctives \u2014 forcing realistic scoping before commitment."}, {"from": "Status Quo Bias", "to": "Reversible vs. Irreversible Decisions (Type 1 / Type 2)", "relationship": "complements", "description": "Status Quo Bias creates excessive inertia on reversible decisions; the Type 1/Type 2 framework corrects this by freeing you to move fast on reversible (Type 2) decisions that status quo bias would cause you to overthink."}, {"from": "Ladder of Inference", "to": "Confirmation Bias", "relationship": "complements", "description": "Ladder of Inference maps the cognitive steps where Confirmation Bias enters \u2014 specifically at data selection (rung 2) and meaning-making (rung 4) \u2014 providing a structural diagnosis of where the bias operates."}, {"from": "System 1 / System 2 Thinking", "to": "Decision Matrix", "relationship": "complements", "description": "The Decision Matrix is a System 2 tool \u2014 it forces the slow, deliberate, analytical mode onto decisions that System 1 would otherwise shortcut through emotional or heuristic processing."}, {"from": "Minto Pyramid Principle (BLUF)", "to": "SCQA Framework", "relationship": "extends", "description": "The SCQA Framework is a specific narrative structure for building the setup that leads to BLUF's conclusion-first delivery \u2014 SCQA answers 'how do I set up the pyramid?'"}, {"from": "Ethos, Pathos, Logos (Rhetorical Triangle)", "to": "Monroe's Motivated Sequence", "relationship": "complements", "description": "Monroe's Motivated Sequence provides the temporal structure (Attention \u2192 Action) while the Rhetorical Triangle provides the three persuasive channels \u2014 together they cover both the order and the modes of persuasion."}, {"from": "Cialdini's 7 Principles of Influence", "to": "Pre-Suasion", "relationship": "sequence", "description": "Cialdini developed both: Pre-Suasion is his later discovery that what happens before the influence attempt matters as much as the 7 Principles during it \u2014 they are sequentially integrated."}, {"from": "Inoculation Theory", "to": "Steel-Manning", "relationship": "complements", "description": "Steel-Manning builds the best counter-argument for personal reasoning; Inoculation Theory uses weakened counter-arguments to pre-emptively protect audiences against persuasion \u2014 both work by engaging opposing arguments before the critical moment."}, {"from": "Principled Negotiation (Interest-Based Negotiation)", "to": "BATNA & ZOPA", "relationship": "complements", "description": "BATNA/ZOPA define the positional parameters of a negotiation; Principled Negotiation provides the process for expanding the pie within those parameters by focusing on interests rather than positions."}, {"from": "Tactical Empathy (FBI Negotiation)", "to": "Nonviolent Communication (NVC)", "relationship": "complements", "description": "Both frameworks center on surfacing needs and emotions beneath stated positions \u2014 NVC uses a four-part structure for collaborative contexts; Tactical Empathy uses mirroring and labeling for adversarial ones."}, {"from": "Anchoring", "to": "Anchoring Effect", "relationship": "alternative", "description": "These are the same phenomenon in different domains: Anchoring Effect (cognitive-bias) is the descriptive observation; Anchoring (negotiation) is the prescriptive exploitation of that bias to gain advantage."}, {"from": "Johari Window", "to": "Psychological Safety", "relationship": "complements", "description": "The Johari Window shows what information is hidden between self and others; Psychological Safety is the team condition that makes it safe to expand the Open quadrant by reducing Hidden and Blind areas."}, {"from": "Radical Candor", "to": "Situation-Behavior-Impact (SBI)", "relationship": "complements", "description": "Radical Candor defines the management philosophy (care personally + challenge directly); SBI provides the tactical communication structure for delivering that challenging feedback without judgment."}, {"from": "Five Dysfunctions of a Team", "to": "Psychological Safety", "relationship": "extends", "description": "The Five Dysfunctions pyramid's base (Absence of Trust) is precisely what Psychological Safety addresses \u2014 Edmondson's research on safety operationalizes and measures what Lencioni diagnoses narratively."}, {"from": "Situational Leadership (Hersey-Blanchard)", "to": "Zone of Proximal Development (ZPD)", "relationship": "complements", "description": "ZPD defines the learning zone relative to capability; Situational Leadership maps management style to that same capability-commitment matrix, applying ZPD principles to leadership."}, {"from": "SCARF Model", "to": "Psychological Safety", "relationship": "extends", "description": "SCARF provides the neurological mechanism for why Psychological Safety matters \u2014 the Status, Certainty, Autonomy, Relatedness, and Fairness domains are the specific threat triggers that Psychological Safety neutralizes."}, {"from": "Trust Equation", "to": "Radical Candor", "relationship": "complements", "description": "The Trust Equation makes Self-Orientation the dominant denominator (high self-orientation destroys trust); Radical Candor's 'care personally' dimension is the behavioral expression of low self-orientation."}, {"from": "Transactional Analysis (PAC Model)", "to": "Nonviolent Communication (NVC)", "relationship": "complements", "description": "TA diagnoses ego-state mismatches that cause communication breakdowns; NVC provides the language pattern that moves both parties toward the Adult-Adult transaction TA identifies as productive."}, {"from": "Theory of Constraints (TOC)", "to": "Bottleneck Analysis", "relationship": "contains", "description": "Bottleneck Analysis is the analytical step within TOC's five focusing steps \u2014 TOC is the complete management philosophy; Bottleneck Analysis is the identification phase."}, {"from": "Theory of Constraints \u2014 Drum-Buffer-Rope", "to": "Theory of Constraints (TOC)", "relationship": "contains", "description": "Drum-Buffer-Rope is the scheduling algorithm derived from TOC \u2014 it operationalizes the constraint-focus principle into production planning rules."}, {"from": "Critical Path Method (CPM)", "to": "Theory of Constraints (TOC)", "relationship": "complements", "description": "CPM identifies the longest chain of task dependencies; TOC identifies the binding capacity constraint \u2014 in projects (Critical Chain), the combination protects the critical path with buffer management."}, {"from": "Kanban", "to": "Theory of Constraints (TOC)", "relationship": "complements", "description": "Kanban's WIP limits are a practical implementation of TOC's principle of subordinating everything to the constraint \u2014 limiting work-in-progress prevents building inventory ahead of bottlenecks."}, {"from": "Agile / Scrum", "to": "Build-Measure-Learn", "relationship": "complements", "description": "Agile/Scrum provides the team process and cadence (sprints, ceremonies); Build-Measure-Learn provides the learning philosophy that should guide what gets built in each sprint."}, {"from": "OKRs (Objectives and Key Results)", "to": "North Star Metric", "relationship": "complements", "description": "The North Star Metric is the ultimate direction; OKRs cascade that direction into quarterly objectives with measurable results \u2014 the North Star prevents OKRs from optimizing locally at the expense of the overall mission."}, {"from": "Porter's Five Forces", "to": "SWOT Analysis", "relationship": "complements", "description": "Porter's Five Forces systematically maps the external competitive environment (informing the Opportunities and Threats quadrants); SWOT then combines that external view with internal Strengths and Weaknesses."}, {"from": "SWOT Analysis", "to": "PESTLE Analysis", "relationship": "complements", "description": "PESTLE provides structured macro-environmental scanning that populates the Opportunities and Threats cells of SWOT \u2014 PESTLE is the analytical input; SWOT is the strategic synthesis."}, {"from": "Blue Ocean Strategy", "to": "Porter's Five Forces", "relationship": "complements", "description": "Porter's Five Forces analyzes competitive intensity within an industry; Blue Ocean Strategy prescribes creating new market space where those five forces are irrelevant \u2014 it is a strategic response to unattractive Five Forces analysis."}, {"from": "Disruption Theory (Disruptive Innovation)", "to": "Technology Adoption Lifecycle (Crossing the Chasm)", "relationship": "complements", "description": "Disruption Theory explains the incumbent's strategic failure to respond; the Chasm model explains the innovator's execution challenge \u2014 together they map both sides of a market disruption."}, {"from": "Wardley Mapping", "to": "Value Chain Analysis", "relationship": "extends", "description": "Wardley Mapping adds evolutionary maturity as a second dimension to Value Chain Analysis \u2014 it asks not just 'what creates value?' but 'how mature is each component and where is it heading?'"}, {"from": "BCG Matrix (Growth-Share Matrix)", "to": "Ansoff Matrix", "relationship": "complements", "description": "The BCG Matrix diagnoses the current portfolio; the Ansoff Matrix prescribes growth vectors \u2014 together they answer 'what do we have?' and 'where should we go?'"}, {"from": "Lean Canvas", "to": "Minimum Viable Product (MVP)", "relationship": "sequence", "description": "The Lean Canvas is the hypothesis document that specifies what the MVP should test \u2014 you identify the riskiest assumption in the canvas, then build the MVP to validate it."}, {"from": "Jobs to Be Done (JTBD)", "to": "Lean Canvas", "relationship": "complements", "description": "JTBD provides the deep customer motivation insight that should anchor the Problem and Customer Segments boxes of the Lean Canvas \u2014 it ensures the canvas reflects real demand."}, {"from": "McKinsey 7S Framework", "to": "Conway's Law", "relationship": "complements", "description": "Conway's Law predicts that systems mirror organizational communication structures (a subset of 7S); McKinsey 7S provides the full map of organizational elements that must align \u2014 Structure, Systems, Staff, Style, Skills, Strategy, Shared Values."}, {"from": "Network Effects (Metcalfe's Law)", "to": "Platform Business Model", "relationship": "complements", "description": "Platform Business Models are the organizational structure designed to capture Network Effects \u2014 the platform exists specifically to aggregate users whose interactions create the compounding value described by Metcalfe's Law."}, {"from": "Scale-Free Networks / Preferential Attachment", "to": "Network Effects (Metcalfe's Law)", "relationship": "extends", "description": "Preferential Attachment is the generative mechanism explaining how Network Effects produce winner-take-all hub structures \u2014 it shows why network effects tend toward concentration."}, {"from": "Competitive Moat", "to": "Network Effects (Metcalfe's Law)", "relationship": "contains", "description": "Network Effects are one of the most powerful sources of Competitive Moat \u2014 the self-reinforcing value growth makes the advantage structurally durable against competitors."}, {"from": "Competitive Moat", "to": "Path Dependence / Lock-In", "relationship": "extends", "description": "Switching costs and lock-in effects are a key category of Competitive Moat \u2014 Path Dependence explains the structural mechanism by which customers cannot easily leave even when alternatives exist."}, {"from": "Unit Economics", "to": "Lean Canvas", "relationship": "complements", "description": "The Revenue Streams and Cost Structure sections of the Lean Canvas require unit economics analysis \u2014 you cannot validate a business model without understanding per-customer contribution margin."}, {"from": "Parkinson's Law", "to": "Time Blocking", "relationship": "complements", "description": "Parkinson's Law explains why unstructured time gets wasted; Time Blocking is the countermeasure \u2014 assigning specific work to specific hours prevents work from expanding to fill available slack."}, {"from": "Deep Work", "to": "Flow State", "relationship": "complements", "description": "Deep Work is the deliberate practice discipline (scheduled blocks, distraction elimination); Flow State is the psychological optimal experience that Deep Work creates conditions for \u2014 one is the discipline, the other is the reward."}, {"from": "Pomodoro Technique", "to": "Flow State", "relationship": "complements", "description": "The Pomodoro Technique provides time structure that protects against interruption; however, its frequent breaks can disrupt Flow \u2014 skilled practitioners adapt interval length to extend flow states once entered."}, {"from": "Eat the Frog", "to": "Eisenhower Matrix", "relationship": "complements", "description": "The Eisenhower Matrix identifies what is Important but not Urgent (Q2 work); Eat the Frog prescribes doing the most important/dreaded task first \u2014 together they align daily execution with strategic priority."}, {"from": "Getting Things Done (GTD)", "to": "Two-Minute Rule", "relationship": "contains", "description": "The Two-Minute Rule is a specific decision rule within GTD's processing step \u2014 if a captured item takes less than two minutes, do it now rather than organizing it into the system."}, {"from": "Getting Things Done (GTD)", "to": "Batching", "relationship": "complements", "description": "GTD's context lists (e.g., '@phone', '@computer') are a form of Batching \u2014 grouping similar tasks by context to enable efficient sequential execution."}, {"from": "Hard Choice Model", "to": "Reversible vs. Irreversible Decisions (Type 1 / Type 2)", "relationship": "complements", "description": "The Hard Choice Model categorizes by impact \u00d7 comparability; the Type 1/Type 2 framework categorizes by reversibility \u2014 together they create a richer decision-routing system that matches effort to both stakes and reversibility."}, {"from": "WRAP Framework", "to": "Confirmation Bias", "relationship": "complements", "description": "The WRAP Framework's 'Widen options' and 'Reality-test assumptions' steps directly target Confirmation Bias \u2014 the framework is essentially a structured debiasing protocol for the four decision biases."}, {"from": "10-10-10 Rule", "to": "Regret Minimization Framework", "relationship": "alternative", "description": "Both models use temporal distancing to reduce present-emotional bias in decisions \u2014 10-10-10 uses three specific time horizons; Regret Minimization uses a single extreme projection (age 80)."}, {"from": "Scenario Planning", "to": "Pre-Mortem", "relationship": "complements", "description": "Scenario Planning generates multiple futures for strategic hedging; Pre-Mortem focuses that same imaginative capacity on a single failure scenario to extract actionable risk mitigations before launch."}, {"from": "Scenario Planning", "to": "Second-Order Thinking", "relationship": "complements", "description": "Scenario Planning builds narratives of alternative futures; Second-Order Thinking provides the recursive 'and then what?' mechanism for extending those scenarios beyond first-level projections."}, {"from": "Concept Fan", "to": "Abstraction Laddering", "relationship": "alternative", "description": "Both tools solve the 'wrong problem' trap by moving to more abstract formulations \u2014 Concept Fan explicitly builds multiple branches at each level; Abstraction Laddering uses a single vertical Why?/How? axis."}, {"from": "Mind Mapping", "to": "Issue Trees (Logic Trees)", "relationship": "alternative", "description": "Both are radial visual decomposition tools, but Mind Maps are associative and non-MECE (for exploration), while Issue Trees are logical and strictly MECE (for exhaustive problem-solving)."}, {"from": "Munger's Latticework of Mental Models", "to": "Bloom's Taxonomy", "relationship": "complements", "description": "Bloom's Taxonomy defines the levels of cognitive engagement with knowledge; Munger's Latticework prescribes building a diverse cross-domain library that can be applied at the synthesis/evaluation levels."}, {"from": "What? So What? Now What?", "to": "Kolb's Learning Cycle", "relationship": "alternative", "description": "Both are reflective learning frameworks that move from experience through meaning to action \u2014 What/So What/Now What is a simplified three-step variant of Kolb's four-stage cycle."}, {"from": "Occam's Razor", "to": "First Principles Thinking", "relationship": "complements", "description": "First Principles builds up from foundational truths; Occam's Razor prunes back to the simplest sufficient explanation \u2014 together they prevent both under-thinking (accepting convention) and over-engineering (adding unnecessary complexity)."}, {"from": "Hanlon's Razor", "to": "Fundamental Attribution Error", "relationship": "complements", "description": "Fundamental Attribution Error causes us to attribute others' negative behavior to malice or character; Hanlon's Razor is the corrective heuristic \u2014 assume incompetence before malice to avoid that attribution error."}, {"from": "Map Is Not the Territory", "to": "Goodhart's Law", "relationship": "extends", "description": "Goodhart's Law is a specific application of Map/Territory confusion: the metric is a map of the underlying reality, and when it becomes a target (is treated as the territory), the map-territory distinction collapses destructively."}, {"from": "Gall's Law", "to": "Complex Adaptive Systems (CAS)", "relationship": "complements", "description": "Gall's Law prescribes evolutionary design from working simple systems; CAS theory explains why \u2014 complex adaptive systems cannot be designed top-down because their behavior is emergent from component interactions."}, {"from": "Emergence", "to": "Complex Adaptive Systems (CAS)", "relationship": "contains", "description": "Emergence is the defining property of Complex Adaptive Systems \u2014 the system-level behaviors that cannot be predicted from or reduced to the properties of individual components."}, {"from": "Self-Organization", "to": "Complex Adaptive Systems (CAS)", "relationship": "contains", "description": "Self-Organization is a core mechanism of Complex Adaptive Systems \u2014 ordered structures arise from local agent interactions without central control, which is what makes CAS systems CAS systems."}, {"from": "Chaos Theory / Butterfly Effect", "to": "Nonlinearity", "relationship": "contains", "description": "Chaos Theory is the mathematical study of extreme nonlinear sensitivity to initial conditions \u2014 nonlinearity is the necessary structural property that makes chaotic behavior possible."}, {"from": "Strange Attractor", "to": "Chaos Theory / Butterfly Effect", "relationship": "complements", "description": "Chaos Theory explains the unpredictability of trajectories; Strange Attractors show that despite trajectory unpredictability, chaotic systems remain bounded within a recognizable geometric structure."}, {"from": "Unintended Consequences", "to": "Second-Order Thinking", "relationship": "complements", "description": "Unintended Consequences describes the phenomenon; Second-Order Thinking is the preventive cognitive practice \u2014 systematically asking 'and then what?' before acting to surface consequences before they materialize."}, {"from": "Jevons Paradox (Rebound Effect)", "to": "Unintended Consequences", "relationship": "contains", "description": "Jevons Paradox is a specific, historically well-documented instance of Unintended Consequences \u2014 an efficiency improvement producing the opposite of its intended reduction in total resource use."}, {"from": "Braess's Paradox", "to": "Unintended Consequences", "relationship": "contains", "description": "Braess's Paradox is a specific mathematical instance of Unintended Consequences in network systems where adding capacity degrades performance due to individual optimization conflicting with system optimum."}, {"from": "Normal Accidents Theory", "to": "Complex Adaptive Systems (CAS)", "relationship": "complements", "description": "Normal Accidents Theory applies CAS insights to safety-critical systems: in tightly coupled complex systems, multi-point failures are statistically inevitable \u2014 a consequence of emergent system behavior."}, {"from": "Forrester's Counterintuitive Behavior", "to": "Leverage Points", "relationship": "complements", "description": "Forrester identified that complex systems behave counterintuitively \u2014 Meadows' Leverage Points hierarchy is the systematic answer to that insight, mapping where non-obvious high-leverage interventions actually exist."}, {"from": "Lindy Effect", "to": "Circle of Competence", "relationship": "complements", "description": "Lindy Effect advises trusting knowledge and technologies that have survived long \u2014 applying it as a filter when defining your Circle of Competence helps identify which frameworks have proven durable versus merely fashionable."}, {"from": "Productive Thinking Model", "to": "Creative Problem Solving (CPS) Model", "relationship": "alternative", "description": "Both are structured multi-step creative problem-solving processes that alternate divergent and convergent phases \u2014 Productive Thinking Model uses six named steps; CPS uses six distinct stages with different framing."}, {"from": "Delphi Method", "to": "Six Thinking Hats", "relationship": "alternative", "description": "Both are structured group decision-making processes that counteract social pressure biases \u2014 Delphi uses iterative anonymous rounds; Six Thinking Hats uses simultaneous parallel perspectives."}, {"from": "Ishikawa Conflict Resolution Diagram (Evaporating Cloud)", "to": "Principled Negotiation (Interest-Based Negotiation)", "relationship": "complements", "description": "The Evaporating Cloud surfaces the hidden assumption behind conflicting requirements; Principled Negotiation uses interests-not-positions thinking to find the same hidden win-win space \u2014 both dissolve apparent conflicts rather than compromise."}, {"from": "SPIN Selling", "to": "Socratic Method", "relationship": "extends", "description": "SPIN Selling is an application of Socratic questioning in a sales context \u2014 it uses guided questions to help buyers discover their own needs rather than the seller asserting solutions."}, {"from": "Four Levels of Listening (Theory U)", "to": "Active Listening", "relationship": "extends", "description": "Theory U's four listening levels begin at Downloading (the opposite of active listening) and progress through Active Listening toward Generative Listening \u2014 it provides a developmental hierarchy that places Active Listening in a larger framework."}, {"from": "Stakeholder Power-Interest Matrix (Mendelow's Matrix)", "to": "SCARF Model", "relationship": "complements", "description": "Mendelow's Matrix tells you who to engage and how; SCARF tells you what those stakeholders' neurological threat triggers are \u2014 combining them enables both strategic targeting and emotionally intelligent engagement."}, {"from": "Hero's Journey (Monomyth)", "to": "Story Spine", "relationship": "alternative", "description": "Both are narrative structure templates \u2014 the Hero's Journey provides a rich twelve-stage arc for complex stories; Story Spine is a minimal fill-in-the-blank template for quick well-formed story generation."}, {"from": "Overton Window", "to": "Inoculation Theory", "relationship": "complements", "description": "The Overton Window describes the current range of acceptable ideas; Inoculation Theory provides a mechanism for both defending that window against manipulation and deliberately shifting it over time."}, {"from": "Affect Heuristic", "to": "System 1 / System 2 Thinking", "relationship": "contains", "description": "The Affect Heuristic is a specific System 1 operation \u2014 emotional state is used as information input to judgment, bypassing the deliberate evidential analysis of System 2."}, {"from": "Base Rate Fallacy", "to": "Reference Class Forecasting", "relationship": "complements", "description": "Base Rate Fallacy describes the cognitive tendency to ignore base rates; Reference Class Forecasting is the structured technique that forces base rate incorporation into estimates."}, {"from": "Conjunction Fallacy", "to": "Representativeness Heuristic", "relationship": "contains", "description": "The Conjunction Fallacy is caused by the Representativeness Heuristic \u2014 the detailed scenario feels more representative of the prototype than the broader category, so it incorrectly seems more probable."}, {"from": "False Consensus Effect", "to": "Ingroup Bias", "relationship": "complements", "description": "False Consensus overestimates how many people share your views; Ingroup Bias shows you also favor those who do share your views \u2014 together they create echo chambers where your group seems like the rational majority."}, {"from": "Illusory Truth Effect", "to": "Availability Cascade", "relationship": "extends", "description": "Availability Cascade is a societal-scale amplification of the Illusory Truth Effect \u2014 repeated public discussion makes ideas feel truer (Illusory Truth), and that perceived truth further amplifies discussion in a cascade."}, {"from": "Peak-End Rule", "to": "Monroe's Motivated Sequence", "relationship": "complements", "description": "The Peak-End Rule shows that endings disproportionately shape memory of an experience; Monroe's Motivated Sequence ends with an Action step designed to be a strong, memorable close \u2014 leveraging peak-end dynamics."}, {"from": "Zeigarnik Effect", "to": "Getting Things Done (GTD)", "relationship": "complements", "description": "The Zeigarnik Effect explains why incomplete tasks occupy mental bandwidth (open loops); GTD's external capture system closes those loops, eliminating the cognitive load the Zeigarnik Effect predicts."}, {"from": "IKEA Effect", "to": "Endowment Effect", "relationship": "extends", "description": "The IKEA Effect is an extension of the Endowment Effect \u2014 we over-value things we own, and even more so things we partially built ourselves, because the construction effort amplifies the ownership sense."}, {"from": "Ben Franklin Effect", "to": "Commitment / Consistency (Cialdini)", "relationship": "complements", "description": "The Ben Franklin Effect shows that doing someone a favor increases liking through rationalization; this operates through the Commitment/Consistency principle \u2014 once you've acted in favor of someone, you maintain that consistent self-image."}, {"from": "Serial Position Effect", "to": "Minto Pyramid Principle (BLUF)", "relationship": "complements", "description": "The Serial Position Effect shows primacy and recency dominate memory; BLUF exploits the primacy effect by placing the conclusion first \u2014 the most important information occupies the strongest memory position."}, {"from": "Negativity Bias", "to": "Loss Aversion", "relationship": "extends", "description": "Loss Aversion is a specific domain application of the broader Negativity Bias \u2014 the general asymmetric weighting of negative over positive stimuli manifests in economic contexts as the ~2:1 loss/gain sensitivity ratio."}, {"from": "Optimism Bias", "to": "Planning Fallacy", "relationship": "extends", "description": "Planning Fallacy is the project/time-estimate manifestation of the broader Optimism Bias \u2014 the same unrealistic positive expectations that make us believe we're less likely to experience bad events also make us underestimate project duration."}, {"from": "Mere Exposure Effect", "to": "Cialdini's 7 Principles of Influence", "relationship": "complements", "description": "Mere Exposure Effect increases liking through repetition \u2014 this is the psychological mechanism underlying Cialdini's Liking principle when applied to repeated brand/message contact."}, {"from": "Curse of Knowledge", "to": "Feynman Technique", "relationship": "complements", "description": "Curse of Knowledge makes experts unable to communicate simply; Feynman Technique is the practice that forces experts to confront that curse by requiring plain-language explanation to an imagined novice."}, {"from": "Hot-Hand Fallacy", "to": "Gambler's Fallacy", "relationship": "alternative", "description": "Both are errors about random sequences \u2014 Gambler's Fallacy expects reversion after a streak (the sequence is 'due'); Hot-Hand Fallacy expects continuation of a streak (momentum is 'real') \u2014 opposite errors from the same misunderstanding of independence."}, {"from": "Google Effect (Digital Amnesia)", "to": "Getting Things Done (GTD)", "relationship": "complements", "description": "Google Effect shows we fail to encode externally-stored information; GTD exploits this intentionally \u2014 by externalizing commitments, it frees cognitive RAM, treating the system as intended cognitive offloading rather than memory failure."}, {"from": "Impact Bias", "to": "10-10-10 Rule", "relationship": "complements", "description": "Impact Bias causes us to overestimate how intensely future events will affect us; 10-10-10 corrects this by revealing that at 10 years, even major decisions lose their emotional charge \u2014 reducing fear-based inaction."}, {"from": "Plan Continuation Bias", "to": "OODA Loop", "relationship": "complements", "description": "Plan Continuation Bias causes dangerous persistence with original plans despite new disconfirming information; the OODA Loop's Observe-Orient cycle is a structural forcing function for continuous re-assessment that combats this bias."}, {"from": "Backfire Effect", "to": "Inoculation Theory", "relationship": "complements", "description": "Backfire Effect shows that direct counter-evidence can entrench beliefs; Inoculation Theory sidesteps this by pre-exposing people to weakened arguments before they form strong attachments \u2014 avoiding the defensive entrenchment."}, {"from": "Authority Bias", "to": "Ethos, Pathos, Logos (Rhetorical Triangle)", "relationship": "complements", "description": "Ethos (credibility) is the persuasive channel that exploits Authority Bias \u2014 establishing speaker authority activates the cognitive shortcut that makes people defer to credible sources."}, {"from": "Bandwagon Effect", "to": "Cialdini's 7 Principles of Influence", "relationship": "contains", "description": "The Bandwagon Effect is the cognitive mechanism underlying Cialdini's Social Proof principle \u2014 we adopt beliefs/behaviors because others do, especially under uncertainty."}, {"from": "Recency Bias", "to": "Bayesian Updating", "relationship": "complements", "description": "Recency Bias over-weights recent observations; Bayesian Updating corrects this by weighting new evidence proportionally to its likelihood ratio, preventing any single recent observation from dominating the posterior."}, {"from": "Halo Effect", "to": "Fundamental Attribution Error", "relationship": "complements", "description": "Halo Effect generalizes positive traits across unrelated dimensions; Fundamental Attribution Error attributes those traits to stable character rather than situation \u2014 together they produce systematically biased person-assessments."}, {"from": "Availability Cascade", "to": "Overton Window", "relationship": "extends", "description": "Availability Cascades are a mechanism for shifting the Overton Window \u2014 repeated public discussion makes previously extreme ideas feel normal and mainstream, expanding the window of acceptable discourse."}, {"from": "Law of Diminishing Returns", "to": "Pareto Principle (80/20 Rule)", "relationship": "complements", "description": "The Pareto Principle shows that 20% of inputs drive 80% of outputs; the Law of Diminishing Returns explains why \u2014 each additional unit of input yields less than the previous, making the first inputs disproportionately valuable."}, {"from": "Hedgehog Concept", "to": "Circle of Competence", "relationship": "extends", "description": "The Hedgehog Concept (passion + best-at + economic engine) is an organizational version of Circle of Competence \u2014 it defines the intersection where an organization has genuine, defensible expertise worth concentrating on."}, {"from": "North Star Metric", "to": "Goodhart's Law", "relationship": "complements", "description": "North Star Metric deliberately selects a metric that best captures customer value rather than a narrow business output \u2014 it is an attempt to choose a measure resistant to Goodhart's Law by anchoring on genuine value creation."}, {"from": "Problem Decomposition", "to": "Issue Trees (Logic Trees)", "relationship": "extends", "description": "Issue Trees formalize Problem Decomposition by adding the MECE constraint \u2014 Problem Decomposition is the general act; Issue Trees are the structured, logically rigorous methodology for doing it correctly."}, {"from": "Retrograde Analysis (Working Backwards)", "to": "Inversion", "relationship": "extends", "description": "Working Backwards is constructive Inversion \u2014 instead of asking 'what causes failure?', you ask 'what defines success?' and reason back. Both start from an end state and work backward to present conditions."}, {"from": "Veil of Ignorance", "to": "Principled Negotiation (Interest-Based Negotiation)", "relationship": "complements", "description": "The Veil of Ignorance helps design fair rules by removing positional self-interest; Principled Negotiation achieves similar fairness in live negotiations by using objective criteria rather than positional bargaining."}, {"from": "TRIZ (Theory of Inventive Problem Solving)", "to": "Constraint Relaxation", "relationship": "complements", "description": "TRIZ identifies 40 inventive principles for resolving engineering contradictions \u2014 many of those principles involve specific forms of constraint relaxation, segmentation, or dimension change."}, {"from": "Focused vs. Diffuse Thinking", "to": "Deep Work", "relationship": "complements", "description": "Deep Work creates conditions for sustained focused thinking; Focused vs. Diffuse Thinking shows that deliberately alternating with relaxed diffuse states (walks, sleep) produces better insights than unbroken focus \u2014 the two are compatible at different timescales."}, {"from": "Learning Pyramid / Cone of Experience", "to": "Deliberate Practice", "relationship": "complements", "description": "Learning Pyramid shows that active/teaching methods produce highest retention; Deliberate Practice is the methodology that operates at those highest-retention levels through feedback-driven challenge."}, {"from": "Survivor Bias", "to": "Disruption Theory (Disruptive Innovation)", "relationship": "complements", "description": "Survivorship Bias makes successful incumbents seem invulnerable (we see survivors); Disruption Theory explains the structural mechanism by which those seemingly strong incumbents are systematically vulnerable to low-end attack."}, {"from": "Parkinson's Law", "to": "Pomodoro Technique", "relationship": "complements", "description": "Parkinson's Law explains why tasks expand to fill available time; Pomodoro Technique counters this by imposing artificial time constraints (25-minute sprints) that compress work into focused units."}, {"from": "DESC Model", "to": "Situation-Behavior-Impact (SBI)", "relationship": "alternative", "description": "Both are assertive communication scripts for delivering feedback or addressing conflict without triggering defensiveness \u2014 DESC covers Describe/Express/Specify/Consequences; SBI covers Situation/Behavior/Impact with different framing."}, {"from": "I-Messages", "to": "Nonviolent Communication (NVC)", "relationship": "contains", "description": "I-Messages are the communication form that NVC operationalizes \u2014 NVC provides the full framework (observation, feeling, need, request) of which I-Messages are the feeling-expression component."}, {"from": "Authentic Leadership", "to": "Johari Window", "relationship": "complements", "description": "Authentic Leadership requires deep self-knowledge and transparent values; the Johari Window is a tool for developing that self-awareness and reducing the Hidden and Unknown quadrants through feedback and disclosure."}, {"from": "Servant Leadership", "to": "Psychological Safety", "relationship": "complements", "description": "Servant Leadership puts followers' needs first; this creates the caring environment that is a precondition for Psychological Safety \u2014 leaders who are seen as servants rather than threats make it safe to speak up."}, {"from": "Transformational Leadership (4 I's)", "to": "Growth Mindset", "relationship": "complements", "description": "Transformational Leadership's Intellectual Stimulation and Individualized Consideration dimensions directly cultivate Growth Mindset in followers \u2014 the leader creates the conditions for belief in developable capability."}, {"from": "Competing Hypotheses", "to": "Steel-Manning", "relationship": "alternative", "description": "Both force engagement with alternative views before concluding \u2014 Steel-Manning builds the strongest version of the opposing argument; analyzing competing hypotheses generates multiple candidates and evidence-tests them systematically."}, {"from": "Hedgehog Concept", "to": "Porter's Five Forces", "relationship": "complements", "description": "Porter's Five Forces identifies where industry profit is defensible from outside forces; the Hedgehog Concept identifies where organizational capability is genuinely world-class \u2014 combining them finds the intersection of structural advantage and internal excellence."}, {"from": "Hysteresis", "to": "Panarchy / Adaptive Cycle", "relationship": "complements", "description": "Panarchy describes how systems cycle through adaptive phases including collapse; Hysteresis explains why systems don't simply return to their prior state after disturbance \u2014 the path through the \u03a9 phase determines the \u03b1 reorganization outcome."}, {"from": "Tipping Point", "to": "Reinforcing Feedback Loop", "relationship": "extends", "description": "The Tipping Point is the moment when a Reinforcing Feedback Loop crosses a threshold and takes over \u2014 the shift from slow growth to exponential expansion as the loop's gain exceeds 1."}, {"from": "Tragedy of the Commons", "to": "Braess's Paradox", "relationship": "complements", "description": "Both describe failures where individually rational behavior produces collective harm \u2014 Tragedy of the Commons in resource depletion; Braess's Paradox in network routing. Together they illustrate that rational self-interest can systematically degrade shared systems."}, {"from": "Boiling Frog", "to": "Drifting Goals Archetype", "relationship": "complements", "description": "The Drifting Goals archetype explains the systemic mechanism of standard erosion; the Boiling Frog metaphor explains why humans fail to notice and respond \u2014 gradual change falls below the threshold of conscious detection."}, {"from": "Cynefin Framework", "to": "Decision Matrix", "relationship": "sequence", "description": "Cynefin classifies the domain first; only in Complicated/Clear domains does a weighted Decision Matrix apply \u2014 applying it in Complex domains produces false precision."}, {"from": "Cynefin Framework", "to": "OODA Loop", "relationship": "sequence", "description": "Cynefin's Chaotic domain prescribes act-first; OODA is the correct loop for chaotic, time-pressured situations where sensing precedes analysis."}, {"from": "Root Cause Analysis", "to": "Leverage Points", "relationship": "sequence", "description": "Root Cause Analysis surfaces the true cause; Leverage Points identifies at which level of the system intervening on that cause will actually change behavior."}, {"from": "Iceberg Model", "to": "Causal Loop Diagram (CLD)", "relationship": "sequence", "description": "Iceberg surfaces the structural layer beneath events; CLD makes those structures explicit by mapping the feedback loops that generate the patterns."}, {"from": "Five Whys", "to": "Fishbone Diagram (Ishikawa / Cause-and-Effect Diagram)", "relationship": "complements", "description": "Five Whys traces one causal chain vertically; Fishbone expands horizontally across all causal categories \u2014 together they prevent premature fixation on a single root cause."}, {"from": "Inversion", "to": "Pre-Mortem", "relationship": "extends", "description": "Inversion is the abstract principle (ask what causes failure); Pre-Mortem is the structured team ritual that operationalizes inversion before a project launches."}, {"from": "Pre-Mortem", "to": "Decision Matrix", "relationship": "sequence", "description": "Pre-Mortem generates the failure modes and risk factors that should become weighted criteria in a Decision Matrix evaluation of alternatives."}, {"from": "Second-Order Thinking", "to": "Scenario Planning", "relationship": "sequence", "description": "Second-Order Thinking asks 'and then what?' on a single path; Scenario Planning fans those second-order branches into coherent alternative futures for structured stress-testing."}, {"from": "Reframing", "to": "First Principles Thinking", "relationship": "sequence", "description": "Reframing shifts the problem statement; First Principles then decomposes the new framing to bedrock truths \u2014 preventing reframing from landing on an equally flawed problem."}, {"from": "Abstraction Laddering", "to": "Jobs to Be Done (JTBD)", "relationship": "extends", "description": "Abstraction Laddering moves up the purpose hierarchy; Jobs to Be Done is the product-specific instantiation of that upward move \u2014 asking what job the customer is actually hiring the product to do."}, {"from": "Divergent / Convergent Thinking", "to": "Brainstorming", "relationship": "contains", "description": "Divergent/Convergent is the meta-principle; Brainstorming, SCAMPER, and Reverse Brainstorming are specific techniques for the divergent phase before convergence tools (Decision Matrix, MECE) apply."}, {"from": "Shifting the Burden Archetype", "to": "Root Cause Analysis", "relationship": "sequence", "description": "Recognizing a Shifting the Burden dynamic diagnoses the pattern; Root Cause Analysis is the corrective \u2014 find and fix the fundamental solution the symptomatic fix is bypassing."}, {"from": "Goodhart's Law", "to": "North Star Metric", "relationship": "opposes", "description": "Goodhart's Law warns that any single metric becomes corrupted when used as a target; North Star Metric deliberately picks one number to optimize \u2014 the tension requires North Star to be defined at the level of genuine customer value, not a proxy."}, {"from": "Theory of Constraints (TOC)", "to": "Bottleneck Analysis", "relationship": "contains", "description": "Theory of Constraints is the complete management philosophy (including Drum-Buffer-Rope, exploit/elevate sequence); Bottleneck Analysis is the diagnostic step within it that finds which single constraint is binding."}, {"from": "Reinforcing Feedback Loop", "to": "Flywheel Effect", "relationship": "extends", "description": "Reinforcing Feedback Loop is the systems-thinking concept; Flywheel Effect is its strategic application \u2014 deliberately designing a business model whose growth creates the conditions for more growth."}, {"from": "Tipping Point", "to": "Diffusion of Innovation (S-Curve)", "relationship": "sequence", "description": "The Tipping Point marks the threshold at which adoption becomes self-sustaining; on the S-curve it corresponds to the inflection between early-majority uptake and mainstream acceleration."}, {"from": "Bayesian Updating", "to": "Probabilistic Thinking", "relationship": "extends", "description": "Probabilistic Thinking is the disposition to hold multiple outcomes with assigned likelihoods; Bayesian Updating is the formal mechanism for revising those likelihoods as new evidence arrives."}, {"from": "System 1 / System 2 Thinking", "to": "Cognitive Bias Firewall", "relationship": "contains", "description": "The entire catalog of cognitive biases is a taxonomy of System 1 errors \u2014 knowing the System 1/2 distinction explains why biases exist and when to invoke System 2 override protocols."}, {"from": "Minto Pyramid Principle (BLUF)", "to": "SCQA Framework", "relationship": "alternative", "description": "Both are top-down communication structures; Minto is best for recommendations and reports (answer first, then evidence); SCQA is best for narrative problem-framing where the audience needs context before the answer lands."}, {"from": "Psychological Safety", "to": "Radical Candor", "relationship": "sequence", "description": "Psychological Safety is the precondition \u2014 without it, Radical Candor's direct feedback triggers threat responses. Safety must exist before candid challenge becomes productive rather than punishing."}, {"from": "Radical Candor", "to": "Five Dysfunctions of a Team", "relationship": "sequence", "description": "Radical Candor directly addresses Dysfunction 2 (Fear of Conflict) and Dysfunction 3 (Lack of Commitment) by creating a culture of productive direct challenge."}, {"from": "Double-Loop Learning", "to": "Growth Mindset", "relationship": "complements", "description": "Growth Mindset is the motivational belief that effort improves ability; Double-Loop Learning is the cognitive process that makes that improvement systematic \u2014 questioning the assumptions behind the action, not just the action itself."}, {"from": "Deliberate Practice", "to": "Zone of Proximal Development (ZPD)", "relationship": "sequence", "description": "ZPD defines where learning happens (just beyond current ability with guidance); Deliberate Practice specifies how to practice within that zone \u2014 targeted, feedback-rich, weakness-focused sessions."}, {"from": "Pareto Principle (80/20 Rule)", "to": "Impact-Effort Matrix", "relationship": "sequence", "description": "Pareto identifies that a vital few inputs dominate outputs; the Impact-Effort Matrix operationalizes this by visually mapping which initiatives are the vital few (high impact, low effort)."}, {"from": "Disruption Theory (Disruptive Innovation)", "to": "Jobs to Be Done (JTBD)", "relationship": "complements", "description": "Disruption Theory explains how new entrants beat incumbents structurally; JTBD explains why customers switch \u2014 together they diagnose both the competitive mechanism and the customer motivation driving disruption."}, {"from": "Munger's Latticework of Mental Models", "to": "Cynefin Framework", "relationship": "sequence", "description": "Munger's Latticework is the meta-recommendation to build a diverse model library; Cynefin is the most important single node in that lattice \u2014 the routing model that tells you which other model to apply in a given context."}, {"from": "PDCA Cycle (Plan-Do-Check-Act)", "to": "Double-Loop Learning", "relationship": "sequence", "description": "PDCA is single-loop \u2014 it improves execution within existing assumptions. When PDCA cycles fail to converge on improvement, Double-Loop Learning is the escalation: question the plan's underlying assumptions, not just the execution."}, {"from": "Compounding", "to": "Deliberate Practice", "relationship": "complements", "description": "Compounding explains why small consistent skill gains accu
