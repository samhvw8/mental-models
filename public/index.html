 Bias", "oneLiner": "We judge probability by how closely something resembles our mental prototype, ignoring base rates.", "problem": "Produces stereotype-based judgments, ignores statistical base rates, and causes the conjunction fallacy.", "howItWorks": "When told 'Linda is a feminist bank teller,' people rate this as more probable than 'Linda is a bank teller' \u2014 a logical impossibility explained by Linda matching the feminist prototype better. Base rate neglect: we ignore that most people are not bank tellers, let alone feminist bank tellers. System 1 pattern-matches to prototypes rather than computing probabilities.", "origin": "Amos Tversky and Daniel Kahneman, 1974.", "r": 7, "connCount": 1}, {"id": 180, "name": "System 1 / System 2 Thinking", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Two modes of thought: fast/automatic/intuitive (System 1) vs. slow/deliberate/analytical (System 2) \u2014 most biases arise from System 1 being applied where System 2 is needed.", "problem": "Cognitive errors arise when fast, automatic thinking handles situations requiring careful analysis.", "howItWorks": "System 1 operates automatically, quickly, effortlessly, associatively, and emotionally. System 2 is slow, deliberate, effortful, and rule-governed. System 1 generates impressions; System 2 endorses or overrides them. Under cognitive load, time pressure, or distraction, System 2 disengages and System 1 dominates. Most heuristics and biases are System 1 shortcuts.", "origin": "Stanovich and West, 2000; popularized by Daniel Kahneman, 'Thinking, Fast and Slow,' 2011.", "r": 13, "connCount": 4}, {"id": 181, "name": "Ingroup Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We favor members of groups we belong to over outsiders, often unconsciously.", "problem": "Drives tribalism, nepotism, discrimination, and poor resource allocation in organizations.", "howItWorks": "Merely categorizing people into groups (even arbitrary ones, as in Tajfel's minimal group experiments) produces favoritism toward the ingroup. We perceive ingroup members as more competent, trustworthy, and deserving. The bias operates even when people sincerely believe they are impartial.", "origin": "Henri Tajfel and John Turner, Social Identity Theory, 1979.", "r": 7, "connCount": 1}, {"id": 182, "name": "Feynman Technique", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Expose gaps in your understanding by attempting to explain a concept in plain language, as if teaching a child.", "problem": "People mistake recognition (reading notes and feeling familiar) for actual understanding.", "howItWorks": "Four steps: (1) choose a topic; (2) explain it in simple language without jargon; (3) identify where the explanation breaks down or becomes vague; (4) return to source material to fill those gaps, then re-explain. The breakdown points are precisely where real learning is needed. Combats the illusion of competence.", "origin": "Named after physicist Richard Feynman (1918\u20131988); not formally published by him but derived from his learning practices.", "r": 11, "connCount": 3}, {"id": 183, "name": "Spacing Effect (Spaced Repetition)", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Distributing study sessions over time produces far better long-term retention than massing them (cramming).", "problem": "Cramming produces rapid forgetting; students mistake short-term fluency for durable learning.", "howItWorks": "Ebbinghaus's forgetting curve shows memory decays exponentially after learning. Reviewing just before the point of forgetting (expanding intervals: 1 day, 3 days, 1 week, 1 month\u2026) strengthens the memory trace most efficiently. Spaced repetition systems (Anki, SuperMemo) automate scheduling. Combined with retrieval practice (testing), retention improves 150%+ vs. re-reading.", "origin": "Hermann Ebbinghaus, 1885; Sebastian Leitner's flashcard system, 1972; Piotr Wozniak's SuperMemo algorithm, 1987.", "r": 9, "connCount": 2}, {"id": 184, "name": "Interleaving", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Mixing different topics or problem types during practice produces better learning than drilling one type at a time.", "problem": "Blocked practice (all of type A, then all of type B) feels productive but produces fragile, context-dependent learning.", "howItWorks": "Interleaved practice forces the brain to retrieve and re-apply the right strategy for each problem type, strengthening discrimination. The 'desirable difficulty' of switching makes practice feel harder but produces superior long-term retention and transfer. Distinct from spacing: interleaving fills rest periods with different learning material.", "origin": "Robert Bjork's 'desirable difficulties' research; Rohrer and Taylor, 2007.", "r": 7, "connCount": 1}, {"id": 185, "name": "Deliberate Practice", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Expert performance is built through focused, feedback-driven practice on specific weaknesses \u2014 not mere accumulated hours.", "problem": "Time-on-task alone does not produce expertise; most 'practice' is mindless repetition that plateaus quickly.", "howItWorks": "Five components: (1) specific goal just beyond current ability; (2) full concentration; (3) immediate feedback; (4) reflection and error correction; (5) mental representation building. Not inherently enjoyable \u2014 it's cognitively demanding. Gladwell's '10,000 hours' misreads Ericsson: quality and structure of practice matter far more than quantity.", "origin": "K. Anders Ericsson, 'The Role of Deliberate Practice in the Acquisition of Expert Performance,' 1993; book 'Peak,' 2016.", "r": 17, "connCount": 6}, {"id": 186, "name": "Growth Mindset", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "The belief that abilities and intelligence are developable through effort, strategy, and learning \u2014 not fixed traits.", "problem": "Fixed mindset causes people to avoid challenges, give up at setbacks, and interpret failure as evidence of inadequacy.", "howItWorks": "Fixed mindset: every situation is a judgment on your innate ability \u2192 avoidance, defensiveness, blame. Growth mindset: every challenge is information about what to practice \u2192 persistence, feedback-seeking, resilience. Praise process ('you worked hard') over outcome ('you're smart') to cultivate it. Neural plasticity is the scientific foundation.", "origin": "Carol Dweck, Stanford University; 'Mindset: The New Psychology of Success,' 2006.", "r": 11, "connCount": 3}, {"id": 187, "name": "Bloom's Taxonomy", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "A six-level hierarchy of cognitive skills, from rote recall at the bottom to creative synthesis at the top.", "problem": "Education and training often stops at recall, producing learners who can recite facts but cannot apply or evaluate them.", "howItWorks": "Six levels in ascending order: Remember \u2192 Understand \u2192 Apply \u2192 Analyze \u2192 Evaluate \u2192 Create. Lower levels are prerequisites for higher ones. Effective learning objectives and assessments should target the highest relevant level, not default to recall. Revised by Krathwohl in 2001 to add the 'Create' level.", "origin": "Benjamin Bloom and committee, 1956; revised by Lorin Anderson and David Krathwohl, 2001.", "r": 9, "connCount": 2}, {"id": 188, "name": "Kolb's Learning Cycle", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Learning requires cycling through four stages: concrete experience, reflection, abstract conceptualization, and active experimentation.", "problem": "People often skip stages (reflect but never experiment; act but never reflect), producing incomplete or fragile learning.", "howItWorks": "Four stages: (1) Concrete Experience \u2014 do something; (2) Reflective Observation \u2014 analyze what happened; (3) Abstract Conceptualization \u2014 build/update mental model; (4) Active Experimentation \u2014 test the new model. Entry point varies by learning style; full cycle is required for deep learning. Organizations often skip reflection under time pressure.", "origin": "David Kolb, 1984, drawing on Dewey, Piaget, and Lewin.", "r": 9, "connCount": 2}, {"id": 189, "name": "Zone of Proximal Development (ZPD)", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Learning happens optimally in the zone between what you can do alone and what you can do with expert guidance.", "problem": "Tasks too easy produce no growth; tasks too hard produce frustration and failure. Optimal challenge is rarely calibrated.", "howItWorks": "ZPD is the gap between current independent capability and potential capability with scaffolding (expert guidance, tools, peers). The 'scaffolding' metaphor: provide just enough support to reach the next level, then withdraw it to consolidate independence. Deliberate practice and stretch goals operationalize the ZPD concept in adult learning.", "origin": "Lev Vygotsky, 1930s (published posthumously); major influence on educational scaffolding theory.", "r": 11, "connCount": 3}, {"id": 190, "name": "Double-Loop Learning", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Beyond fixing errors in action (single-loop), question the underlying assumptions and values that generated the action.", "problem": "Organizations and individuals keep repeating the same mistakes because they fix symptoms without examining the faulty mental models causing them.", "howItWorks": "Single-loop: detect error \u2192 adjust behavior \u2192 repeat. Thermostat analogy: it adjusts heat but never questions whether the target temperature is right. Double-loop: detect error \u2192 question governing assumptions \u2192 update mental model \u2192 change behavior from a new foundation. Requires psychological safety; threatened people revert to single-loop defensiveness.", "origin": "Chris Argyris, Harvard Business Review, 1977; 'Teaching Smart People How to Learn,' 1991.", "r": 13, "connCount": 4}, {"id": 191, "name": "Learning Pyramid / Cone of Experience", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Active learning methods (teaching others, practice) produce dramatically higher retention than passive methods (lecture, reading).", "problem": "Traditional education over-relies on passive delivery methods with low retention.", "howItWorks": "Edgar Dale's original 1946 Cone of Experience classified media by abstractness (verbal \u2192 real experience). Later organizations added specific retention percentages (lecture 5%, teaching others 90%) that are NOT scientifically validated. The directional principle \u2014 active beats passive \u2014 IS well-supported. The specific percentages are educational mythology. Use as a directional heuristic, not as precise data.", "origin": "Edgar Dale, 1946; specific percentages popularized but not validated by NTL Institute.", "r": 7, "connCount": 1}, {"id": 192, "name": "Ebbinghaus Forgetting Curve", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Without reinforcement, memory decays exponentially \u2014 most forgetting happens within hours of learning.", "problem": "Learners are surprised by how much they forget; study strategies don't account for memory decay.", "howItWorks": "Ebbinghaus found retention drops ~56% within 1 hour, ~66% within 24 hours, and ~75% within 6 days of initial learning (for meaningless syllables; meaningful content decays more slowly). Each review 'resets and flattens' the curve. Spaced repetition uses this curve to schedule reviews at mathematically optimal intervals.", "origin": "Hermann Ebbinghaus, '\u00dcber das Ged\u00e4chtnis,' 1885.", "r": 7, "connCount": 1}, {"id": 193, "name": "Retrieval Practice / Testing Effect", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Actively recalling information strengthens memory far more than passively re-reading it.", "problem": "Students default to re-reading (passive), which creates false fluency while producing poor long-term retention.", "howItWorks": "The act of retrieval \u2014 not the exposure \u2014 strengthens the memory trace. Even failed retrieval attempts (followed by correct answer) produce better long-term retention than re-study. Flashcards, practice tests, and 'close the book and write what you remember' all leverage this. Combined with spaced repetition, produces 150%+ retention advantage over re-reading.", "origin": "Cattell (1887) first noted it; Roediger and Karpicke, 2006, provided influential experimental evidence.", "r": 7, "connCount": 1}, {"id": 194, "name": "Metacognition", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Thinking about your own thinking \u2014 monitoring and regulating your cognitive processes.", "problem": "Without metacognition, people don't notice when their understanding is illusory, their strategies are ineffective, or their biases are active.", "howItWorks": "Two components: (1) metacognitive knowledge \u2014 knowing about your own cognitive strengths, weaknesses, and strategies; (2) metacognitive regulation \u2014 monitoring comprehension in real time and adjusting strategy when understanding fails. High metacognitive skill correlates with academic achievement and professional expertise. Dunning-Kruger is fundamentally a metacognition failure.", "origin": "John Flavell coined the term in 1976; Vygotsky's work on inner speech is an antecedent.", "r": 7, "connCount": 1}, {"id": 195, "name": "Focused vs. Diffuse Thinking", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Alternating between intense focused attention and relaxed unfocused mind produces better learning and creativity than sustained focus alone.", "problem": "People force continuous concentration, blocking the subconscious consolidation and insight that diffuse mode enables.", "howItWorks": "Focused mode: tight attention to a specific problem, activates known neural pathways. Diffuse mode: relaxed background processing, activates broader neural connections and produces insight. Switching is the key: study hard, then rest. Sleep, exercise, and shower are diffuse mode activators. Explains why solutions appear after stepping away.", "origin": "Popularized by Barbara Oakley in 'A Mind for Numbers,' 2014; based on neuroscience research on default mode network.", "r": 7, "connCount": 1}, {"id": 196, "name": "What? So What? Now What?", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "A three-stage reflective framework: describe what happened, extract its significance, then determine action.", "problem": "People reflect without structure, producing either shallow description or endless rumination without actionable output.", "howItWorks": "What? \u2014 observable facts, no interpretation. So What? \u2014 meaning, implications, lessons. Now What? \u2014 specific actions to take. Forces separation of observation from interpretation from decision. Applicable to individual debriefs, team retrospectives, and after-action reviews. Simple enough to use in real time.", "origin": "Adapted from John Driscoll's reflective practice model (1994); popularized in coaching and organizational learning.", "r": 7, "connCount": 1}, {"id": 197, "name": "Munger's Latticework of Mental Models", "category": "learning", "color": "#16a085", "catLabel": "Learning", "oneLiner": "Build a diverse library of models from multiple disciplines and use them as lenses to analyze any problem.", "problem": "Specialists apply the same narrow framework to every problem ('to a man with a hammer, everything looks like a nail').", "howItWorks": "Actively collect 80\u2013100 fundamental models from mathematics, physics, biology, psychology, economics, and history. When facing a problem, run it through multiple lenses. Convergent signals across models increase confidence; contradictions reveal complexity. The models don't give answers \u2014 they generate better questions.", "origin": "Charlie Munger, Vice Chairman of Berkshire Hathaway; 'Poor Charlie's Almanack' (2005).", "r": 9, "connCount": 2}, {"id": 198, "name": "Base Rate Fallacy", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We ignore population-level statistics (base rates) when evaluating individual cases, focusing instead on vivid specific information.", "problem": "Leads to wildly miscalibrated probability assessments in medicine, investment, security, and hiring.", "howItWorks": "Given 'this person tested positive for a rare disease (1% prevalence) with a 95% accurate test,' most people guess ~95% chance the person has the disease. The correct answer is ~16% (Bayes' theorem accounts for the many false positives from the 99% without the disease). Representativeness heuristic crowds out base rates. Kahneman's 'outside view' (reference class forecasting) is the counter.", "origin": "Bar-Hillel, 1980; related to Kahneman and Tversky's representativeness heuristic research.", "r": 7, "connCount": 1}, {"id": 199, "name": "Conjunction Fallacy", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We judge a specific, detailed scenario as more probable than a broader, less specific one that contains it.", "problem": "Vivid, representative details make implausible combinations feel more likely than simple possibilities.", "howItWorks": "Classic example: 'Linda is a feminist bank teller' rated as more probable than 'Linda is a bank teller,' despite the latter being the logical superset. The conjunction (A AND B) can never be more probable than either A or B alone. The representativeness heuristic overrides this logic because Linda matches the feminist prototype more strongly.", "origin": "Amos Tversky and Daniel Kahneman, 1983.", "r": 7, "connCount": 1}, {"id": 200, "name": "Hot-Hand Fallacy", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "After a streak of successes, we believe the winning streak will continue due to some persistent state \u2014 even in random processes.", "problem": "Mispredicts performance continuation, leads to overinvestment in 'hot' stocks, athletes, and strategies.", "howItWorks": "Opposite of the gambler's fallacy but same root: pattern-seeking in randomness. We perceive non-existent momentum. Originally studied in basketball (players 'on fire'), Gilovich et al. (1985) found no statistical hot hand. Reanalysis with corrected methodology (Miller and Sanjurjo, 2018) found a small real hot-hand effect, making this a partially contested finding.", "origin": "Thomas Gilovich, Robert Vallone, and Amos Tversky, 1985.", "r": 7, "connCount": 1}, {"id": 201, "name": "Impact Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We overestimate how intensely and how long future emotional events (good or bad) will affect us.", "problem": "Drives over-pursuit of goals whose achievement disappoints, and excessive fear of setbacks that are actually manageable.", "howItWorks": "Focalism: when imagining a future event, we zoom in on it and ignore the many other things that will fill our attention and moderate our reaction. 'Psychological immune system' \u2014 resilience mechanisms we don't anticipate \u2014 also attenuates emotional impact. Getting a promotion or losing a job rarely changes long-term happiness as much as predicted.", "origin": "Daniel Gilbert and Timothy Wilson, 2000; 'affective forecasting' research.", "r": 7, "connCount": 1}, {"id": 202, "name": "Plan Continuation Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We persist with an original plan even when new information clearly indicates we should change course.", "problem": "Causes aviation accidents, business failures, and military disasters when original plans no longer fit changed reality.", "howItWorks": "Desire for structure and goal commitment creates rigidity. The sunk cost of the original plan and the cognitive cost of re-planning both push toward continuation. Organizations codify this as 'stay the course' despite changing conditions. Pre-established decision gates and explicit 'what would cause us to change plan?' criteria counteract it.", "origin": "NTSB accident reports in aviation; Charles Dismukes and colleagues formalized the concept in safety research.", "r": 7, "connCount": 1}, {"id": 203, "name": "Google Effect (Digital Amnesia)", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We fail to encode information into memory when we know it's stored and easily retrievable externally.", "problem": "Outsourcing memory to search engines reduces internalized knowledge and the deep connections that enable creative thinking.", "howItWorks": "Sparrow et al. (2011) showed people remember where to find information better than the information itself when they believe it will be saved. The brain rationally offloads to external storage, but loses the serendipitous mental connections that come from holding knowledge internally. Related to the Extended Mind Thesis \u2014 but with costs to deep understanding.", "origin": "Betsy Sparrow, Jenny Liu, and Daniel Wegner, 2011.", "r": 7, "connCount": 1}, {"id": 204, "name": "Pomodoro Technique", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Break work into 25-minute focused sprints separated by short breaks to maintain concentration.", "problem": "Mental fatigue and distraction erode focus over long uninterrupted work sessions.", "howItWorks": "Set a timer for 25 minutes, work with full focus on one task, take a 5-minute break. After 4 Pomodoros, take a 15-30 minute break. The timer creates artificial urgency (countering Parkinson's Law) and the breaks prevent cognitive depletion.", "origin": "Francesco Cirillo, late 1980s; named after a tomato-shaped kitchen timer (pomodoro = Italian for tomato)", "r": 9, "connCount": 2}, {"id": 205, "name": "Getting Things Done (GTD)", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Capture every commitment into a trusted external system to free the mind for actual thinking.", "problem": "Mental overhead of tracking open loops (tasks, commitments, ideas) drains cognitive capacity needed for deep work.", "howItWorks": "Five stages: Capture (externalize everything), Clarify (is it actionable?), Organize (by context/priority), Reflect (weekly review), Engage (do the right thing now). The key insight: your brain is for having ideas, not holding them.", "origin": "David Allen, book 'Getting Things Done', 2001", "r": 13, "connCount": 4}, {"id": 206, "name": "Time Blocking", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Assign every hour of the workday a specific task or category of work \u2014 give every minute a job.", "problem": "Reactive, interrupt-driven work prevents sustained progress on deep, high-value tasks.", "howItWorks": "Plan your day in advance by blocking calendar slots for specific work types (deep work, admin, meetings, creative). Treat blocks as appointments with yourself. Leave buffer blocks for overflow. Cal Newport calls it 'the most productive thing I do.'", "origin": "Popularized by Cal Newport in 'Deep Work' (2016); concept predates Newport but he systematized it", "r": 7, "connCount": 1}, {"id": 207, "name": "Eat the Frog", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Tackle your most important (and dreaded) task first thing in the morning before anything else.", "problem": "Procrastination on high-impact tasks because easier, lower-value work gets done first.", "howItWorks": "Identify the single most important task \u2014 the one you're most likely to avoid. Do it immediately, before email or meetings. Decision fatigue and willpower are highest at day start. Completing it creates momentum for the rest of the day.", "origin": "Brian Tracy, book 'Eat That Frog!' (2001); attributed conceptually to a Mark Twain quote", "r": 7, "connCount": 1}, {"id": 208, "name": "Two-Minute Rule", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "If a task takes less than two minutes, do it immediately rather than capturing it in a system.", "problem": "Small tasks accumulate in to-do lists and create overhead disproportionate to their actual execution time.", "howItWorks": "When processing inputs (email, requests, ideas), apply the test: can this be done in under 2 minutes? If yes, do it now. If no, defer, delegate, or delete. The overhead of tracking often exceeds the task itself for micro-tasks.", "origin": "David Allen, 'Getting Things Done' (2001); a core GTD heuristic", "r": 7, "connCount": 1}, {"id": 209, "name": "Batching", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Group similar tasks together and process them in a single dedicated block to reduce context-switching cost.", "problem": "Constant context-switching between different task types (email, creative work, calls) destroys flow and wastes cognitive ramp-up time.", "howItWorks": "Cluster similar tasks \u2014 all email in one block, all calls in another, all writing in another. Each switch between task types costs 10-20 minutes of reorientation time. Batching amortizes that cost. Works best combined with Time Blocking.", "origin": "Operations management principle (batch processing); popularized in knowledge work by Tim Ferriss in 'The 4-Hour Workweek' (2007)", "r": 7, "connCount": 1}, {"id": 210, "name": "Deep Work", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Professional activities performed in distraction-free concentration that push cognitive limits produce rare and valuable output.", "problem": "Knowledge work is increasingly fragmented by shallow tasks (email, meetings, social media), producing busyness without real output.", "howItWorks": "Schedule protected blocks (2-4+ hours) of single-task focus with zero interruptions. Eliminate shallow work ruthlessly. Cultivate the ability to concentrate deeply as a skill \u2014 it atrophies without practice. Use rituals to enter and exit deep work states.", "origin": "Cal Newport, book 'Deep Work: Rules for Focused Success in a Distracted World' (2016)", "r": 9, "connCount": 2}, {"id": 211, "name": "Flow State", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Optimal performance occurs in a state of full immersion where challenge matches skill \u2014 time disappears and output peaks.", "problem": "Work that is too easy breeds boredom; too hard breeds anxiety. Neither produces peak performance.", "howItWorks": "Flow is triggered when task difficulty slightly exceeds current skill level, creating engaged stretch. Prerequisites: clear goals, immediate feedback, perceived control, minimal interruption. To induce flow: remove distractions, set clear micro-goals, match task to skill level.", "origin": "Mihaly Csikszentmihalyi, psychologist; coined the concept in research in the 1970s, popularized in book 'Flow' (1990)", "r": 9, "connCount": 2}, {"id": 212, "name": "SMART Goals", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Goals must be Specific, Measurable, Achievable, Relevant, and Time-bound to drive real execution.", "problem": "Vague goals ('be more productive', 'grow the business') provide no clear path to action or completion criteria.", "howItWorks": "For each goal, test against 5 criteria: Specific (what exactly?), Measurable (how will you know?), Achievable (realistic stretch?), Relevant (aligned with larger purpose?), Time-bound (by when?). A goal failing any criterion should be rewritten before acting.", "origin": "First formalized by George T. Doran in a 1981 Management Review paper 'There's a SMART way to write management's goals and objectives'", "r": 7, "connCount": 1}, {"id": 213, "name": "OKRs (Objectives and Key Results)", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Connect ambitious qualitative objectives to 3-5 specific measurable outcomes that define what achievement looks like.", "problem": "Goals either stay abstract and uninspiring or get too tactical without connecting to strategic direction.", "howItWorks": "Set an Objective (inspiring, qualitative, what you want to achieve) plus 3-5 Key Results (specific, measurable outcomes that would prove the objective was met). Review quarterly. Grade 0-1 \u2014 a 0.7 grade is ideal; 1.0 means the goal wasn't ambitious enough.", "origin": "Andy Grove at Intel in the 1970s; evangelized at Google by John Doerr (1999); popularized by John Doerr's book 'Measure What Matters' (2018)", "r": 7, "connCount": 1}, {"id": 214, "name": "North Star Metric", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "One single metric that best captures the core value your product delivers \u2014 everything else aligns to move this number.", "problem": "Teams optimize local metrics (revenue, downloads, page views) that don't reflect whether the product is genuinely delivering value.", "howItWorks": "Identify the single metric that correlates most strongly with long-term customer value and retention. All teams should understand how their work affects this metric. It guides prioritization but must be paired with guardrail metrics to prevent gaming.", "origin": "Product management practice popularized at companies like Airbnb (nights booked), Facebook (DAU), Spotify (time listening); codified by Sean Ellis and growth hacking community circa 2010s", "r": 11, "connCount": 3}, {"id": 215, "name": "Porter's Five Forces", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Map five structural forces \u2014 rivalry, buyer power, supplier power, substitutes, new entrants \u2014 to assess industry profitability.", "problem": "Companies set strategy based on direct competitor moves alone, missing the structural forces that actually determine long-run profitability.", "howItWorks": "Score each of five forces (competitive rivalry, threat of new entrants, threat of substitutes, buyer bargaining power, supplier bargaining power) as high/medium/low. High forces compress margins. Strategy aims to find positions where forces are weak, or to change the forces themselves.", "origin": "Michael E. Porter, Harvard Business School, book 'Competitive Strategy' (1980)", "r": 13, "connCount": 4}, {"id": 216, "name": "SWOT Analysis", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Map internal Strengths and Weaknesses against external Opportunities and Threats to guide strategic choices.", "problem": "Strategy is formed without systematically auditing what the organization can and can't do relative to what the environment offers.", "howItWorks": "Fill a 2x2: internal (Strengths, Weaknesses) and external (Opportunities, Threats). Then cross-analyze: use strengths to exploit opportunities (SO), use strengths to avoid threats (ST), address weaknesses to capture opportunities (WO), minimize weakness + threat exposure (WT).", "origin": "Developed at Stanford Research Institute by Albert Humphrey et al. in the 1960s-70s through Fortune 500 research", "r": 9, "connCount": 2}, {"id": 217, "name": "Blue Ocean Strategy", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Create uncontested market space by making competition irrelevant through value innovation \u2014 offer more value at lower cost.", "problem": "Most companies fight in 'red oceans' (existing competitive markets), competing on the same dimensions and eroding margins.", "howItWorks": "Use the Four Actions Framework: Eliminate factors the industry takes for granted, Reduce factors below industry standard, Raise factors above industry standard, Create new factors the industry never offered. The result: a new value curve that serves non-customers and defies the cost-differentiation tradeoff.", "origin": "W. Chan Kim and Ren\u00e9e Mauborgne, INSEAD; book 'Blue Ocean Strategy' (2005)", "r": 9, "connCount": 2}, {"id": 218, "name": "BCG Matrix (Growth-Share Matrix)", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Plot business units or products on market growth vs. relative market share to guide portfolio investment decisions.", "problem": "Resource allocation across multiple products or business units is made subjectively without a systematic framework.", "howItWorks": "Place each product in one of four cells: Stars (high growth, high share \u2014 invest), Cash Cows (low growth, high share \u2014 harvest for cash), Question Marks (high growth, low share \u2014 decide: invest or divest), Dogs (low growth, low share \u2014 divest or minimize). Cash cows fund stars.", "origin": "Bruce D. Henderson, Boston Consulting Group, 1970", "r": 7, "connCount": 1}, {"id": 219, "name": "Jobs to Be Done (JTBD)", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Customers don't buy products \u2014 they hire them to get a specific job done in their lives.", "problem": "Product decisions based on customer demographics or competitor features miss the actual motivation behind purchase and use.", "howItWorks": "For each product/feature, define the functional, social, and emotional 'job' the customer is trying to accomplish. Identify the struggling moment that prompts hiring a solution. Compete at the job level, not the product category level. Reveals non-obvious competitors and unserved needs.", "origin": "Tony Ulwick coined JTBD in 1990; Clayton Christensen popularized it in 'The Innovator's Solution' (2003) and Harvard Business Review", "r": 13, "connCount": 4}, {"id": 220, "name": "Lean Canvas", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "A one-page business model focused on problems, solutions, metrics, and unfair advantage \u2014 built for early-stage validation.", "problem": "Traditional business plans take months and become obsolete before execution; founders need a rapid model for testing assumptions.", "howItWorks": "Fill 9 boxes: Problem (top 3 problems), Solution, Unique Value Proposition, Unfair Advantage, Customer Segments, Key Metrics, Channels, Cost Structure, Revenue Streams. Start with the problem box, not the solution. Each box is a hypothesis to test, not a commitment.", "origin": "Ash Maurya, 2010; adaptation of Alexander Osterwalder's Business Model Canvas, layered with Lean Startup principles", "r": 11, "connCount": 3}, {"id": 221, "name": "Minimum Viable Product (MVP)", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "The smallest version of a product that collects maximum validated learning about customers with minimum effort.", "problem": "Teams build full products based on unvalidated assumptions, wasting months of effort on features nobody wants.", "howItWorks": "Identify the riskiest assumption in the business model. Build the simplest possible artifact (landing page, prototype, concierge service) that tests that assumption with real customers. Measure behavior (not opinions). Learn. Decide: persist, pivot, or kill. Speed of learning beats thoroughness of build.", "origin": "Frank Robinson coined 'MVP' circa 2001; Eric Ries systematized it in 'The Lean Startup' (2011)", "r": 9, "connCount": 2}, {"id": 222, "name": "Build-Measure-Learn", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "The core Lean Startup feedback loop: build something, measure what happens, learn whether to continue or pivot.", "problem": "Long development cycles with no customer feedback produce products disconnected from market reality.", "howItWorks": "Start with a hypothesis (leap of faith assumption). Build the smallest possible test. Measure using actionable metrics (not vanity metrics). Learn: was the hypothesis valid? If yes, persist and optimize. If no, pivot \u2014 make a structured change to strategy. Minimize time per loop.", "origin": "Eric Ries, 'The Lean Startup' (2011); adapted from the Deming/Shewhart PDCA cycle for startup contexts", "r": 11, "connCount": 3}, {"id": 223, "name": "Flywheel Effect", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Sustained, focused effort in one direction compounds over time \u2014 momentum builds until the flywheel spins itself.", "problem": "Organizations seek single breakthrough moments or silver bullets, missing that greatness comes from compound incremental improvements.", "howItWorks": "Map a virtuous cycle specific to the business (e.g., Amazon: low prices \u2192 more customers \u2192 more sellers \u2192 more selection \u2192 lower costs \u2192 lower prices). Push consistently on every component. No single push creates the momentum \u2014 it's the accumulation. Identify and reinforce your unique flywheel.", "origin": "Jim Collins, 'Good to Great' (2001); Amazon famously applied it as a core strategic framework", "r": 9, "connCount": 2}, {"id": 224, "name": "Compounding", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Small consistent gains multiply exponentially over time \u2014 the most powerful force in business, investing, and learning.", "problem": "Humans undervalue gradual improvement because the exponential nature of compounding is counterintuitive to linear thinking.", "howItWorks": "Apply the compound growth formula: a 1% daily improvement yields 37x improvement over a year. Identify compounding assets: skills, reputation, relationships, code, content, capital. Protect them. Avoid interruptions \u2014 compounding is destroyed by volatility. Time in the game beats peak performance.", "origin": "Mathematical concept; applied to business by Warren Buffett and Charlie Munger; popularized as a mental model by Naval Ravikant and James Clear", "r": 9, "connCount": 2}, {"id": 225, "name": "Theory of Constraints (TOC)", "category": "problem-solving", "color": "#e67e22", "catLabel": "Problem Solving", "oneLiner": "Every system has exactly one bottleneck limiting output \u2014 improve nothing else until you fix that constraint.", "problem": "Optimization efforts spread across the whole system produce minimal gains; most work is on non-bottlenecks.", "howItWorks": "Five Focusing Steps: (1) Identify the constraint. (2) Exploit it \u2014 squeeze maximum throughput without changing anything. (3) Subordinate everything else to the constraint. (4) Elevate the constraint \u2014 invest to increase its capacity. (5) Repeat \u2014 once fixed, a new constraint emerges. Never optimize non-constraints.", "origin": "Eliyahu M. Goldratt, Israeli physicist/businessman, book 'The Goal' (1984)", "r": 15, "connCount": 5}, {"id": 226, "name": "Bottleneck Analysis", "category": "problem-solving", "color": "#e67e22", "catLabel": "Problem Solving", "oneLiner": "Systematically identify which single resource or step constrains total system throughput.", "problem": "Performance improvement efforts are applied uniformly across a process when only one constraint actually limits output.", "howItWorks": "Map the full value stream or process. Find the step with the lowest capacity or longest queue. That step is the bottleneck \u2014 it determines the system's output ceiling. Remove or expand it, then find the next constraint. Use data (cycle times, queue depths) not intuition.", "origin": "Industrial engineering; formalized in Theory of Constraints by Eliyahu Goldratt (1984)", "r": 9, "connCount": 2}, {"id": 227, "name": "Critical Path Method (CPM)", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Identify the longest chain of dependent tasks in a project \u2014 that chain determines the minimum completion time.", "problem": "Projects slip because resources are applied to non-critical tasks while the true duration bottleneck (the critical path) gets insufficient attention.", "howItWorks": "Map all tasks, their durations, and dependencies. Calculate earliest/latest start-finish for each. The critical path is the longest chain with zero float \u2014 any delay here delays the whole project. Compress the project by accelerating critical path tasks only.", "origin": "James E. Kelley Jr. (Remington Rand) and Morgan R. Walker (DuPont), late 1950s", "r": 7, "connCount": 1}, {"id": 228, "name": "PDCA Cycle (Plan-Do-Check-Act)", "category": "problem-solving", "color": "#e67e22", "catLabel": "Problem Solving", "oneLiner": "Iterative four-step cycle for continuous improvement: plan a change, do it, check results, act on what you learned.", "problem": "Organizations implement changes without structured feedback loops, repeating mistakes or failing to lock in improvements.", "howItWorks": "Plan: identify a problem and hypothesize a solution. Do: run a small experiment. Check: measure outcomes against the hypothesis. Act: if it worked, standardize; if not, revise the hypothesis. Loop indefinitely. Each cycle produces learning, not just output.", "origin": "Walter Shewhart (1930s, Bell Labs) developed the foundation; W. Edwards Deming taught and popularized it in postwar Japan", "r": 13, "connCount": 4}, {"id": 229, "name": "Wardley Mapping", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Map every component of your value chain by visibility to the user and evolutionary maturity \u2014 then exploit where things are heading.", "problem": "Strategy is made without situational awareness \u2014 leaders don't know what's evolving into a commodity or where competitors will attack next.", "howItWorks": "Draw a map: Y-axis = visibility to user (user need at top, infrastructure at bottom). X-axis = evolution (genesis \u2192 custom \u2192 product \u2192 commodity). Position every component. Patterns emerge: where to build vs. buy, where disruption will come, where to invest. Anticipate moves because evolution is predictable.", "origin": "Simon Wardley, Fotango, 2005; developed further at Canonical UK 2008-2010", "r": 7, "connCount": 1}, {"id": 230, "name": "Ansoff Matrix", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Four growth strategies mapped by product (existing/new) and market (existing/new) to assess risk and direction.", "problem": "Growth strategy defaults to one approach without systematically evaluating the risk/reward of different expansion directions.", "howItWorks": "Four cells: Market Penetration (existing product, existing market \u2014 lowest risk), Market Development (existing product, new market), Product Development (new product, existing market), Diversification (new product, new market \u2014 highest risk). Risk increases as you move from known to unknown dimensions.", "origin": "H. Igor Ansoff, 'Strategies for Diversification', Harvard Business Review, 1957", "r": 9, "connCount": 2}, {"id": 231, "name": "McKinsey 7S Framework", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Seven interdependent organizational elements must be aligned for strategy execution \u2014 change one, all others must adapt.", "problem": "Strategic plans fail in implementation because hard factors (structure, strategy, systems) are changed without adjusting soft factors (skills, staff, style, shared values).", "howItWorks": "Map the seven elements: Strategy, Structure, Systems (hard/tangible) and Shared Values, Skills, Staff, Style (soft/cultural). The center \u2014 Shared Values \u2014 is the most important. Any organizational change must identify ripple effects across all seven. Misalignment diagnoses execution failure.", "origin": "Tom Peters and Robert Waterman Jr., McKinsey & Company, 1980; published in 'In Search of Excellence' (1982)", "r": 7, "connCount": 1}, {"id": 232, "name": "PESTLE Analysis", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Scan six macro-environmental forces \u2014 Political, Economic, Social, Technological, Legal, Environmental \u2014 to surface external opportunities and threats.", "problem": "Organizations develop strategy in an internal vacuum, missing macro shifts that will reshape the competitive landscape.", "howItWorks": "For each of 6 dimensions, identify current state and trajectory. Rate impact and likelihood. Use findings to stress-test existing strategy and identify emerging opportunities. Typically feeds into SWOT (PESTLE findings become Opportunities and Threats). Best done as a team with diverse perspectives.", "origin": "Attributed to Francis Aguilar's 'ETPS' scan in 'Scanning the Business Environment' (1967); extended to PEST, then PESTLE over decades", "r": 7, "connCount": 1}, {"id": 233, "name": "Value Chain Analysis", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Map every activity that creates customer value and identify where competitive advantage is actually built or lost.", "problem": "Cost and differentiation advantages are assumed to live in obvious places (price, product) while the real source is in specific operational activities.", "howItWorks": "Separate activities into Primary (inbound logistics, operations, outbound logistics, marketing/sales, service) and Support (procurement, technology, HR, infrastructure). For each, assess cost and differentiation contribution. Competitive advantage concentrates in a few activities \u2014 find them, strengthen them, and align the whole chain.", "origin": "Michael E. Porter, 'Competitive Advantage: Creating and Sustaining Superior Performance' (1985)", "r": 7, "connCount": 1}, {"id": 234, "name": "Theory of Constraints \u2014 Drum-Buffer-Rope", "category": "problem-solving", "color": "#e67e22", "catLabel": "Problem Solving", "oneLiner": "Schedule production to the rhythm of the bottleneck (drum), protect it with inventory buffers, and rope the release of work to its pace.", "problem": "Traditional production scheduling overloads the system, creates variability, and hides the bottleneck.", "howItWorks": "Drum: let the bottleneck set the production pace. Buffer: place inventory protection before the bottleneck to prevent starvation. Rope: release raw materials only fast enough to feed the bottleneck. This eliminates WIP explosion while maximizing throughput. A specialized TOC scheduling technique.", "origin": "Eliyahu M. Goldratt, 'The Goal' (1984) and subsequent TOC Institute teachings", "r": 7, "connCount": 1}, {"id": 235, "name": "Hedgehog Concept", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Great organizations find and focus on the intersection of what they're passionate about, what they can be best at, and what drives their economic engine.", "problem": "Companies pursue growth in too many directions, diluting focus and preventing the sustained momentum needed to go from good to great.", "howItWorks": "Identify the overlap of three circles: (1) What you are deeply passionate about, (2) What you can be the best in the world at, (3) What best drives your economic engine. Everything outside that intersection is a distraction. This is not an aspiration \u2014 it's a discovery about current reality.", "origin": "Jim Collins, 'Good to Great' (2001); inspired by Isaiah Berlin's essay on the Greek parable of the hedgehog vs. the fox", "r": 9, "connCount": 2}, {"id": 236, "name": "Kanban", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Visualize workflow on a board, limit work-in-progress, and pull work through stages only when capacity exists.", "problem": "Invisible work queues, multitasking, and overloaded systems slow throughput and hide bottlenecks.", "howItWorks": "Create a board with columns (To Do \u2192 In Progress \u2192 Done). Set explicit WIP limits per column. New work enters only when capacity is available (pull system). Visualizing flow exposes bottlenecks and queue buildups immediately. Continuous flow beats batch processing.", "origin": "Taiichi Ohno, Toyota Production System, late 1950s; adapted for knowledge work by David J. Anderson circa 2007", "r": 7, "connCount": 1}, {"id": 237, "name": "Agile / Scrum", "category": "productivity", "color": "#7f8c8d", "catLabel": "Productivity", "oneLiner": "Deliver work in short iterative sprints with constant feedback loops rather than long sequential plans.", "problem": "Long development cycles without feedback produce outputs misaligned with actual needs; plans become obsolete faster than execution.", "howItWorks": "Work in 1-4 week sprints with defined goals. Daily standups surface blockers. Sprint reviews show work to stakeholders for feedback. Retrospectives improve the process itself. Product backlog is continuously reprioritized. Embraces change over following a fixed plan.", "origin": "Ken Schwaber and Jeff Sutherland, early 1990s; formalized in the 'Agile Manifesto' (2001)", "r": 7, "connCount": 1}, {"id": 238, "name": "PDSA Cycle (Plan-Do-Study-Act)", "category": "problem-solving", "color": "#e67e22", "catLabel": "Problem Solving", "oneLiner": "Deming's preferred variant of PDCA \u2014 substitutes 'Study' for 'Check' to emphasize deep learning over mere verification.", "problem": "PDCA's 'Check' step is often treated as pass/fail verification rather than genuine learning about why something worked or didn't.", "howItWorks": "Same four steps as PDCA but 'Study' means deeply analyzing results, updating your theory of the system, and extracting causal understanding \u2014 not just confirming a metric hit or missed. This produces richer learning and better next-iteration hypotheses.", "origin": "W. Edwards Deming; he preferred PDSA and attributed the check/study distinction as important for scientific rigor", "r": 7, "connCount": 1}, {"id": 239, "name": "Unit Economics", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Analyze revenue and costs at the single-customer level \u2014 profitability per unit determines whether growth creates or destroys value.", "problem": "Growing companies can appear healthy at an aggregate level while losing money on every customer \u2014 scale amplifies a broken unit model.", "howItWorks": "Key metrics: LTV (lifetime gross profit per customer), CAC (cost to acquire one customer), LTV:CAC ratio (healthy = 3:1+), Payback Period (months to recover CAC). If LTV < CAC, growth destroys value. Fix unit economics before scaling. Each pricing, retention, or acquisition lever shifts the ratio.", "origin": "Venture capital and startup practice; formalized in the 2010s growth hacking and SaaS communities", "r": 7, "connCount": 1}, {"id": 240, "name": "Network Effects", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Each additional user makes the product more valuable for all existing users \u2014 creating compounding competitive moats.", "problem": "Products compete on features alone without building the structural advantages that make switching costs and scale self-reinforcing.", "howItWorks": "Direct network effects: each new user directly benefits others (messaging apps). Indirect: each new user benefits a different user group (Uber \u2014 more drivers benefit riders). Data: more users \u2192 better ML models \u2192 better product \u2192 more users. Identify which type you have, then design to accelerate network density before competitors.", "origin": "Theodore Vail (AT&T, 1908) first observed the concept; formalized by Robert Metcalfe (Metcalfe's Law, 1980); popularized for startups by NFX and a16z in 2010s", "r": 6, "connCount": 0}, {"id": 241, "name": "Disruption Theory (Disruptive Innovation)", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Smaller companies overthrow incumbents by starting with simpler, cheaper products for overlooked customers, then moving upmarket.", "problem": "Incumbents dismiss threats that start at the low end of their market \u2014 until those competitors take the whole market.", "howItWorks": "Disruptors enter at the low end (or in a new market) with a simpler, cheaper solution that incumbents ignore (it's not profitable for them). Disruptors improve over time. When the product is 'good enough' for mainstream customers, the incumbent's core market collapses. Sustaining innovation (improving for existing customers) is not disruption.", "origin": "Clayton M. Christensen, Harvard Business School, 'The Innovator's Dilemma' (1997)", "r": 11, "connCount": 3}, {"id": 242, "name": "Technology Adoption Lifecycle (Crossing the Chasm)", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Innovations cross a market chasm between early adopters and the early majority \u2014 this gap kills most new products.", "problem": "Companies succeed with early adopters but fail to cross into mainstream markets because these groups have fundamentally different needs and reference systems.", "howItWorks": "The S-curve has segments: Innovators \u2192 Early Adopters \u2192 Early Majority \u2192 Late Majority \u2192 Laggards. The 'Chasm' lies between Early Adopters and Early Majority. To cross it: focus on a single 'bowling pin' niche, dominate it completely, then use it as a beachhead for adjacent segments.", "origin": "Everett Rogers, 'Diffusion of Innovations' (1962) \u2014 S-curve; Geoffrey Moore, 'Crossing the Chasm' (1991) \u2014 the Chasm", "r": 9, "connCount": 2}, {"id": 243, "name": "Competitive Moat", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "A durable structural advantage that prevents competitors from replicating your position and compressing your returns.", "problem": "Competitive advantages from product features or execution erode quickly; sustainable profitability requires structural barriers.", "howItWorks": "Seven types of moats (Hamilton Helmer's 7 Powers): Scale Economies, Network Effects, Switching Costs, Cornered Resource, Counter-Positioning, Branding, Process Power. Identify which moats your business has or can build. Moats compound \u2014 a business with multiple types is exponentially harder to attack.", "origin": "Warren Buffett coined the metaphor; Hamilton Helmer formalized seven types in '7 Powers: The Foundations of Business Strategy' (2016)", "r": 9, "connCount": 2}, {"id": 244, "name": "Pre-mortem Analysis", "category": "decision-making", "color": "#4a90d9", "catLabel": "Decision Making", "oneLiner": "Before starting a project, imagine it has already failed catastrophically \u2014 then work backward to identify why.", "problem": "Teams are subject to groupthink and optimism bias during planning, failing to surface plausible failure modes.", "howItWorks": "At project kickoff, announce: 'It's 12 months from now and this project failed completely. What happened?' Everyone writes reasons independently (prevents anchoring), then shares. Identify the most plausible failure modes and build mitigations into the plan. Psychological safety is critical \u2014 it's safe to voice doubts.", "origin": "Gary Klein, cognitive psychologist, developed the pre-mortem technique in the 1990s; popularized by Daniel Kahneman in 'Thinking, Fast and Slow' (2011)", "r": 6, "connCount": 0}, {"id": 245, "name": "Law of Diminishing Returns", "category": "problem-solving", "color": "#e67e22", "catLabel": "Problem Solving", "oneLiner": "Each additional unit of input yields progressively smaller incremental output beyond an optimal point.", "problem": "Resources are applied uniformly without recognizing that marginal returns degrade \u2014 overspending past the inflection point.", "howItWorks": "Map input vs. output. Returns rise steeply at first, flatten, then decline. The optimal input level is just before the plateau. Application: stop optimizing a feature past the point of diminishing returns; redistribute effort to higher-ROI areas. Closely related to Pareto \u2014 most gains come early.", "origin": "Anne Robert Jacques Turgot (1767) and Thomas Robert Malthus (1798) in economics; now cross-domain", "r": 7, "connCount": 1}, {"id": 246, "name": "Platform Business Model", "category": "strategic-thinking", "color": "#2980b9", "catLabel": "Strategic Thinking", "oneLiner": "Build infrastructure that facilitates value exchange between two or more user groups \u2014 the platform captures value without producing it directly.", "problem": "Linear business models (make \u2192 sell) hit growth ceilings; platforms scale without proportional cost increases.", "howItWorks": "Identify two or more user groups with complementary needs (buyers/sellers, drivers/riders, developers/users). Build the infrastructure connecting them. Remove friction on both sides. Seed one side to attract the other (solving the chicken-and-egg problem). Revenue comes from facilitating interactions, not producing outputs.", "origin": "Network effects research in economics; popularized as a concept by Geoffrey Parker and Marshall Van Alstyne in 'Platform Revolution' (2016)", "r": 7, "connCount": 1}]</script>
<script id="jl" type="application/json">[{"source": 21, "target": 38, "relationship": "sequence", "description": "First Principles strips away assumptions to foundational truths; Issue Trees then structure those truths into a MECE decomposition for solving. Use First Principles to validate the branches you put in your Issue Tree."}, {"source": 38, "target": 39, "relationship": "contains", "description": "Issue Trees are built by applying the MECE Principle at every node \u2014 MECE is the structural rule that makes Issue Trees valid."}, {"source": 6, "target": 7, "relationship": "extends", "description": "Pre-Mortem is a structured team application of Inversion: instead of asking 'what would cause failure?' abstractly, the team imagines failure has already occurred and inverts from that concrete starting point."}, {"source": 7, "target": 11, "relationship": "complements", "description": "Pre-Mortem surfaces concrete failure modes before launch; Regret Minimization calibrates emotional stakes. Together they prevent both cognitive and emotional decision traps."}, {"source": 5, "target": 68, "relationship": "extends", "description": "Second-Order Thinking asks 'and then what?' verbally; CLDs formalize those downstream chains into visual feedback loops capturing nonlinear dynamics."}, {"source": 68, "target": 65, "relationship": "contains", "description": "CLDs are composed of two primitive building blocks: Reinforcing Feedback Loops and Balancing Feedback Loops."}, {"source": 68, "target": 66, "relationship": "contains", "description": "CLDs are composed of two primitive building blocks: Balancing Feedback Loops and Reinforcing Feedback Loops."}, {"source": 65, "target": 72, "relationship": "extends", "description": "The Limits to Growth archetype begins with a Reinforcing Feedback Loop that eventually encounters a Balancing constraint \u2014 you cannot understand the archetype without the primitive loop."}, {"source": 65, "target": 93, "relationship": "extends", "description": "Network Effects are a specific real-world manifestation of a Reinforcing Feedback Loop: more users \u2192 more value \u2192 more users."}, {"source": 65, "target": 223, "relationship": "extends", "description": "The Flywheel Effect is a business-strategy framing of a Reinforcing Feedback Loop: strategic actions create momentum that compounds through the same cycle."}, {"source": 65, "target": 224, "relationship": "extends", "description": "Compounding is the mathematical / financial expression of a Reinforcing Feedback Loop applied to a stock (money, knowledge, reputation) over time."}, {"source": 66, "target": 77, "relationship": "extends", "description": "The Drifting Goals archetype occurs when a Balancing Loop intended to close a gap is gamed by lowering the goal instead of improving performance."}, {"source": 73, "target": 75, "relationship": "complements", "description": "Both archetypes involve symptomatic fixes that undermine long-term solutions, but Shifting the Burden emphasizes dependency creation while Fixes That Fail emphasizes delayed blowback."}, {"source": 99, "target": 30, "relationship": "extends", "description": "Goodhart's Law states that measures become corrupted when used as targets; the Cobra Effect is a vivid historical case where an incentive perversely increased the problem it was meant to solve \u2014 a concrete instance of Goodhart in action."}, {"source": 30, "target": 80, "relationship": "extends", "description": "Campbell's Law is the social-science formulation of the same insight as Goodhart's Law, specifying that high-stakes use of indicators corrupts them \u2014 the two are parallel expressions of the same phenomenon in different domains."}, {"source": 70, "target": 40, "relationship": "complements", "description": "The Iceberg Model provides a four-level map (events \u2192 patterns \u2192 structures \u2192 mental models) of where root causes live; Five Whys is the drilling technique used to traverse those levels."}, {"source": 40, "target": 50, "relationship": "contains", "description": "Five Whys is one specific technique within the broader Root Cause Analysis discipline, which also includes Fishbone Diagrams and fault trees."}, {"source": 41, "target": 50, "relationship": "contains", "description": "The Fishbone Diagram is a visual tool within Root Cause Analysis, structuring potential causes across standard categories to reveal the root."}, {"source": 50, "target": 228, "relationship": "sequence", "description": "Root Cause Analysis is the analytical phase that informs the Plan step of PDCA \u2014 you need to understand root causes before designing a corrective change."}, {"source": 228, "target": 238, "relationship": "alternative", "description": "PDSA is Deming's preferred refinement of PDCA, substituting 'Study' for 'Check' to emphasize learning over verification \u2014 both serve iterative improvement but with different epistemological emphasis."}, {"source": 228, "target": 222, "relationship": "alternative", "description": "Build-Measure-Learn is the Lean Startup variant of PDCA, optimized for product validation under uncertainty rather than process improvement in stable systems."}, {"source": 222, "target": 221, "relationship": "contains", "description": "MVP is the artifact produced in the Build phase of Build-Measure-Learn \u2014 it is the minimum experiment needed to generate validated learning."}, {"source": 46, "target": 47, "relationship": "extends", "description": "The Double Diamond is a spatial visualization of the Design Thinking process, making its two diverge-converge cycles (problem space + solution space) structurally explicit."}, {"source": 46, "target": 61, "relationship": "contains", "description": "The Empathy Map is a specific tool used in the Empathize phase of Design Thinking to build a structured understanding of user context."}, {"source": 46, "target": 219, "relationship": "complements", "description": "JTBD reframes what problem Design Thinking should be solving \u2014 defining the job the user wants done before the empathy/ideation phases begin."}, {"source": 47, "target": 48, "relationship": "contains", "description": "Each diamond in the Double Diamond model is a diverge-converge cycle \u2014 Divergent/Convergent Thinking is the cognitive mechanism the model formalizes."}, {"source": 49, "target": 48, "relationship": "contains", "description": "CPS explicitly alternates divergent and convergent phases at each of its six stages \u2014 the cognitive pattern is the engine of the entire model."}, {"source": 58, "target": 48, "relationship": "contains", "description": "Brainstorming is the pure divergent phase \u2014 it defers all convergent judgment to a later step, directly enacting divergent thinking."}, {"source": 62, "target": 58, "relationship": "extends", "description": "Reverse Brainstorming applies the Inversion mental model to standard Brainstorming, generating ideas about how to cause the problem then flipping them into solutions."}, {"source": 62, "target": 6, "relationship": "contains", "description": "Reverse Brainstorming is a creativity technique that operationalizes Inversion \u2014 it is Inversion applied in a group ideation context."}, {"source": 43, "target": 44, "relationship": "contains", "description": "SCAMPER provides seven specific lateral moves (Substitute, Combine, Adapt\u2026) that systematize what Lateral Thinking does intuitively \u2014 breaking dominant patterns through structured provocations."}, {"source": 54, "target": 53, "relationship": "contains", "description": "Synectics is a structured group creativity method built entirely on four types of analogical thinking, making Analogical Thinking the foundational cognitive operation."}, {"source": 45, "target": 39, "relationship": "complements", "description": "The Zwicky Box generates all possible combinations across independent dimensions; MECE ensures those dimensions are properly non-overlapping and exhaustive before the matrix is built."}, {"source": 55, "target": 21, "relationship": "complements", "description": "First Principles strips away false assumptions; Constraint Relaxation temporarily removes assumed constraints \u2014 together they clear the solution space of inherited limitations."}, {"source": 37, "target": 38, "relationship": "complements", "description": "Abstraction Laddering moves up (Why?) to reframe the problem space and down (How?) to generate alternatives; Issue Trees then structure the decomposed problem for systematic solving."}, {"source": 56, "target": 37, "relationship": "extends", "description": "Abstraction Laddering is a structured technique for achieving the cognitive shift that Reframing describes \u2014 moving up or down the abstraction hierarchy to see the problem differently."}, {"source": 3, "target": 84, "relationship": "complements", "description": "Cynefin's 'Complex' domain describes precisely the territory that CAS theory analyzes \u2014 the framework tells you when you're in that domain; CAS theory explains what to do there."}, {"source": 85, "target": 3, "relationship": "contains", "description": "Wicked Problems are a subset of the problems that live in Cynefin's Complex or Chaotic domains \u2014 the Cynefin Framework provides the classification system that identifies a problem as wicked."}, {"source": 2, "target": 3, "relationship": "complements", "description": "The Cynefin Framework classifies the decision environment; OODA Loop provides the action cycle optimized for Chaotic and Complex domains where speed of iteration matters most."}, {"source": 36, "target": 13, "relationship": "contains", "description": "Decision Trees are computational structures for calculating Expected Value across branching paths \u2014 each leaf is an outcome weighted by probability, summed along each branch."}, {"source": 13, "target": 19, "relationship": "contains", "description": "Expected Value is the mathematical operationalization of Probabilistic Thinking \u2014 it forces explicit probability estimates and multiplies them by magnitude to compare options."}, {"source": 20, "target": 19, "relationship": "extends", "description": "Bayesian Updating provides the formal mechanism for how probabilities should change in Probabilistic Thinking as new evidence arrives \u2014 it is dynamic probabilistic reasoning."}, {"source": 31, "target": 164, "relationship": "complements", "description": "Planning Fallacy describes the bias of inside-view optimism; Reference Class Forecasting is the debiasing technique that corrects it by anchoring on outside-view historical base rates."}, {"source": 31, "target": 20, "relationship": "complements", "description": "Reference Class Forecasting provides the prior from historical data; Bayesian Updating then combines that prior with inside-view project-specific evidence to form a calibrated forecast."}, {"source": 16, "target": 87, "relationship": "complements", "description": "Margin of Safety is a defensive buffer against downside; Antifragility goes further by structuring exposure so that volatility itself becomes a source of gain \u2014 they address different points on the robustness-to-optionality spectrum."}, {"source": 88, "target": 87, "relationship": "complements", "description": "Black Swans are the events that destroy fragile systems; Antifragility is the design principle that transforms Black Swan exposure into upside \u2014 Taleb developed both concepts in tandem."}, {"source": 92, "target": 25, "relationship": "extends", "description": "The Pareto Principle is an empirical observation of power-law distribution \u2014 the 80/20 rule is a special case of the broader mathematical phenomenon of power-law scaling."}, {"source": 95, "target": 96, "relationship": "contains", "description": "The Tipping Point is the moment in a Diffusion of Innovation S-curve where adoption crosses the threshold that triggers exponential spread \u2014 it is a specific feature of the S-curve."}, {"source": 96, "target": 242, "relationship": "extends", "description": "Crossing the Chasm refines the S-curve by identifying a dangerous gap between Early Adopters and Early Majority that the original Diffusion of Innovation model smooths over."}, {"source": 102, "target": 103, "relationship": "extends", "description": "Hysteresis is the physics/engineering term for the same phenomenon as Path Dependence \u2014 the current state depends on history. Hysteresis is used in physical systems; Path Dependence in social/economic ones."}, {"source": 97, "target": 106, "relationship": "extends", "description": "Panarchy is the ecological theory explaining how resilience is maintained across scales through adaptive cycles \u2014 the Resilience concept is formalized within Panarchy's r-K-\u03a9-\u03b1 model."}, {"source": 111, "target": 74, "relationship": "complements", "description": "Tragedy of the Commons diagnoses why shared resources fail; Ostrom's Design Principles provide the empirically-derived solution \u2014 the eight conditions under which commons actually succeed."}, {"source": 108, "target": 74, "relationship": "extends", "description": "Tragedy of the Commons is a specific spatial/resource case of the broader Collective Action Problem \u2014 rational individual behavior leading to collective suboptimality."}, {"source": 69, "target": 68, "relationship": "sequence", "description": "Build a CLD first to map the system's structure; then apply Meadows' Leverage Points hierarchy to identify where in that map intervention will be most effective."}, {"source": 67, "target": 68, "relationship": "complements", "description": "Stock-and-Flow diagrams make the accumulations and rates explicit; CLDs show the feedback structure \u2014 together they form a complete system dynamics model."}, {"source": 148, "target": 22, "relationship": "complements", "description": "The Dunning-Kruger Effect explains why people don't know the boundaries of their competence; Circle of Competence is the discipline of deliberately mapping and respecting those boundaries."}, {"source": 182, "target": 148, "relationship": "complements", "description": "The Feynman Technique is an operational debiasing tool for the Dunning-Kruger Effect \u2014 attempting plain-language explanation exposes the gaps that overconfident knowers cannot see."}, {"source": 190, "target": 70, "relationship": "complements", "description": "The Iceberg Model maps the four levels where assumptions live; Double-Loop Learning is the learning process that reaches below the surface to question those underlying structures and mental models."}, {"source": 194, "target": 180, "relationship": "complements", "description": "System 1/2 describes the two cognitive modes; Metacognition is the self-monitoring capacity that notices when System 1 is running and decides whether to engage System 2."}, {"source": 185, "target": 189, "relationship": "complements", "description": "ZPD defines the learning sweet spot between known and unknown; Deliberate Practice is the method for continuously operating in that zone through targeted, feedback-driven challenge."}, {"source": 183, "target": 192, "relationship": "complements", "description": "The Forgetting Curve shows when memories decay; Spaced Repetition schedules reviews precisely when decay is about to occur \u2014 the technique is designed as the antidote to the curve."}, {"source": 193, "target": 183, "relationship": "complements", "description": "Spaced Repetition optimizes the timing of retrieval; the Testing Effect shows that retrieval itself (not re-reading) is what strengthens memory \u2014 they are the timing and mechanism of the same learning process."}, {"source": 184, "target": 185, "relationship": "complements", "description": "Deliberate Practice identifies targeted weakness work; Interleaving is a practice schedule that mixes topics to force discriminative retrieval \u2014 together they accelerate skill acquisition beyond blocked practice."}, {"source": 188, "target": 190, "relationship": "complements", "description": "Kolb's cycle describes how experience becomes knowledge through reflection and conceptualization; Double-Loop Learning adds a meta-level where the governing assumptions of the cycle itself are questioned."}, {"source": 187, "target": 182, "relationship": "complements", "description": "Bloom's Taxonomy shows that teaching others sits at the highest cognitive level (Synthesis/Create); Feynman Technique operationalizes that level as a self-assessment tool for any learner."}, {"source": 186, "target": 185, "relationship": "complements", "description": "Growth Mindset is the belief system that makes Deliberate Practice possible \u2014 without believing ability is developable, people avoid the productive difficulty that deliberate practice requires."}, {"source": 32, "target": 20, "relationship": "complements", "description": "Confirmation Bias is the failure to update properly on disconfirming evidence; Bayesian Updating is the normative corrective \u2014 the mathematical rule that forces symmetric updating on all evidence."}, {"source": 150, "target": 31, "relationship": "complements", "description": "Availability Heuristic causes overweighting of vivid memorable examples; Reference Class Forecasting corrects this by anchoring on full statistical distributions rather than recalled instances."}, {"source": 147, "target": 31, "relationship": "complements", "description": "Survivorship Bias pollutes the visible sample by hiding failures; Reference Class Forecasting must explicitly include failures in its base rate to generate unbiased priors."}, {"source": 157, "target": 20, "relationship": "complements", "description": "Narrative Fallacy creates false causal explanations for random sequences; Bayesian Updating demands explicit probability assignments that resist the post-hoc story-fitting that narratives enable."}, {"source": 151, "target": 7, "relationship": "complements", "description": "Hindsight Bias makes past failures seem inevitable; Pre-Mortem exploits that same imaginative capacity prospectively \u2014 using the brain's tendency to construct post-hoc inevitability to surface real risks before the fact."}, {"source": 159, "target": 56, "relationship": "complements", "description": "Framing Effect shows that how problems are presented systematically changes decisions; Reframing is the deliberate technique of exploiting that same mechanism to open new solution spaces."}, {"source": 160, "target": 15, "relationship": "alternative", "description": "These are the same phenomenon described from different angles: Sunk Cost Fallacy is the bias (descriptive), Sunk Cost Awareness is the debiasing discipline (prescriptive)."}, {"source": 162, "target": 16, "relationship": "complements", "description": "Overconfidence Bias explains why our estimates are systematically too narrow; Margin of Safety is the engineering discipline that compensates for that overconfidence by building explicit buffers."}, {"source": 164, "target": 212, "relationship": "complements", "description": "Planning Fallacy describes the bias toward optimistic time/cost estimates; SMART Goals' 'Achievable' and 'Time-bound' criteria are partial correctives \u2014 forcing realistic scoping before commitment."}, {"source": 152, "target": 12, "relationship": "complements", "description": "Status Quo Bias creates excessive inertia on reversible decisions; the Type 1/Type 2 framework corrects this by freeing you to move fast on reversible (Type 2) decisions that status quo bias would cause you to overthink."}, {"source": 24, "target": 32, "relationship": "complements", "description": "Ladder of Inference maps the cognitive steps where Confirmation Bias enters \u2014 specifically at data selection (rung 2) and meaning-making (rung 4) \u2014 providing a structural diagnosis of where the bias operates."}, {"source": 180, "target": 0, "relationship": "complements", "description": "The Decision Matrix is a Sys
