dynamical systems, tiny differences in initial conditions produce wildly divergent outcomes \u2014 making long-range prediction impossible.", "problem": "Linear extrapolation fails in complex systems; the assumption that small causes have small effects breaks down where nonlinearity and feedback exist.", "howItWorks": "In chaotic systems: trajectories are deterministic but practically unpredictable because minute measurement errors compound exponentially. The butterfly metaphor (Lorenz): a tornado weeks hence may hinge on whether a butterfly flapped in Brazil. Key insight: chaos is bounded (strange attractors) \u2014 globally structured, locally unpredictable. Application: focus on robustness and adaptability, not precise prediction.", "origin": "Edward Lorenz, meteorologist, 1960s. 'Deterministic Nonperiodic Flow' (1963). Term 'butterfly effect' coined by Lorenz 1972.", "r": 9, "connCount": 2}, {"id": 91, "name": "Strange Attractor", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "A region in phase space that chaotic systems orbit unpredictably but never escape \u2014 providing a bounded, recognizable structure within chaos.", "problem": "Chaos appears purely random; strange attractors reveal that complex behavior has underlying structure even when exact trajectories are unpredictable.", "howItWorks": "Plot a system's state over time in phase space (all possible states). Chaotic systems trace paths that never exactly repeat but stay within a fractal region (the attractor). The Lorenz attractor looks like a butterfly. Implication: you can characterize the envelope of behavior without predicting specific states. Used in climate modeling, economics, and organizational dynamics.", "origin": "Edward Lorenz (1963); term 'strange attractor' coined by David Ruelle and Floris Takens (1971).", "r": 7, "connCount": 1}, {"id": 92, "name": "Power Laws / Fat Tails", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "In many complex systems, outcomes follow power-law distributions where a small number of events account for the vast majority of the effect.", "problem": "Gaussian (normal) distribution assumptions underestimate the frequency and impact of extreme events in interconnected, network-driven systems.", "howItWorks": "Power law: P(x) \u221d x^(-\u03b1). The tail is 'fat' \u2014 extreme values are far more probable than normal distributions predict. Examples: wealth distribution (Pareto/80-20), city sizes (Zipf's law), earthquake magnitudes, word frequency, link popularity. Implication: average-based thinking is misleading; focus on tails for risk management and opportunity identification.", "origin": "Vilfredo Pareto (1906, wealth distribution); George Zipf (1949, word frequency); Beno\u00eet Mandelbrot (fractal geometry, 1960s); Barab\u00e1si & Albert (scale-free networks, 1999).", "r": 7, "connCount": 1}, {"id": 93, "name": "Network Effects (Metcalfe's Law)", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "The value of a network grows proportionally to the square of its connected users \u2014 and some networks grow even faster (Reed's Law: 2^n).", "problem": "Linear thinking underestimates how quickly network products reach tipping points and create winner-take-all dynamics.", "howItWorks": "Metcalfe's Law: value \u221d n\u00b2. Each new user adds n-1 potential connections. Sarnoff's Law (broadcast): value \u221d n. Reed's Law (group-forming networks): value \u221d 2^n. Real implication: at small n, network products are worthless; past a threshold they become near-monopolies. Strategy: subsidize early growth to get past the threshold.", "origin": "Robert Metcalfe (Ethernet inventor), 1980s; formalized David Reed (Reed's Law, 1999); George Sarnoff (radio).", "r": 13, "connCount": 4}, {"id": 94, "name": "Scale-Free Networks / Preferential Attachment", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "In growing networks where new nodes prefer to attach to highly-connected nodes, hubs emerge and connectivity follows a power law \u2014 making the network simultaneously robust and fragile.", "problem": "Random network models (Erd\u0151s\u2013R\u00e9nyi) fail to explain why real networks (web, social, biological) have a few massive hubs and many tiny nodes.", "howItWorks": "Two mechanisms: growth (network expands over time) + preferential attachment (new nodes more likely to link to already-popular nodes \u2192 'rich get richer'). Result: power-law degree distribution, few mega-hubs, many low-degree nodes. Robustness: random failures rarely hit hubs. Fragility: targeted attacks on hubs catastrophically fragment the network.", "origin": "Albert-L\u00e1szl\u00f3 Barab\u00e1si and R\u00e9ka Albert, 'Emergence of Scaling in Random Networks,' Science (1999).", "r": 7, "connCount": 1}, {"id": 95, "name": "Tipping Point", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "The critical threshold at which a small additional change causes a system to shift rapidly and irreversibly from one state to another.", "problem": "Linear thinking misses the non-linearity of system transitions \u2014 interventions that seem to have no effect suddenly produce dramatic change at the threshold.", "howItWorks": "Systems have positive feedback loops that are suppressed until a threshold is crossed. Past the tipping point, the reinforcing loop takes over and drives rapid state change. Can be positive (adoption cascades, phase transitions) or negative (ecological collapse, financial panics). Identification: look for reinforcing loops with thresholds. Application: either push past (for desired change) or raise the threshold (for undesired change).", "origin": "Malcolm Gladwell popularized (The Tipping Point, 2000); scientific basis from Thomas Schelling (1978), Mark Granovetter (threshold models, 1978), and complexity science.", "r": 11, "connCount": 3}, {"id": 96, "name": "Diffusion of Innovation (S-Curve)", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "New ideas and technologies spread through a population in a predictable S-shaped curve, with distinct adopter categories from innovators to laggards.", "problem": "Explains why adoption of new ideas seems slow at first, then explosive, then plateaus \u2014 and how to accelerate or respond to diffusion.", "howItWorks": "Five adopter segments: Innovators (2.5%) \u2192 Early Adopters (13.5%) \u2192 Early Majority (34%) \u2192 Late Majority (34%) \u2192 Laggards (16%). The S-curve reflects slow initial take-up, then exponential growth past critical mass, then saturation. Five innovation characteristics drive adoption speed: relative advantage, compatibility, complexity, trialability, observability.", "origin": "Everett Rogers, Diffusion of Innovations (1962), Ohio State University. Based on earlier work by Ryan and Gross (hybrid corn, 1943).", "r": 11, "connCount": 3}, {"id": 97, "name": "Panarchy / Adaptive Cycle", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Complex systems cycle through four phases \u2014 growth (r), conservation (K), collapse (\u03a9), reorganization (\u03b1) \u2014 nested across scales, explaining why collapse enables renewal.", "problem": "Linear management of ecosystems, economies, and organizations prevents the creative destruction needed for renewal and builds brittleness.", "howItWorks": "Four phases: r (exploitation/rapid growth, high connectedness) \u2192 K (conservation/rigidity, maximum connected potential) \u2192 \u03a9 (release/collapse, rapid) \u2192 \u03b1 (reorganization, maximum potential, low connectedness) \u2192 back to r. The cycle runs at multiple nested scales (panarchy). 'Revolt': small fast cycles can destabilize larger slow ones. 'Remember': large slow cycles constrain small fast ones. Key insight: preventing collapse by suppressing disturbance (forest fire management) increases brittleness.", "origin": "C.S. Buzz Holling, 'Resilience and Stability of Ecological Systems' (1973). Panarchy concept: Holling, Gunderson, Peterson (2002).", "r": 9, "connCount": 2}, {"id": 98, "name": "Unintended Consequences", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Purposeful actions in complex systems produce outcomes beyond their intended effects \u2014 often contradicting or overwhelming the original goal.", "problem": "Linear cause-and-effect thinking ignores feedback loops, delays, and system adaptations that generate surprising and often adverse results.", "howItWorks": "Robert K. Merton (1936) identified 5 sources: ignorance, error, short-term thinking, basic values prohibiting certain analyses, self-defeating prophecies. In systems terms: intervene in a complex system \u2192 adaptive agents respond \u2192 feedback loops activate \u2192 delays obscure causal chain \u2192 system moves to a new equilibrium different from the intended one. Mitigation: model the system before intervening; use small safe-to-fail experiments.", "origin": "Robert K. Merton, sociologist, 'The Unanticipated Consequences of Purposive Social Action' (1936).", "r": 11, "connCount": 3}, {"id": 99, "name": "Cobra Effect", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "A well-intentioned incentive perversely worsens the problem it was designed to solve by triggering adaptive behavior that game the system.", "problem": "Policy designers create incentives without accounting for how rational actors will adapt to exploit them, inverting the intended effect.", "howItWorks": "British colonial India: bounty for dead cobras \u2192 people breed cobras for bounty \u2192 program cancelled \u2192 breeders release cobras \u2192 cobra population explodes. The mechanism: an incentive rewarding a proxy metric for a problem creates a new activity that produces the proxy without solving (and often worsening) the underlying problem. Prevention: trace the adaptive response before deploying the incentive.", "origin": "Attributed to Horst Siebert, German economist. Popularized as a named phenomenon in economics and policy studies.", "r": 7, "connCount": 1}, {"id": 100, "name": "Jevons Paradox (Rebound Effect)", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Efficiency improvements in resource use increase total consumption by making the resource cheaper \u2014 the savings are more than offset by increased demand.", "problem": "Efficiency alone cannot reduce resource consumption; it may accelerate it by lowering effective costs and stimulating demand.", "howItWorks": "Efficiency \u2192 lower cost per unit of service \u2192 demand increases \u2192 total consumption rises. William Stanley Jevons (1865): coal-efficient steam engines caused total coal use to skyrocket. Modern: fuel-efficient cars \u2192 people drive more. AI efficiency \u2192 more compute used. Fix requires demand-side policy (carbon taxes, usage caps), not just efficiency mandates.", "origin": "William Stanley Jevons, The Coal Question (1865).", "r": 7, "connCount": 1}, {"id": 101, "name": "Braess's Paradox", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Adding capacity to a network (a new road, a server) can paradoxically worsen overall performance when individual optimization conflicts with system optimum.", "problem": "Infrastructure planners assume adding resources improves performance; in complex networks with selfish routing, the opposite can occur.", "howItWorks": "Each driver chooses the route minimizing their personal travel time. A new road that seems faster draws traffic, but the resulting congestion makes everyone slower than before the road existed. This is Nash equilibrium diverging from system optimum. Demonstrated empirically by removing a road in Stuttgart (1969) and Seoul. Application: identify where individual incentives diverge from collective welfare before adding capacity.", "origin": "Dietrich Braess, German mathematician, 1968.", "r": 9, "connCount": 2}, {"id": 102, "name": "Path Dependence / Lock-In", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Early choices constrain later options through self-reinforcing mechanisms, causing systems to remain locked into suboptimal states even when better alternatives exist.", "problem": "Organizations, technologies, and institutions remain stuck in inefficient configurations because switching costs and network effects make change prohibitively expensive.", "howItWorks": "Initial choice (often by chance) \u2192 reinforcing feedback creates switching costs and network effects \u2192 more users adopt \u2192 higher lock-in \u2192 even superior alternatives can't dislodge the incumbent. QWERTY keyboard: designed for mechanical constraints, now entrenched by training and compatibility. VHS vs Betamax. Applies to organizational routines, institutions, and technical standards.", "origin": "Paul David, 'Clio and the Economics of QWERTY' (1985); Brian Arthur, formal model (1989). Institutional economics tradition.", "r": 11, "connCount": 3}, {"id": 103, "name": "Hysteresis", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "A system's current state depends not only on current inputs but on its history \u2014 the path by which it arrived matters as much as where it is.", "problem": "Interventions based on current state fail when systems have memory \u2014 removing the cause doesn't automatically restore the previous state.", "howItWorks": "The system responds differently depending on direction of change (loading vs. unloading). Magnets retain magnetism after the field is removed; labor markets don't recover quickly from recessions because skills atrophy. In ecology: a degraded ecosystem may resist return to its original state even after the stressor is removed. Diagnosis: ask whether the path to the current state matters for the path out.", "origin": "From physics (James Ewing, 1882 \u2014 magnetism); extended to economics by economists studying unemployment and exchange rates.", "r": 9, "connCount": 2}, {"id": 104, "name": "Nonlinearity", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "In complex systems, cause and effect are not proportional \u2014 small inputs can produce large effects, and vice versa.", "problem": "Linear intuition (double the input \u2192 double the output) fails in most real-world systems, causing misallocation of effort and surprise at outcomes.", "howItWorks": "Nonlinearity arises from feedback loops, thresholds, and interactions between variables. Examples: dose-response curves (medication), economic returns (first employee vs. 100th), epidemic spread (R0 above/below 1). In practice: identify where feedback loops or thresholds exist; expect disproportionate returns at leverage points; invest in understanding tipping points before interventions.", "origin": "Foundational to systems dynamics (Forrester, 1961), chaos theory (Lorenz, 1963), and complexity science generally.", "r": 7, "connCount": 1}, {"id": 105, "name": "Delays", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Time lags between actions and their effects in a system cause oscillation, overshoot, and policy failure when decision-makers don't account for them.", "problem": "Managers intervene based on current state, but current state reflects past actions \u2014 without accounting for delays, they overcorrect and create cycles.", "howItWorks": "Stock changes only as fast as flows allow. Decisions are based on current information, which reflects past reality. If delay = 2 years and policy cycle = 1 year, you're always fighting the last war. Classic example: commodity cycles (hog cycles), boom-bust real estate, inventory bullwhip effect. Antidote: map delays explicitly in system models; create leading indicators; build patience for feedback.", "origin": "Jay Forrester, system dynamics (1961). Elaborated by Peter Senge in The Fifth Discipline (1990).", "r": 6, "connCount": 0}, {"id": 106, "name": "Resilience", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "The ability of a system to absorb disturbance and reorganize while undergoing change, retaining essentially the same function, structure, and identity.", "problem": "Optimization for efficiency destroys the slack, redundancy, and diversity that systems need to survive unexpected shocks.", "howItWorks": "Resilience \u2260 robustness (resist change) \u2260 stability (return to same state). Resilience = capacity to adapt while maintaining core function. Three aspects: resistance (how much disturbance can be absorbed), recovery speed, and transformability (ability to become a new system when old is untenable). Builders of resilience: diversity, modularity, redundancy, tight feedbacks, ecological memory, social capital.", "origin": "C.S. Holling, 'Resilience and Stability of Ecological Systems' (1973). Developed by Resilience Alliance. Taleb's Antifragility extends the concept.", "r": 7, "connCount": 1}, {"id": 107, "name": "Self-Organization", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Complex ordered structures and behaviors emerge spontaneously from local interactions without central control or external direction.", "problem": "Centralized design and control of complex systems fails because the information needed for optimal decisions is too distributed and dynamic.", "howItWorks": "Agents follow simple local rules based on local information \u2192 global patterns emerge (ant trails, market prices, cities, internet routing). No blueprint, no controller. Self-organization requires: positive feedback (amplify successful patterns), negative feedback (limit runaway growth), multiple interactions, diversity. Implication: create good local rules and conditions rather than trying to design global outcomes.", "origin": "Norbert Wiener (cybernetics, 1948); Ilya Prigogine (dissipative structures, Nobel 1977); Santa Fe Institute complexity work (1980s).", "r": 7, "connCount": 1}, {"id": 108, "name": "Collective Action Problem", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "When individuals acting in rational self-interest produce a collectively suboptimal outcome that none of them individually wants.", "problem": "Groups fail to provide public goods or protect shared resources even when all members would benefit from cooperation.", "howItWorks": "Individual payoff from defecting exceeds individual payoff from cooperating regardless of others' choices \u2192 dominant strategy is defection \u2192 everyone defects \u2192 worse outcome for all. Tragedy of the Commons and Prisoner's Dilemma are special cases. Solutions: repeated interaction (shadow of the future), reputation systems, binding agreements, external enforcement, Ostrom's design principles for commons.", "origin": "Mancur Olson, The Logic of Collective Action (1965). Game theory lineage: Nash (1950), Axelrod (Evolution of Cooperation, 1984).", "r": 9, "connCount": 2}, {"id": 109, "name": "Boiling Frog", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Gradual, incremental change in a system goes unnoticed and unchallenged until it's too late to respond effectively.", "problem": "Humans and organizations have change-detection systems calibrated to sudden shifts \u2014 they miss slow, accumulating threats until they cross thresholds.", "howItWorks": "Change below the perception threshold \u2192 no response \u2192 accumulation continues \u2192 when change rate exceeds threshold, system is already deeply committed to the trajectory. Applications: climate change, organizational culture decay, technology disruption. Antidote: establish explicit rate-of-change metrics, not just state metrics; run pre-mortems; create tripwires at early thresholds.", "origin": "Metaphor (scientifically inaccurate but analytically useful). Peter Senge used it in The Fifth Discipline (1990) as a systems thinking illustration.", "r": 7, "connCount": 1}, {"id": 110, "name": "Forrester's Counterintuitive Behavior", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Complex multi-loop feedback systems behave counterintuitively \u2014 high-leverage intervention points are not where intuition suggests, and intuitive solutions often worsen problems.", "problem": "Human intuition, calibrated for simple linear systems, systematically misidentifies causes, solutions, and leverage points in complex feedback systems.", "howItWorks": "Social systems are multi-loop feedback structures. Our intuition expects: clear cause-effect proximity (they're often separated by time/space), that more inputs = more outputs (often false), that solving the symptom addresses the root (usually doesn't). Forrester's prescription: build explicit causal models; simulate before intervening; use system dynamics to test mental models.", "origin": "Jay W. Forrester, 'Counterintuitive Behavior of Social Systems' (1971), Technology Review.", "r": 7, "connCount": 1}, {"id": 111, "name": "Ostrom's Design Principles", "category": "systems-thinking", "color": "#27ae60", "catLabel": "Systems Thinking", "oneLiner": "Eight principles for sustainable self-governance of shared resources, proving that commons can be managed without privatization or top-down state control.", "problem": "The Tragedy of the Commons presents a false binary (privatize or regulate); Ostrom showed communities self-organize effective governance given the right conditions.", "howItWorks": "Eight principles: (1) Clearly defined boundaries, (2) Rules match local conditions, (3) Collective choice arrangements, (4) Monitoring, (5) Graduated sanctions, (6) Conflict resolution mechanisms, (7) External recognition of rights to organize, (8) Polycentric governance for larger systems. Applies beyond fisheries/forests to software commons (open source), knowledge commons, and organizational governance.", "origin": "Elinor Ostrom, Governing the Commons (1990). Nobel Prize in Economics, 2009.", "r": 9, "connCount": 2}, {"id": 112, "name": "Situation-Behavior-Impact (SBI)", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Structures feedback by separating the specific situation, observable behavior, and its impact \u2014 removing judgment.", "problem": "Feedback triggers defensiveness because it mixes observation with interpretation and personal judgment.", "howItWorks": "Three steps: (1) Situation \u2014 anchor the specific context/time; (2) Behavior \u2014 describe only observable actions, no inference; (3) Impact \u2014 state the concrete effect on you, team, or outcome. Optional fourth step: ask about Intent to close gap between intention and impact.", "origin": "Center for Creative Leadership (CCL), mid-20th century; formalized in leadership development programs.", "r": 9, "connCount": 2}, {"id": 113, "name": "Nonviolent Communication (NVC)", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "A four-part language framework (observation, feeling, need, request) that replaces judgment with empathic connection.", "problem": "Habitual language \u2014 evaluations, demands, comparisons \u2014 escalates conflict by disconnecting parties from their own and each other's humanity.", "howItWorks": "Four sequential components: Observation (fact without evaluation), Feeling (emotion arising from that observation), Need (universal need behind the feeling), Request (specific, doable, non-demand ask). Feelings flow from unmet needs, not other people's actions \u2014 this reframing shifts blame to shared humanity.", "origin": "Marshall Rosenberg, clinical psychologist, 1960s\u201370s; rooted in humanistic psychology and nonviolence principles.", "r": 11, "connCount": 3}, {"id": 114, "name": "Minto Pyramid Principle (BLUF)", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Top-down communication structure: lead with the conclusion, then support it with key arguments, then detailed evidence.", "problem": "Audiences lack time for bottom-up narratives; burying conclusions in long preambles loses attention and obscures the key message.", "howItWorks": "Three levels: (1) Assertion/Conclusion at top \u2014 the answer first; (2) Key Arguments \u2014 why the answer is right; (3) Supporting Data \u2014 evidence for each argument. MECE (mutually exclusive, collectively exhaustive) governs groupings. Also encodes SCQA opener: Situation \u2192 Complication \u2192 Question \u2192 Answer.", "origin": "Barbara Minto, McKinsey & Company, 1970s; documented in The Pyramid Principle (1985).", "r": 11, "connCount": 3}, {"id": 115, "name": "SCQA Framework", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Opens any executive communication with Situation \u2192 Complication \u2192 Question \u2192 Answer to orient and persuade instantly.", "problem": "Context-heavy openings lose busy executives; listeners disengage before the point is reached.", "howItWorks": "Situation: agreed-upon context/starting state. Complication: the threat/opportunity/tension that disrupts the situation. Question: the implied 'so what do we do?' that the complication raises. Answer: your recommendation. Works for emails, decks, memos, and verbal pitches.", "origin": "Barbara Minto, derived from the Pyramid Principle; widely adopted by McKinsey, Bain, BCG.", "r": 9, "connCount": 2}, {"id": 116, "name": "Ethos, Pathos, Logos (Rhetorical Triangle)", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Aristotle's three modes of persuasion: credibility (ethos), emotion (pathos), and logic (logos).", "problem": "Persuasion fails when a communicator relies on only one dimension \u2014 pure logic is cold, pure emotion is manipulative, pure authority is hollow.", "howItWorks": "Ethos: establish speaker credibility and character before the argument. Pathos: connect to the audience's values, fears, and desires. Logos: provide structured evidence, data, and reasoning. Optimal persuasion calibrates the mix to audience, stakes, and context.", "origin": "Aristotle, Rhetoric (~350 BCE).", "r": 9, "connCount": 2}, {"id": 117, "name": "Monroe's Motivated Sequence", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Five-step persuasive structure \u2014 Attention, Need, Satisfaction, Visualization, Action \u2014 that mirrors natural decision psychology.", "problem": "Persuasive speeches and proposals fail to move audiences to action because they inform without motivating.", "howItWorks": "1. Attention \u2014 hook the audience. 2. Need \u2014 establish the problem they have. 3. Satisfaction \u2014 present the solution. 4. Visualization \u2014 paint the future with/without the solution. 5. Action \u2014 specific, easy call-to-action now. Mirrors how humans naturally process problems and decide.", "origin": "Alan Monroe, Purdue University, mid-1930s.", "r": 9, "connCount": 2}, {"id": 118, "name": "Hero's Journey (Monomyth)", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Universal narrative arc \u2014 ordinary world, call to adventure, ordeal, transformation, return \u2014 that structures compelling stories.", "problem": "Communications that present facts without story fail to engage, be remembered, or move audiences to change.", "howItWorks": "Cast the audience/customer as the hero facing a meaningful challenge; the brand/speaker is the guide. Key stages: ordinary world \u2192 call \u2192 threshold \u2192 trials \u2192 ordeal \u2192 reward \u2192 return transformed. Brains remember narratives 22\u00d7 better than facts alone.", "origin": "Joseph Campbell, The Hero with a Thousand Faces (1949); operationalized for business by Christopher Vogler (1992).", "r": 7, "connCount": 1}, {"id": 119, "name": "Story Spine", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Fill-in-the-blank improv template \u2014 Once upon a time\u2026 But then one day\u2026 Until finally\u2026 \u2014 that generates well-formed stories instantly.", "problem": "People struggle to construct coherent narratives from scratch; need a structural scaffold to activate story logic.", "howItWorks": "Four beats: Balance ('Once upon a time\u2026 every day\u2026'), Unbalance ('But then one day\u2026'), Quest/Consequences ('Because of that\u2026 and so\u2026'), New Balance ('Until finally\u2026 Ever since then\u2026'). Used by Pixar as a story generation and testing tool.", "origin": "Kenn Adams, Freestyle Repertory Theater, New York, 1991; popularized by Kat Koppett and Pixar.", "r": 7, "connCount": 1}, {"id": 120, "name": "Active Listening", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Fully attending to a speaker \u2014 suspending judgment, reflecting back, asking clarifying questions \u2014 to build understanding and trust.", "problem": "Most people listen to respond, not to understand; this creates miscommunication, missed signals, and eroded trust.", "howItWorks": "Core techniques: full attention (no multitasking), body language signaling engagement, paraphrasing/reflecting back, deferring judgment, asking open questions. Otto Scharmer's four levels: Downloading \u2192 Factual \u2192 Empathetic \u2192 Generative. Listening is the cheapest concession in any negotiation.", "origin": "Carl Rogers, humanistic psychology, 1950s; operationalized across communication theory; extended by Scharmer's Theory U levels.", "r": 7, "connCount": 1}, {"id": 121, "name": "Socratic Method", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Guided questioning technique that draws out knowledge, exposes contradictions, and builds understanding through dialogue rather than lecture.", "problem": "Direct assertion triggers defensiveness; telling people what to think creates resistance rather than conviction.", "howItWorks": "Ask progressive open questions that probe assumptions, invite elaboration, and reveal contradictions. The interlocutor constructs the insight themselves (elenchus \u2014 cross-examination). Leads to deeper conviction than received information because the conclusion feels self-generated.", "origin": "Socrates (~470\u2013399 BCE); documented by Plato.", "r": 7, "connCount": 1}, {"id": 122, "name": "Johari Window", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Four-quadrant self/other awareness model \u2014 Open, Blind, Hidden, Unknown \u2014 for building trust through disclosure and feedback.", "problem": "Interpersonal trust breaks down because people operate from blind spots and hidden information; neither party knows what they don't know about themselves.", "howItWorks": "Map behavior/feelings across two axes (known/unknown to self vs. known/unknown to others): Open Arena (mutual knowledge), Blind Spot (others see, you don't), Hidden (you know, others don't), Unknown (neither knows). Expand the Open Arena via self-disclosure (shrinks Hidden) and soliciting feedback (shrinks Blind Spot).", "origin": "Joseph Luft and Harrington Ingham, University of California, 1955.", "r": 9, "connCount": 2}, {"id": 123, "name": "Transactional Analysis (PAC Model)", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Maps every communication as a transaction between three ego states \u2014 Parent, Adult, Child \u2014 to diagnose and repair miscommunication.", "problem": "Conversations derail when parties unknowingly shift ego states, creating 'crossed transactions' that generate conflict and confusion.", "howItWorks": "Parent: rule-based, judgmental, nurturing. Adult: rational, data-processing, present-focused. Child: emotional, creative, reactive. Complementary transactions (P\u2192C / C\u2192P) sustain conversation; crossed transactions (P\u2192C / A\u2192A) cause breakdowns. Adult-to-Adult is the healthiest default for collaborative work.", "origin": "Eric Berne, psychiatrist, 1950s; published in Games People Play (1964).", "r": 7, "connCount": 1}, {"id": 124, "name": "DESC Model", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Assertive communication script \u2014 Describe, Express, Specify, Consequences \u2014 for addressing problems without triggering unnecessary conflict.", "problem": "People avoid difficult conversations or escalate them to conflict because they lack a structure for stating needs clearly and assertively.", "howItWorks": "1. Describe the specific behavior objectively. 2. Express your feeling using 'I' statements. 3. Specify the change you want. 4. Consequences \u2014 name the positive outcome if change happens (and optionally the negative if not). Bridges assertiveness and empathy.", "origin": "Sharon and Gordon Bower, Asserting Yourself (1976).", "r": 7, "connCount": 1}, {"id": 125, "name": "I-Messages", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Self-disclosing communication form \u2014 'When [behavior], I feel [emotion] because [tangible effect]' \u2014 that avoids blame and reduces defensiveness.", "problem": "'You-messages' ('You always\u2026', 'You never\u2026') trigger defensiveness and argument; they diagnose rather than disclose.", "howItWorks": "Three parts: (1) Non-blameful description of the behavior; (2) Your feeling; (3) The concrete tangible effect on you. Shifts ownership of the problem to the speaker's experience rather than a verdict on the listener's character.", "origin": "Thomas Gordon, Parent Effectiveness Training, 1960s; Gordon Training International.", "r": 7, "connCount": 1}, {"id": 126, "name": "Crucial Conversations Framework", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "A toolkit for high-stakes conversations where opinions differ and emotions run strong \u2014 centered on psychological safety and a shared pool of meaning.", "problem": "Most people either avoid crucial conversations (silence) or conduct them badly (violence), in both cases preventing the shared understanding needed to resolve them.", "howItWorks": "Core conditions: Mutual Purpose (both parties believe you share their goals) and Mutual Respect (neither party feels disrespected). When safety breaks down, restore it before continuing content. STATE model for sharing views: Share facts, Tell your story, Ask for others' paths, Talk tentatively, Encourage testing.", "origin": "Kerry Patterson, Joseph Grenny, Ron McMillan, Al Switzler, VitalSmarts, 2002.", "r": 6, "connCount": 0}, {"id": 127, "name": "Overton Window", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "The range of ideas currently acceptable to mainstream public opinion \u2014 and a model for how to shift that range over time.", "problem": "Change agents propose ideas outside public acceptance and are dismissed as radical; the model explains how ideas move from unthinkable to policy.", "howItWorks": "Six stages from Unthinkable \u2192 Radical \u2192 Acceptable \u2192 Sensible \u2192 Popular \u2192 Policy. Politicians follow the window, not lead it. To shift the window: advocate positions more extreme than your actual goal to normalize the intermediate. Useful for strategic communication, advocacy, and anticipating resistance.", "origin": "Joseph Overton, Mackinac Center for Public Policy, mid-1990s; systematized by Joseph Lehman after Overton's death in 2003.", "r": 9, "connCount": 2}, {"id": 128, "name": "BATNA & ZOPA", "category": "negotiation", "color": "#1abc9c", "catLabel": "Negotiation", "oneLiner": "BATNA is your best walkaway option; ZOPA is the overlap zone where a deal is possible \u2014 together they define your negotiation position.", "problem": "Negotiators make poor deals (accept too little or reject viable ones) because they lack clear walk-away thresholds and don't understand the feasible deal space.", "howItWorks": "BATNA: List alternatives if talks fail \u2192 develop the best ones \u2192 your strongest option is your BATNA and reservation point. ZOPA: the range between your reservation point and the other party's where mutual agreement exists. Strong BATNA = negotiating power. No ZOPA = no deal. Identify both before entering any negotiation.", "origin": "Roger Fisher and William Ury, Harvard Program on Negotiation, Getting to Yes (1981).", "r": 7, "connCount": 1}, {"id": 129, "name": "Principled Negotiation (Interest-Based Negotiation)", "category": "negotiation", "color": "#1abc9c", "catLabel": "Negotiation", "oneLiner": "Four-principle framework \u2014 separate people from problem, focus on interests not positions, generate options, use objective criteria \u2014 to reach mutual gains.", "problem": "Positional bargaining wastes value (people get anchored to positions) and damages relationships (conflates people with problems).", "howItWorks": "1. Separate the people from the problem \u2014 address emotions and relationships separately from substance. 2. Focus on interests, not positions \u2014 beneath every position is a set of underlying needs. 3. Generate options for mutual gain \u2014 invent before deciding. 4. Insist on objective criteria \u2014 ground agreements in independent standards both sides accept.", "origin": "Roger Fisher and William Ury, Harvard Negotiation Project, Getting to Yes (1981).", "r": 11, "connCount": 3}, {"id": 130, "name": "Tactical Empathy (FBI Negotiation)", "category": "negotiation", "color": "#1abc9c", "catLabel": "Negotiation", "oneLiner": "Mirroring, labeling emotions, and calibrated questions to build rapport and surface hidden motivations in high-stakes negotiations.", "problem": "Rational argument fails under emotional conditions; standard compromise leaves value uncaptured and relationships damaged.", "howItWorks": "Three core tools: (1) Mirroring \u2014 repeat last 1\u20133 words with upward inflection, then silence; forces elaboration. (2) Labeling \u2014 'It seems like\u2026' to name the other party's emotions; validates and de-escalates. (3) Calibrated questions \u2014 'How?' and 'What?' questions that force the other side to solve your problems. Never split the difference; seek asymmetric resolution.", "origin": "Chris Voss, FBI lead international kidnapping negotiator; Never Split the Difference (2016).", "r": 7, "connCount": 1}, {"id": 131, "name": "Anchoring", "category": "negotiation", "color": "#1abc9c", "catLabel": "Negotiation", "oneLiner": "The first number in a negotiation disproportionately pulls the final outcome toward it \u2014 set the anchor deliberately and early.", "problem": "Negotiators who wait for the other side to anchor first cede positional control; those who anchor poorly leave value on the table.", "howItWorks": "The human brain adjusts insufficiently away from the first piece of information it encounters. Tactic: anchor first with an extreme but justified number; use odd/non-round figures (appear more calculated); anchor in your favor on all dimensions simultaneously. Defense: generate your own range independently before hearing the other side's number.", "origin": "Amos Tversky and Daniel Kahneman, anchoring-and-adjustment heuristic, 1974; applied to negotiation by research from Harvard and beyond.", "r": 9, "connCount": 2}, {"id": 132, "name": "Inoculation Theory", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Pre-expose audiences to weakened forms of manipulative arguments to build resistance before they encounter the full attack.", "problem": "Debunking misinformation after exposure has limited effect due to the 'continued influence effect'; prevention is more effective than correction.", "howItWorks": "Two components: (1) Forewarning \u2014 alert the audience that a persuasion attempt is coming; (2) Pre-bunking \u2014 expose a weakened/refuted version of the misleading argument or technique. Triggers 'motivational threat' that activates counter-argument generation. Works across cultures; more effective than debunking.", "origin": "William J. McGuire, social psychologist, 1961; revived for misinformation research by Sander van der Linden et al., 2010s.", "r": 11, "connCount": 3}, {"id": 133, "name": "Cialdini's 7 Principles of Influence", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Seven cognitive shortcuts \u2014 Reciprocity, Commitment/Consistency, Social Proof, Authority, Liking, Scarcity, Unity \u2014 that govern how humans are persuaded.", "problem": "Persuasion without understanding psychological heuristics is hit-or-miss; these principles explain the automatic triggers of compliance.", "howItWorks": "Each principle exploits a cognitive heuristic: Reciprocity (give first); Commitment (small yes leads to large yes); Social Proof (others' choices reduce uncertainty); Authority (credentials signal safety); Liking (similarity/familiarity increases compliance); Scarcity (rarity implies value); Unity (shared identity accelerates all others). Most powerful when combined authentically.", "origin": "Robert Cialdini, Influence: The Psychology of Persuasion (1984); Unity added in Pre-Suasion (2016).", "r": 11, "connCount": 3}, {"id": 134, "name": "Pre-Suasion", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Shape what people attend to before your message to prime them to receive it favorably \u2014 the pre-sell matters as much as the sell.", "problem": "Even compelling messages fail when delivered into a mentally unreceptive frame; attention management before a message determines how it lands.", "howItWorks": "Create a 'privileged moment' \u2014 a time-limited window where the audience's attention is already primed for your message. Techniques: prime with concepts associated with your message (e.g., show luxury images before pitching premium); use unity cues (shared identity) before asking; sequence information so attention is channeled. Attention creates perceived importance.", "origin": "Robert Cialdini, Pre-Suasion: A Revolutionary Way to Influence and Persuade (2016).", "r": 9, "connCount": 2}, {"id": 135, "name": "Trust Equation", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Trustworthiness = (Credibility + Reliability + Intimacy) / Self-Orientation \u2014 the formula for building trusted relationships.", "problem": "Trust is treated as intangible and unmeasurable; this model makes it diagnosable and actionable by identifying which variable is broken.", "howItWorks": "Numerator: Credibility (words \u2014 do you know your stuff?), Reliability (actions \u2014 do you follow through?), Intimacy (emotional safety \u2014 can I be vulnerable with you?). Denominator: Self-Orientation (how much you focus on yourself vs. others). Reducing self-orientation has the largest leverage \u2014 it multiplies all three numerator variables.", "origin": "David Maister, Charles Green, Robert Galford, The Trusted Advisor (2000).", "r": 7, "connCount": 1}, {"id": 136, "name": "Psychological Safety", "category": "leadership", "color": "#d35400", "catLabel": "Leadership", "oneLiner": "A shared team belief that interpersonal risk-taking (speaking up, admitting errors, experimenting) will not result in punishment \u2014 the #1 predictor of team performance.", "problem": "Teams underperform because members self-censor, hide errors, and avoid experiments \u2014 not from incompetence but from fear of social consequences.", "howItWorks": "Leaders create safety by: modeling intellectual humility, treating errors as data not verdicts, welcoming dissent explicitly, and responding non-punitively to bad news. Mechanism: safety enables learning behaviors (feedback-seeking, experimentation, error discussion), which mediate team performance. High standards + high safety = peak performance zone.", "origin": "Amy Edmondson, Harvard Business School, Administrative Science Quarterly (1999); validated by Google Project Aristotle (2016).", "r": 15, "connCount": 5}, {"id": 137, "name": "Radical Candor", "category": "leadership", "color": "#d35400", "catLabel": "Leadership", "oneLiner": "The sweet spot between caring personally and challenging directly \u2014 the management alternative to ruinous empathy and obnoxious aggression.", "problem": "Managers default to either withholding honest feedback to spare feelings (Ruinous Empathy) or delivering it without care (Obnoxious Aggression) \u2014 both fail the recipient.", "howItWorks": "2\u00d72 matrix: Care Personally (y-axis) \u00d7 Challenge Directly (x-axis). Four quadrants: Radical Candor (high/high \u2014 the goal), Ruinous Empathy (high care/low challenge \u2014 most common failure), Obnoxious Aggression (low care/high challenge), Manipulative Insincerity (low/low). Practice: praise specifically, criticize kindly and clearly, in-person first.", "origin": "Kim Scott, former Google/Apple executive; Radical Candor (2017).", "r": 13, "connCount": 4}, {"id": 138, "name": "SCARF Model", "category": "leadership", "color": "#d35400", "catLabel": "Leadership", "oneLiner": "Five social domains \u2014 Status, Certainty, Autonomy, Relatedness, Fairness \u2014 that trigger reward or threat responses in the brain during interactions.", "problem": "Leaders unknowingly trigger social threat states (micromanagement kills Autonomy; ambiguity destroys Certainty) that shut down creative, collaborative thinking.", "howItWorks": "When any SCARF domain is threatened, the brain enters a limbic 'threat state' \u2014 reducing higher-order thinking, collaboration, and performance. When rewarded, the brain is creative and open. Leaders can diagnose which domain is threatened and intervene: e.g., reduce Status threat by framing feedback as coaching, not judgment; increase Certainty with clear timelines.", "origin": "David Rock, NeuroLeadership Institute, 2008 paper.", "r": 9, "connCount": 2}, {"id": 139, "name": "Five Dysfunctions of a Team", "category": "leadership", "color": "#d35400", "catLabel": "Leadership", "oneLiner": "Hierarchical pyramid of team failure modes \u2014 Absence of Trust \u2192 Fear of Conflict \u2192 Lack of Commitment \u2192 Avoidance of Accountability \u2192 Inattention to Results.", "problem": "Teams fail not from strategy or talent gaps but from compounding interpersonal dysfunctions that each prevent the next layer of performance.", "howItWorks": "Pyramid must be built from the base up. Trust (vulnerability-based) enables Conflict (productive debate). Conflict enables Commitment (buy-in despite disagreement). Commitment enables Accountability (peer pressure to perform). Accountability enables Results focus (team over individual). Each dysfunction is measurable and addressable.", "origin": "Patrick Lencioni, The Five Dysfunctions of a Team (2002).", "r": 9, "connCount": 2}, {"id": 140, "name": "Servant Leadership", "category": "leadership", "color": "#d35400", "catLabel": "Leadership", "oneLiner": "Leadership philosophy that puts followers' growth and needs first \u2014 the leader as steward and enabler, not commander.", "problem": "Command-and-control leadership creates compliance but not commitment, disengagement, and organizational brittleness.", "howItWorks": "Ten characteristics (Spears): Listening, Empathy, Healing, Awareness, Persuasion (not coercion), Conceptualization, Foresight, Stewardship, Commitment to people's growth, Building community. Test: are those being served growing healthier, freer, and more autonomous? Are the least privileged in society benefiting?", "origin": "Robert K. Greenleaf, 'The Servant as Leader' essay (1970); AT&T executive and management researcher.", "r": 7, "connCount": 1}, {"id": 141, "name": "Transformational Leadership (4 I's)", "category": "leadership", "color": "#d35400", "catLabel": "Leadership", "oneLiner": "Leadership that transforms followers through Idealized Influence, Inspirational Motivation, Intellectual Stimulation, and Individualized Consideration.", "problem": "Transactional leadership (rewards/punishments) produces performance but not growth, creativity, or organizational transformation.", "howItWorks": "Four I's: Idealized Influence (leader as role model, builds trust and admiration); Inspirational Motivation (compelling vision that motivates participation); Intellectual Stimulation (challenge followers to innovate and question status quo); Individualized Consideration (personal attention to each follower's development needs). Together produce change beyond expected performance.", "origin": "James MacGregor Burns, Leadership (1978); operationalized and measured by Bernard Bass, 1985.", "r": 7, "connCount": 1}, {"id": 142, "name": "Situational Leadership (Hersey-Blanchard)", "category": "leadership", "color": "#d35400", "catLabel": "Leadership", "oneLiner": "Match your leadership style \u2014 Directing, Coaching, Supporting, Delegating \u2014 to the follower's competence and commitment level.", "problem": "Fixed leadership style mismatches follower readiness: directing an expert is condescending; delegating to a novice is abandonment.", "howItWorks": "Two axes: Task Behavior (direction) and Relationship Behavior (support). Four styles: S1 Directing (high task/low relationship \u2014 novice); S2 Coaching (high task/high relationship \u2014 learning); S3 Supporting (low task/high relationship \u2014 capable but unconfident); S4 Delegating (low task/low relationship \u2014 expert). Effective leaders diagnose readiness and adapt continuously.", "origin": "Paul Hersey and Ken Blanchard, 'Life Cycle Theory of Leadership' (1969); developed through 1970s.", "r": 7, "connCount": 1}, {"id": 143, "name": "Authentic Leadership", "category": "leadership", "color": "#d35400", "catLabel": "Leadership", "oneLiner": "Leadership grounded in self-awareness, transparent values, and genuine relationships \u2014 not performance or persona.", "problem": "Leaders who mask their true selves to project authority erode trust and produce followers who comply but don't commit.", "howItWorks": "Four components: Self-Awareness (knowing your strengths, weaknesses, and purpose), Relational Transparency (sharing true thoughts and feelings appropriately), Balanced Processing (seeking and weighing input before deciding), Internalized Moral Perspective (values-driven decisions, not external pressure). Bill George adds: purpose, values, heart, relationships, self-discipline.", "origin": "Bill George, Authentic Leadership (2003); formalized academically by Walumbwa et al., 2008.", "r": 7, "connCount": 1}, {"id": 144, "name": "Stakeholder Power-Interest Matrix (Mendelow's Matrix)", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Four-quadrant grid \u2014 High/Low Power \u00d7 High/Low Interest \u2014 to prioritize stakeholder communication and engagement strategies.", "problem": "Communicating identically with all stakeholders wastes effort and misses political dynamics; different stakeholders need different engagement.", "howItWorks": "Plot stakeholders on Power (influence over project) \u00d7 Interest (level of concern) grid: High/High = Manage Closely (key players); High/Low = Keep Satisfied; Low/High = Keep Informed; Low/Low = Monitor. Tailor communication frequency, detail, and channel to each quadrant. Reassess as conditions change.", "origin": "Aubrey Mendelow, stakeholder theory, 1991; built on Freeman's stakeholder framework.", "r": 7, "connCount": 1}, {"id": 145, "name": "SPIN Selling", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Four question types \u2014 Situation, Problem, Implication, Need-Payoff \u2014 that guide buyers to self-discover their own needs.", "problem": "Features/benefits pitches fail for complex sales because they tell buyers what to think rather than letting them reach conviction themselves.", "howItWorks": "Sequence: Situation questions (establish context), Problem questions (surface difficulties), Implication questions (expand consequences of the problem \u2014 most powerful), Need-Payoff questions (invite buyer to articulate the value of solving it). Buyers who state the solution themselves are 5\u00d7 more committed to it. Based on 35,000+ sales call observations.", "origin": "Neil Rackham, Huthwaite International; SPIN Selling (1988) \u2014 research-based.", "r": 7, "connCount": 1}, {"id": 146, "name": "Four Levels of Listening (Theory U)", "category": "communication", "color": "#8e44ad", "catLabel": "Communication", "oneLiner": "Scharmer's four listening depths \u2014 Downloading, Factual, Empathetic, Generative \u2014 with Generative listening enabling co-creation and transformation.", "problem": "Most listening is self-confirming (Downloading) and stays at the surface, preventing genuine understanding and emergent insight.", "howItWorks": "Level 1 (Downloading): confirming what you already know. Level 2 (Factual): attending to new data that disconfirms your model. Level 3 (Empathetic): experiencing the speaker's perspective from inside their reality. Level 4 (Generative): transcending the individual \u2014 dialogue that transforms both parties and opens new futures. Each level requires letting go of a different layer of ego.", "origin": "Otto Scharmer, MIT, Theory U: Leading from the Future as It Emerges (2007).", "r": 7, "connCount": 1}, {"id": 147, "name": "Survivorship Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We study only the winners, making success look far more common and failure invisible.", "problem": "Leads to overconfidence in strategies, advice, and models built only on visible successes.", "howItWorks": "Failed cases are filtered out (businesses that closed, planes that crashed, studies that weren't published), leaving only survivors visible. WWII analyst Abraham Wald famously showed that plane armor should reinforce where returning planes were NOT hit \u2014 the ones hit there never came back.", "origin": "Formalized in statistics and probability; popularized in cognitive bias literature by Nassim Taleb and Farnam Street.", "r": 9, "connCount": 2}, {"id": 148, "name": "Dunning-Kruger Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "People with low ability in a domain overestimate their competence because they lack the metacognitive skill to recognize their own deficits.", "problem": "Incompetent people make decisions with unwarranted confidence; experts often underestimate their own rarity.", "howItWorks": "Low-skill individuals suffer a dual burden: they make poor decisions AND lack the meta-knowledge to realize it. As competence grows, confidence initially drops (the 'valley of despair') before rising again with genuine expertise. Linked directly to metacognition failure.", "origin": "David Dunning and Justin Kruger, Cornell University, 1999.", "r": 11, "connCount": 3}, {"id": 149, "name": "Anchoring Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "The first number or piece of information encountered disproportionately influences all subsequent judgments.", "problem": "Negotiations, estimates, and decisions get skewed by irrelevant or arbitrary initial values.", "howItWorks": "When exposed to an anchor (e.g., a price, estimate, or statistic), people adjust insufficiently away from it even when told it's random. Applies to salary negotiation, medical diagnosis, legal sentencing, and everyday estimation. Generating an independent estimate before seeing any reference number partially mitigates it.", "origin": "Amos Tversky and Daniel Kahneman, 1974, 'Judgment Under Uncertainty: Heuristics and Biases.'", "r": 9, "connCount": 2}, {"id": 150, "name": "Availability Heuristic", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We judge probability and importance by how easily examples come to mind, not by actual statistics.", "problem": "Events that are vivid, recent, or emotionally charged (plane crashes, shark attacks) are wildly overestimated relative to quiet, common killers (heart disease, car accidents).", "howItWorks": "System 1 (fast thinking) uses mental availability as a proxy for frequency and probability. Whatever is cognitively accessible \u2014 because it's recent, emotional, or frequently repeated in media \u2014 gets assigned higher likelihood. Counter: consult base rates and historical data.", "origin": "Amos Tversky and Daniel Kahneman, 1973.", "r": 7, "connCount": 1}, {"id": 151, "name": "Hindsight Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "After learning an outcome, we believe we 'knew it all along' \u2014 retroactively inflating how predictable the event was.", "problem": "Distorts learning from experience; leads to overconfidence, poor post-mortems, and blame attribution.", "howItWorks": "Once we know a result, the brain reconstructs memory to make the outcome seem inevitable. This 'creeping determinism' prevents honest analysis of what was actually knowable at the time. Structured pre-mortems and contemporaneous records counter it.", "origin": "Baruch Fischhoff, 1975; extensively studied by Kahneman.", "r": 7, "connCount": 1}, {"id": 152, "name": "Status Quo Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We prefer the current state of affairs and resist change even when change would be beneficial.", "problem": "Organizations, individuals, and systems persist with suboptimal arrangements because switching feels like a loss.", "howItWorks": "Rooted in loss aversion (potential losses from change loom larger than potential gains) and cognitive cost avoidance (changing requires mental effort). Default options leverage this: most people accept the default in pensions, organ donation, and software settings. Reframing the status quo as 'a choice' reduces the bias.", "origin": "William Samuelson and Richard Zeckhauser, 1988.", "r": 7, "connCount": 1}, {"id": 153, "name": "Endowment Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We assign higher value to things we own than to identical things we don't own.", "problem": "Creates irrational attachment to possessions, inflates asking prices, and impedes trades that would benefit both parties.", "howItWorks": "Once ownership is established, the object is integrated into self-concept. Willingness to accept payment (WTA) exceeds willingness to pay (WTP) for the same item. Classic experiment: half a group randomly given coffee mugs; sellers demanded ~2x what buyers offered. Driven by loss aversion \u2014 giving up the item feels like a loss.", "origin": "Richard Thaler, 1980; experimentally demonstrated with Kahneman and Knetsch.", "r": 7, "connCount": 1}, {"id": 154, "name": "Bandwagon Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We adopt beliefs and behaviors because many others hold them, not because of independent evidence.", "problem": "Drives financial bubbles, political conformity, fashion cycles, and suppresses critical independent thinking.", "howItWorks": "Humans are social animals; social proof served as an evolutionary shortcut (if everyone is running, run). In modern contexts the 'crowd wisdom' shortcut misfires when the crowd is itself biased or poorly informed. Awareness of herd behavior and seeking base rates before acting counters it.", "origin": "Studied in social psychology through conformity research (Asch, 1951); behavioral economics context through Thaler and others.", "r": 7, "connCount": 1}, {"id": 155, "name": "Peak-End Rule", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We judge an experience almost entirely by its most intense moment and its final moment \u2014 not by the average or total.", "problem": "Distorts evaluation of medical procedures, customer experiences, relationships, and any extended event.", "howItWorks": "Kahneman's 'snapshot model' \u2014 the brain samples peak emotional intensity and the end state rather than integrating across time. Duration neglect applies: a shorter but more painful colonoscopy can be remembered as worse than a longer one with a milder ending. Customer experience designers use this to engineer good endings and memorable peaks.", "origin": "Daniel Kahneman and Barbara Fredrickson, early 1990s.", "r": 7, "connCount": 1}, {"id": 156, "name": "Halo Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "One positive (or negative) trait in a person or product causes us to rate all their other unrelated traits more positively (or negatively).", "problem": "Distorts hiring decisions, performance reviews, consumer choices, and interpersonal judgments.", "howItWorks": "The brain generalizes from a salient trait (attractiveness, confidence, a prestigious name) to form an overall impression, then filters subsequent observations through that lens. A confident speaker seems smarter; an attractive defendant seems less guilty. Blind evaluation processes and structured criteria mitigate it.", "origin": "Edward Thorndike, 1920; further developed by social psychologists.", "r": 7, "connCount": 1}, {"id": 157, "name": "Narrative Fallacy", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We impose causal stories on random sequences of events, creating false explanations that feel true.", "problem": "Leads to illusions of understanding, overconfidence in predictions, and wrong lessons from history.", "howItWorks": "The left hemisphere compulsively seeks coherent cause-and-effect narratives, even in pure randomness. Detailed explanations feel more credible than probabilistic ones (conjunction fallacy). Taleb argues this makes us systematically blind to genuine uncertainty and Black Swans. Antidote: track predictions before outcomes are known.", "origin": "Nassim Nicholas Taleb, 'The Black Swan,' 2007.", "r": 7, "connCount": 1}, {"id": 158, "name": "Recency Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We give disproportionate weight to recent events when making judgments about the future.", "problem": "Leads to chasing recent investment returns, misjudging trends, and poor long-term planning.", "howItWorks": "Recent information remains highly accessible in working memory (availability heuristic applied to time). Part of the serial position effect \u2014 the recency component. Investors buy near market peaks (recent gains feel like normal) and sell near troughs (recent losses feel permanent). Reviewing historical base rates counters it.", "origin": "Related to Ebbinghaus (1885) memory research; formalized in judgment/decision research by Kahneman and Tversky.", "r": 7, "connCount": 1}, {"id": 159, "name": "Framing Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "The same information presented differently produces systematically different choices.", "problem": "Manipulators (marketers, politicians, negotiators) can engineer desired decisions by choosing how to present options.", "howItWorks": "Gain frames vs. loss frames produce opposite preferences even when mathematically identical: '90% survival rate' vs. '10% mortality rate' feel very different. The brain evaluates options relative to a reference point, not in absolute terms (Prospect Theory). Reframing problems from multiple angles before deciding counters this.", "origin": "Amos Tversky and Daniel Kahneman, 1981.", "r": 9, "connCount": 2}, {"id": 160, "name": "Sunk Cost Fallacy", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We continue failing endeavors because of past investments (money, time, effort) that can never be recovered.", "problem": "Causes organizations and individuals to persist with bad projects, bad relationships, and bad strategies.", "howItWorks": "The 'don't waste' norm combines with loss aversion to make people feel that stopping = wasting past investment. Rational analysis: sunk costs are gone regardless; only future costs and benefits matter. Counter: evaluate every decision only on forward-looking value, treating past costs as irrelevant.", "origin": "Arkes and Blumer, 1985; popularized in behavioral economics through Thaler and Kahneman.", "r": 7, "connCount": 1}, {"id": 161, "name": "Fundamental Attribution Error", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We attribute others' behavior to their character while attributing our own behavior to circumstances.", "problem": "Creates unfair judgments, interpersonal conflicts, and poor organizational diagnoses (blame people, not systems).", "howItWorks": "The actor-observer asymmetry: observing others, we see only their behavior (salient), not their context (invisible). For ourselves, we are acutely aware of situational pressures. This leads to over-attributing others' failures to personality and under-attributing to environment. Asking 'what situational forces might explain this?' counters it.", "origin": "Lee Ross, 1977; building on Fritz Heider's attribution theory.", "r": 9, "connCount": 2}, {"id": 162, "name": "Overconfidence Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We systematically overestimate the accuracy of our knowledge and predictions.", "problem": "Drives excessive risk-taking, poor planning, and failure to seek disconfirming information.", "howItWorks": "Three forms: overprecision (confidence intervals too narrow), overplacement (I'm above average), overestimation (I'll do better than I will). Manifests as planning fallacy, underestimating competitors, and 90% confidence intervals containing the true answer only ~50% of the time. Calibration training and post-mortems help.", "origin": "Lichtenstein and Fischhoff, 1977; extensive research by Kahneman.", "r": 7, "connCount": 1}, {"id": 163, "name": "Gambler's Fallacy", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We believe that past random events influence future independent ones \u2014 that 'luck is due.'", "problem": "Leads to compulsive gambling escalation, poor investment timing, and false pattern detection in random data.", "howItWorks": "The brain seeks pattern and mean-reversion even in genuinely independent events. After a coin lands heads 10 times, most people feel tails is 'due.' In reality, each flip is independent. The 1913 Monte Carlo Casino incident (black 26 times in a row) cost gamblers a fortune betting on red.", "origin": "Studied in probability theory; named and formalized by Kahneman and Tversky.", "r": 7, "connCount": 1}, {"id": 164, "name": "Planning Fallacy", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We systematically underestimate how long tasks will take and how much they'll cost, while overestimating benefits.", "problem": "Causes project overruns, budget explosions, and missed deadlines at every scale from personal to megaproject.", "howItWorks": "We plan using the 'inside view' \u2014 focusing on our specific project's best-case sequence. The 'outside view' (reference class forecasting) \u2014 asking how long similar projects actually took \u2014 corrects it. Kahneman recommends deliberately seeking base rates for comparable past projects.", "origin": "Daniel Kahneman and Amos Tversky, 1979.", "r": 11, "connCount": 3}, {"id": 165, "name": "Availability Cascade", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Repeated public discussion of an idea makes people increasingly believe it's true, regardless of evidence.", "problem": "Drives moral panics, media-amplified risk distortion, and policy driven by fear rather than statistics.", "howItWorks": "A self-reinforcing chain: media coverage \u2192 increased salience \u2192 increased public concern \u2192 more media coverage \u2192 policy response. The more a risk is discussed, the more cognitively available it becomes, inflating perceived probability. Rare but dramatic risks (terrorism, shark attacks) get amplified; common silent risks get ignored.", "origin": "Timur Kuran and Cass Sunstein, 1999.", "r": 9, "connCount": 2}, {"id": 166, "name": "Backfire Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "When people encounter evidence contradicting their beliefs, they sometimes strengthen those beliefs rather than update them.", "problem": "Makes rational persuasion by evidence counterproductive in high-identity-stake domains.", "howItWorks": "When a core belief is threatened, the brain treats the challenge as an attack on identity, triggering defensive rationalization that reinforces the original position. Most potent for politically/ideologically charged beliefs. Note: later replication attempts have questioned the magnitude; the effect appears real but smaller than original studies suggested.", "origin": "Brendan Nyhan and Jason Reifler, 2010 (original); subsequent replication debates.", "r": 7, "connCount": 1}, {"id": 167, "name": "Affect Heuristic", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We use our current emotional state as information when making judgments, conflating 'how I feel about this' with 'what the evidence says.'", "problem": "Emotional responses to risk (fear, disgust, enthusiasm) override analytical assessment of actual probabilities.", "howItWorks": "When evaluating risks or benefits, people substitute the easier question 'how do I feel about this?' for the harder 'what are the statistics?' High fear \u2192 overestimate risk; high enthusiasm \u2192 underestimate risk. Attractive things seem safer; disgusting things seem more dangerous than they are.", "origin": "Paul Slovic, 2002; building on Kahneman's dual-process framework.", "r": 7, "connCount": 1}, {"id": 168, "name": "Curse of Knowledge", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Experts cannot imagine not knowing what they know, making it hard for them to communicate with or understand novices.", "problem": "Produces bad teaching, poor documentation, and communication failures between experts and non-experts.", "howItWorks": "Once information is in memory, it's nearly impossible to mentally simulate not having it. The expert assumes the listener has the same contextual background, uses jargon freely, and skips 'obvious' steps. The Feynman Technique directly counters this by forcing simple-language explanation.", "origin": "Chip Heath and Dan Heath in 'Made to Stick' (2006); underlying psychology studied earlier by Keysar et al.", "r": 7, "connCount": 1}, {"id": 169, "name": "IKEA Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We place disproportionately high value on things we partially created ourselves.", "problem": "Overvaluation of in-house solutions, NIH ('not invented here') syndrome, and resistance to outsourcing.", "howItWorks": "Labor investment creates psychological ownership. Even when the output is objectively worse, creators value it far more than neutral observers. Partially explains why homemade food tastes better and why founders overvalue their companies. Labor without completion eliminates the effect \u2014 the build must finish.", "origin": "Michael Norton, Daniel Mochon, and Dan Ariely, 2011.", "r": 7, "connCount": 1}, {"id": 170, "name": "Zeigarnik Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Incomplete or interrupted tasks are remembered better than completed ones.", "problem": "Unfinished business creates persistent cognitive intrusion; can be harnessed to maintain engagement or create anxiety.", "howItWorks": "The brain maintains 'open loops' for unresolved tasks, keeping them active in working memory to drive completion. Waiters remember unpaid tabs perfectly but forget them once paid. Used in cliffhangers, to-do lists, and sales techniques. Close open loops to reduce mental load; deliberately leave them open to sustain motivation.", "origin": "Bluma Zeigarnik, 1927, based on observation by Kurt Lewin.", "r": 7, "connCount": 1}, {"id": 171, "name": "Ben Franklin Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Doing someone a favor makes you like them more \u2014 not less \u2014 because your brain rationalizes the effort as justified by liking them.", "problem": "Counter-intuitive persuasion dynamic: asking favors can build rapport better than granting them.", "howItWorks": "Cognitive dissonance: after doing a favor, the brain asks 'why did I help this person?' and answers 'because I like them' \u2014 strengthening positive feelings. Dissonance reduction makes the brain construct a narrative to justify the behavior. Franklin used this deliberately to convert a political opponent by asking to borrow a rare book.", "origin": "Named after Benjamin Franklin's autobiography account; studied by Jecker and Landy, 1969.", "r": 7, "connCount": 1}, {"id": 172, "name": "Serial Position Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Items at the beginning and end of a list are remembered better than those in the middle.", "problem": "Distorts evaluation of candidates (interview order matters), evidence sequences, and any information presented serially.", "howItWorks": "Primacy effect: early items encoded into long-term memory with more rehearsal. Recency effect: late items still in working memory at recall. Middle items receive neither advantage. Produces a U-shaped recall curve. Implications: put key messages first or last; never bury important information in the middle.", "origin": "Ebbinghaus (1885); experimentally validated by Murdock (1962) and Glanzer & Cunitz (1966).", "r": 7, "connCount": 1}, {"id": 173, "name": "False Consensus Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We overestimate how many other people share our beliefs, preferences, and behaviors.", "problem": "Leads to miscalibrated product design, political blind spots, and assuming your minority view is the majority view.", "howItWorks": "We generalize from our own experience and social circle to the broader population. People project their own opinions onto others, assuming consensus where none exists. Especially strong for attitudes where we feel we are 'obviously correct.' Surveys and direct user research counter it.", "origin": "Lee Ross, David Greene, and Pamela House, 1977.", "r": 7, "connCount": 1}, {"id": 174, "name": "Negativity Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Negative events, stimuli, and emotions have greater psychological impact than positive ones of equivalent magnitude.", "problem": "Distorts risk assessment, relationship quality, feedback processing, and news consumption patterns.", "howItWorks": "Evolutionary origins: losses (predators, poisons) carried higher fitness costs than equivalent gains. The brain weighs threats more heavily than opportunities. One bad review hurts more than one good review helps. Peak-end rule amplifies this: negative peaks are remembered more vividly. Deliberately tracking and amplifying positives counters chronic negativity bias.", "origin": "Paul Rozin and Edward Royzman, 2001; earlier evolutionary psychology literature.", "r": 7, "connCount": 1}, {"id": 175, "name": "Optimism Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We believe we are less likely than average to experience negative events and more likely to experience positive ones.", "problem": "Drives poor risk management, underinsurance, over-leveraged investments, and reckless behavior.", "howItWorks": "Most people rate themselves as above-average drivers, healthier than peers, and less likely to get divorced \u2014 statistically impossible. The brain preferentially processes positive self-relevant information. Tali Sharot's research shows it's neurologically hardwired. Steelmanning downside scenarios and pre-mortems help calibrate.", "origin": "Neil Weinstein, 1980; Tali Sharot's neuroscience research, 2011.", "r": 7, "connCount": 1}, {"id": 176, "name": "Authority Bias", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "We attribute greater accuracy and trustworthiness to the opinions of authority figures.", "problem": "Leads to uncritical deference to credentials, titles, and confident speakers even when their claims are wrong.", "howItWorks": "Milgram's obedience experiments showed most people would administer apparently fatal shocks when instructed by an authority figure. In everyday contexts, lab coats, titles, and confident delivery amplify perceived credibility. Evaluating arguments on their merits, not the source's status, counters it.", "origin": "Studied by Milgram (1963); Cialdini's 'Influence' (1984) codified it as a persuasion principle.", "r": 7, "connCount": 1}, {"id": 177, "name": "Mere Exposure Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Repeated exposure to a stimulus increases our liking of it, regardless of its objective qualities.", "problem": "Breeds false familiarity in advertising, politics, and social relationships \u2014 frequency displaces quality.", "howItWorks": "Even subliminal repeated exposure to faces, words, or symbols increases positive affect toward them. Explains why repeated advertising works, why familiar names win elections, and why we tend to like people we see often. Awareness of the effect and seeking objective quality criteria help counteract it.", "origin": "Robert Zajonc, 1968.", "r": 7, "connCount": 1}, {"id": 178, "name": "Illusory Truth Effect", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive Bias", "oneLiner": "Repeated statements are judged as more true than novel statements, regardless of their actual accuracy.", "problem": "Misinformation and propaganda become more believable through sheer repetition.", "howItWorks": "Processing fluency acts as a truth proxy: familiar information is processed faster, and that fluency is misattributed to truthfulness. Works even when people initially know the statement is false and even when told to ignore familiarity. The antidote is actively evaluating claims against evidence rather than relying on familiarity.", "origin": "Hasher, Goldstein, and Toppino, 1977; more extensively studied since 2015.", "r": 7, "connCount": 1}, {"id": 179, "name": "Representativeness Heuristic", "category": "cognitive-bias", "color": "#c0392b", "catLabel": "Cognitive
