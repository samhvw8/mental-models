nership is established, the object is integrated into self-concept. Willingness to accept payment (WTA) exceeds willingness to pay (WTP) for the same item. Classic experiment: half a group randomly given coffee mugs; sellers demanded ~2x what buyers offered. Driven by loss aversion \u2014 giving up the item feels like a loss.", "origin": "Richard Thaler, 1980; experimentally demonstrated with Kahneman and Knetsch.", "connects_to": ["Loss Aversion", "Status Quo Bias", "IKEA Effect", "Sunk Cost Fallacy"], "source_url": "https://sahilbloom.substack.com/p/the-cognitive-bias-handbook-b32"}, {"name": "Bandwagon Effect", "category": "cognitive-bias", "one_liner": "We adopt beliefs and behaviors because many others hold them, not because of independent evidence.", "problem": "Drives financial bubbles, political conformity, fashion cycles, and suppresses critical independent thinking.", "how_it_works": "Humans are social animals; social proof served as an evolutionary shortcut (if everyone is running, run). In modern contexts the 'crowd wisdom' shortcut misfires when the crowd is itself biased or poorly informed. Awareness of herd behavior and seeking base rates before acting counters it.", "origin": "Studied in social psychology through conformity research (Asch, 1951); behavioral economics context through Thaler and others.", "connects_to": ["Availability Cascade", "Social Proof", "Groupthink", "False Consensus Effect"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Peak-End Rule", "category": "cognitive-bias", "one_liner": "We judge an experience almost entirely by its most intense moment and its final moment \u2014 not by the average or total.", "problem": "Distorts evaluation of medical procedures, customer experiences, relationships, and any extended event.", "how_it_works": "Kahneman's 'snapshot model' \u2014 the brain samples peak emotional intensity and the end state rather than integrating across time. Duration neglect applies: a shorter but more painful colonoscopy can be remembered as worse than a longer one with a milder ending. Customer experience designers use this to engineer good endings and memorable peaks.", "origin": "Daniel Kahneman and Barbara Fredrickson, early 1990s.", "connects_to": ["Negativity Bias", "Availability Heuristic", "Duration Neglect", "Recency Bias"], "source_url": "https://thedecisionlab.com/biases/peak-end-rule"}, {"name": "Halo Effect", "category": "cognitive-bias", "one_liner": "One positive (or negative) trait in a person or product causes us to rate all their other unrelated traits more positively (or negatively).", "problem": "Distorts hiring decisions, performance reviews, consumer choices, and interpersonal judgments.", "how_it_works": "The brain generalizes from a salient trait (attractiveness, confidence, a prestigious name) to form an overall impression, then filters subsequent observations through that lens. A confident speaker seems smarter; an attractive defendant seems less guilty. Blind evaluation processes and structured criteria mitigate it.", "origin": "Edward Thorndike, 1920; further developed by social psychologists.", "connects_to": ["Confirmation Bias", "Fundamental Attribution Error", "Authority Bias", "Primacy Effect"], "source_url": "https://www.lesswrong.com/w/heuristics-and-biases"}, {"name": "Narrative Fallacy", "category": "cognitive-bias", "one_liner": "We impose causal stories on random sequences of events, creating false explanations that feel true.", "problem": "Leads to illusions of understanding, overconfidence in predictions, and wrong lessons from history.", "how_it_works": "The left hemisphere compulsively seeks coherent cause-and-effect narratives, even in pure randomness. Detailed explanations feel more credible than probabilistic ones (conjunction fallacy). Taleb argues this makes us systematically blind to genuine uncertainty and Black Swans. Antidote: track predictions before outcomes are known.", "origin": "Nassim Nicholas Taleb, 'The Black Swan,' 2007.", "connects_to": ["Hindsight Bias", "Availability Heuristic", "Conjunction Fallacy", "Overconfidence Bias", "Survivorship Bias"], "source_url": "https://fs.blog/narrative-fallacy/"}, {"name": "Recency Bias", "category": "cognitive-bias", "one_liner": "We give disproportionate weight to recent events when making judgments about the future.", "problem": "Leads to chasing recent investment returns, misjudging trends, and poor long-term planning.", "how_it_works": "Recent information remains highly accessible in working memory (availability heuristic applied to time). Part of the serial position effect \u2014 the recency component. Investors buy near market peaks (recent gains feel like normal) and sell near troughs (recent losses feel permanent). Reviewing historical base rates counters it.", "origin": "Related to Ebbinghaus (1885) memory research; formalized in judgment/decision research by Kahneman and Tversky.", "connects_to": ["Availability Heuristic", "Peak-End Rule", "Primacy Effect", "Serial Position Effect", "Hot-Hand Fallacy"], "source_url": "https://lifescoretest.com/biases/recency-bias"}, {"name": "Framing Effect", "category": "cognitive-bias", "one_liner": "The same information presented differently produces systematically different choices.", "problem": "Manipulators (marketers, politicians, negotiators) can engineer desired decisions by choosing how to present options.", "how_it_works": "Gain frames vs. loss frames produce opposite preferences even when mathematically identical: '90% survival rate' vs. '10% mortality rate' feel very different. The brain evaluates options relative to a reference point, not in absolute terms (Prospect Theory). Reframing problems from multiple angles before deciding counters this.", "origin": "Amos Tversky and Daniel Kahneman, 1981.", "connects_to": ["Loss Aversion", "Anchoring Effect", "Prospect Theory", "Contrast Effect"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Sunk Cost Fallacy", "category": "cognitive-bias", "one_liner": "We continue failing endeavors because of past investments (money, time, effort) that can never be recovered.", "problem": "Causes organizations and individuals to persist with bad projects, bad relationships, and bad strategies.", "how_it_works": "The 'don't waste' norm combines with loss aversion to make people feel that stopping = wasting past investment. Rational analysis: sunk costs are gone regardless; only future costs and benefits matter. Counter: evaluate every decision only on forward-looking value, treating past costs as irrelevant.", "origin": "Arkes and Blumer, 1985; popularized in behavioral economics through Thaler and Kahneman.", "connects_to": ["Loss Aversion", "Endowment Effect", "Status Quo Bias", "Escalation of Commitment"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Fundamental Attribution Error", "category": "cognitive-bias", "one_liner": "We attribute others' behavior to their character while attributing our own behavior to circumstances.", "problem": "Creates unfair judgments, interpersonal conflicts, and poor organizational diagnoses (blame people, not systems).", "how_it_works": "The actor-observer asymmetry: observing others, we see only their behavior (salient), not their context (invisible). For ourselves, we are acutely aware of situational pressures. This leads to over-attributing others' failures to personality and under-attributing to environment. Asking 'what situational forces might explain this?' counters it.", "origin": "Lee Ross, 1977; building on Fritz Heider's attribution theory.", "connects_to": ["Actor-Observer Bias", "Halo Effect", "Confirmation Bias", "Ingroup Bias"], "source_url": "https://en.wikipedia.org/wiki/Fundamental_attribution_error"}, {"name": "Overconfidence Bias", "category": "cognitive-bias", "one_liner": "We systematically overestimate the accuracy of our knowledge and predictions.", "problem": "Drives excessive risk-taking, poor planning, and failure to seek disconfirming information.", "how_it_works": "Three forms: overprecision (confidence intervals too narrow), overplacement (I'm above average), overestimation (I'll do better than I will). Manifests as planning fallacy, underestimating competitors, and 90% confidence intervals containing the true answer only ~50% of the time. Calibration training and post-mortems help.", "origin": "Lichtenstein and Fischhoff, 1977; extensive research by Kahneman.", "connects_to": ["Dunning-Kruger Effect", "Planning Fallacy", "Hindsight Bias", "Illusion of Control"], "source_url": "https://fs.blog/bias-from-overconfidence/"}, {"name": "Gambler's Fallacy", "category": "cognitive-bias", "one_liner": "We believe that past random events influence future independent ones \u2014 that 'luck is due.'", "problem": "Leads to compulsive gambling escalation, poor investment timing, and false pattern detection in random data.", "how_it_works": "The brain seeks pattern and mean-reversion even in genuinely independent events. After a coin lands heads 10 times, most people feel tails is 'due.' In reality, each flip is independent. The 1913 Monte Carlo Casino incident (black 26 times in a row) cost gamblers a fortune betting on red.", "origin": "Studied in probability theory; named and formalized by Kahneman and Tversky.", "connects_to": ["Hot-Hand Fallacy", "Pattern Recognition", "Availability Heuristic", "Base Rate Fallacy"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Planning Fallacy", "category": "cognitive-bias", "one_liner": "We systematically underestimate how long tasks will take and how much they'll cost, while overestimating benefits.", "problem": "Causes project overruns, budget explosions, and missed deadlines at every scale from personal to megaproject.", "how_it_works": "We plan using the 'inside view' \u2014 focusing on our specific project's best-case sequence. The 'outside view' (reference class forecasting) \u2014 asking how long similar projects actually took \u2014 corrects it. Kahneman recommends deliberately seeking base rates for comparable past projects.", "origin": "Daniel Kahneman and Amos Tversky, 1979.", "connects_to": ["Overconfidence Bias", "Optimism Bias", "Inside View vs. Outside View", "Reference Class Forecasting"], "source_url": "https://www.lesswrong.com/w/heuristics-and-biases"}, {"name": "Availability Cascade", "category": "cognitive-bias", "one_liner": "Repeated public discussion of an idea makes people increasingly believe it's true, regardless of evidence.", "problem": "Drives moral panics, media-amplified risk distortion, and policy driven by fear rather than statistics.", "how_it_works": "A self-reinforcing chain: media coverage \u2192 increased salience \u2192 increased public concern \u2192 more media coverage \u2192 policy response. The more a risk is discussed, the more cognitively available it becomes, inflating perceived probability. Rare but dramatic risks (terrorism, shark attacks) get amplified; common silent risks get ignored.", "origin": "Timur Kuran and Cass Sunstein, 1999.", "connects_to": ["Availability Heuristic", "Bandwagon Effect", "Neglect of Probability", "Media Bias"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Backfire Effect", "category": "cognitive-bias", "one_liner": "When people encounter evidence contradicting their beliefs, they sometimes strengthen those beliefs rather than update them.", "problem": "Makes rational persuasion by evidence counterproductive in high-identity-stake domains.", "how_it_works": "When a core belief is threatened, the brain treats the challenge as an attack on identity, triggering defensive rationalization that reinforces the original position. Most potent for politically/ideologically charged beliefs. Note: later replication attempts have questioned the magnitude; the effect appears real but smaller than original studies suggested.", "origin": "Brendan Nyhan and Jason Reifler, 2010 (original); subsequent replication debates.", "connects_to": ["Confirmation Bias", "Identity-Protective Cognition", "Motivated Reasoning", "Belief Perseverance"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Affect Heuristic", "category": "cognitive-bias", "one_liner": "We use our current emotional state as information when making judgments, conflating 'how I feel about this' with 'what the evidence says.'", "problem": "Emotional responses to risk (fear, disgust, enthusiasm) override analytical assessment of actual probabilities.", "how_it_works": "When evaluating risks or benefits, people substitute the easier question 'how do I feel about this?' for the harder 'what are the statistics?' High fear \u2192 overestimate risk; high enthusiasm \u2192 underestimate risk. Attractive things seem safer; disgusting things seem more dangerous than they are.", "origin": "Paul Slovic, 2002; building on Kahneman's dual-process framework.", "connects_to": ["Availability Heuristic", "Representativeness Heuristic", "System 1 / System 2", "Optimism Bias"], "source_url": "https://www.lesswrong.com/w/heuristics-and-biases"}, {"name": "Curse of Knowledge", "category": "cognitive-bias", "one_liner": "Experts cannot imagine not knowing what they know, making it hard for them to communicate with or understand novices.", "problem": "Produces bad teaching, poor documentation, and communication failures between experts and non-experts.", "how_it_works": "Once information is in memory, it's nearly impossible to mentally simulate not having it. The expert assumes the listener has the same contextual background, uses jargon freely, and skips 'obvious' steps. The Feynman Technique directly counters this by forcing simple-language explanation.", "origin": "Chip Heath and Dan Heath in 'Made to Stick' (2006); underlying psychology studied earlier by Keysar et al.", "connects_to": ["Feynman Technique", "Dunning-Kruger Effect", "Illusion of Explanatory Depth", "Communication models"], "source_url": "https://sahilbloom.substack.com/p/the-cognitive-bias-handbook-b32"}, {"name": "IKEA Effect", "category": "cognitive-bias", "one_liner": "We place disproportionately high value on things we partially created ourselves.", "problem": "Overvaluation of in-house solutions, NIH ('not invented here') syndrome, and resistance to outsourcing.", "how_it_works": "Labor investment creates psychological ownership. Even when the output is objectively worse, creators value it far more than neutral observers. Partially explains why homemade food tastes better and why founders overvalue their companies. Labor without completion eliminates the effect \u2014 the build must finish.", "origin": "Michael Norton, Daniel Mochon, and Dan Ariely, 2011.", "connects_to": ["Endowment Effect", "Loss Aversion", "Sunk Cost Fallacy", "NIH Syndrome"], "source_url": "https://sahilbloom.substack.com/p/the-cognitive-bias-handbook-b32"}, {"name": "Zeigarnik Effect", "category": "cognitive-bias", "one_liner": "Incomplete or interrupted tasks are remembered better than completed ones.", "problem": "Unfinished business creates persistent cognitive intrusion; can be harnessed to maintain engagement or create anxiety.", "how_it_works": "The brain maintains 'open loops' for unresolved tasks, keeping them active in working memory to drive completion. Waiters remember unpaid tabs perfectly but forget them once paid. Used in cliffhangers, to-do lists, and sales techniques. Close open loops to reduce mental load; deliberately leave them open to sustain motivation.", "origin": "Bluma Zeigarnik, 1927, based on observation by Kurt Lewin.", "connects_to": ["Recency Bias", "Motivation models", "Intrinsic Motivation", "Ovsiankina Effect"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Ben Franklin Effect", "category": "cognitive-bias", "one_liner": "Doing someone a favor makes you like them more \u2014 not less \u2014 because your brain rationalizes the effort as justified by liking them.", "problem": "Counter-intuitive persuasion dynamic: asking favors can build rapport better than granting them.", "how_it_works": "Cognitive dissonance: after doing a favor, the brain asks 'why did I help this person?' and answers 'because I like them' \u2014 strengthening positive feelings. Dissonance reduction makes the brain construct a narrative to justify the behavior. Franklin used this deliberately to convert a political opponent by asking to borrow a rare book.", "origin": "Named after Benjamin Franklin's autobiography account; studied by Jecker and Landy, 1969.", "connects_to": ["Cognitive Dissonance", "Commitment and Consistency Bias", "Reciprocity"], "source_url": "https://sahilbloom.substack.com/p/the-cognitive-bias-handbook-b32"}, {"name": "Serial Position Effect", "category": "cognitive-bias", "one_liner": "Items at the beginning and end of a list are remembered better than those in the middle.", "problem": "Distorts evaluation of candidates (interview order matters), evidence sequences, and any information presented serially.", "how_it_works": "Primacy effect: early items encoded into long-term memory with more rehearsal. Recency effect: late items still in working memory at recall. Middle items receive neither advantage. Produces a U-shaped recall curve. Implications: put key messages first or last; never bury important information in the middle.", "origin": "Ebbinghaus (1885); experimentally validated by Murdock (1962) and Glanzer & Cunitz (1966).", "connects_to": ["Primacy Effect", "Recency Bias", "Peak-End Rule", "Availability Heuristic"], "source_url": "https://en.wikipedia.org/wiki/Serial-position_effect"}, {"name": "False Consensus Effect", "category": "cognitive-bias", "one_liner": "We overestimate how many other people share our beliefs, preferences, and behaviors.", "problem": "Leads to miscalibrated product design, political blind spots, and assuming your minority view is the majority view.", "how_it_works": "We generalize from our own experience and social circle to the broader population. People project their own opinions onto others, assuming consensus where none exists. Especially strong for attitudes where we feel we are 'obviously correct.' Surveys and direct user research counter it.", "origin": "Lee Ross, David Greene, and Pamela House, 1977.", "connects_to": ["Confirmation Bias", "Ingroup Bias", "Projection Bias", "Availability Heuristic"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Negativity Bias", "category": "cognitive-bias", "one_liner": "Negative events, stimuli, and emotions have greater psychological impact than positive ones of equivalent magnitude.", "problem": "Distorts risk assessment, relationship quality, feedback processing, and news consumption patterns.", "how_it_works": "Evolutionary origins: losses (predators, poisons) carried higher fitness costs than equivalent gains. The brain weighs threats more heavily than opportunities. One bad review hurts more than one good review helps. Peak-end rule amplifies this: negative peaks are remembered more vividly. Deliberately tracking and amplifying positives counters chronic negativity bias.", "origin": "Paul Rozin and Edward Royzman, 2001; earlier evolutionary psychology literature.", "connects_to": ["Loss Aversion", "Peak-End Rule", "Availability Heuristic", "Risk Aversion"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Optimism Bias", "category": "cognitive-bias", "one_liner": "We believe we are less likely than average to experience negative events and more likely to experience positive ones.", "problem": "Drives poor risk management, underinsurance, over-leveraged investments, and reckless behavior.", "how_it_works": "Most people rate themselves as above-average drivers, healthier than peers, and less likely to get divorced \u2014 statistically impossible. The brain preferentially processes positive self-relevant information. Tali Sharot's research shows it's neurologically hardwired. Steelmanning downside scenarios and pre-mortems help calibrate.", "origin": "Neil Weinstein, 1980; Tali Sharot's neuroscience research, 2011.", "connects_to": ["Overconfidence Bias", "Planning Fallacy", "Survivorship Bias", "Illusion of Control"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Authority Bias", "category": "cognitive-bias", "one_liner": "We attribute greater accuracy and trustworthiness to the opinions of authority figures.", "problem": "Leads to uncritical deference to credentials, titles, and confident speakers even when their claims are wrong.", "how_it_works": "Milgram's obedience experiments showed most people would administer apparently fatal shocks when instructed by an authority figure. In everyday contexts, lab coats, titles, and confident delivery amplify perceived credibility. Evaluating arguments on their merits, not the source's status, counters it.", "origin": "Studied by Milgram (1963); Cialdini's 'Influence' (1984) codified it as a persuasion principle.", "connects_to": ["Halo Effect", "Confirmation Bias", "Social Proof", "Bandwagon Effect"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Mere Exposure Effect", "category": "cognitive-bias", "one_liner": "Repeated exposure to a stimulus increases our liking of it, regardless of its objective qualities.", "problem": "Breeds false familiarity in advertising, politics, and social relationships \u2014 frequency displaces quality.", "how_it_works": "Even subliminal repeated exposure to faces, words, or symbols increases positive affect toward them. Explains why repeated advertising works, why familiar names win elections, and why we tend to like people we see often. Awareness of the effect and seeking objective quality criteria help counteract it.", "origin": "Robert Zajonc, 1968.", "connects_to": ["Familiarity Heuristic", "Illusory Truth Effect", "Availability Heuristic", "Bandwagon Effect"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Illusory Truth Effect", "category": "cognitive-bias", "one_liner": "Repeated statements are judged as more true than novel statements, regardless of their actual accuracy.", "problem": "Misinformation and propaganda become more believable through sheer repetition.", "how_it_works": "Processing fluency acts as a truth proxy: familiar information is processed faster, and that fluency is misattributed to truthfulness. Works even when people initially know the statement is false and even when told to ignore familiarity. The antidote is actively evaluating claims against evidence rather than relying on familiarity.", "origin": "Hasher, Goldstein, and Toppino, 1977; more extensively studied since 2015.", "connects_to": ["Mere Exposure Effect", "Availability Cascade", "Confirmation Bias", "Fluency Heuristic"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Representativeness Heuristic", "category": "cognitive-bias", "one_liner": "We judge probability by how closely something resembles our mental prototype, ignoring base rates.", "problem": "Produces stereotype-based judgments, ignores statistical base rates, and causes the conjunction fallacy.", "how_it_works": "When told 'Linda is a feminist bank teller,' people rate this as more probable than 'Linda is a bank teller' \u2014 a logical impossibility explained by Linda matching the feminist prototype better. Base rate neglect: we ignore that most people are not bank tellers, let alone feminist bank tellers. System 1 pattern-matches to prototypes rather than computing probabilities.", "origin": "Amos Tversky and Daniel Kahneman, 1974.", "connects_to": ["Conjunction Fallacy", "Base Rate Fallacy", "Availability Heuristic", "Stereotyping", "System 1 / System 2"], "source_url": "https://dl.acm.org/doi/book/10.5555/1824328"}, {"name": "System 1 / System 2 Thinking", "category": "cognitive-bias", "one_liner": "Two modes of thought: fast/automatic/intuitive (System 1) vs. slow/deliberate/analytical (System 2) \u2014 most biases arise from System 1 being applied where System 2 is needed.", "problem": "Cognitive errors arise when fast, automatic thinking handles situations requiring careful analysis.", "how_it_works": "System 1 operates automatically, quickly, effortlessly, associatively, and emotionally. System 2 is slow, deliberate, effortful, and rule-governed. System 1 generates impressions; System 2 endorses or overrides them. Under cognitive load, time pressure, or distraction, System 2 disengages and System 1 dominates. Most heuristics and biases are System 1 shortcuts.", "origin": "Stanovich and West, 2000; popularized by Daniel Kahneman, 'Thinking, Fast and Slow,' 2011.", "connects_to": ["All cognitive biases", "Fast and Slow Thinking", "Dual Process Theory", "Metacognition"], "source_url": "https://www.suebehaviouraldesign.com/en/blog/kahneman-thinking-fast-and-slow/"}, {"name": "Ingroup Bias", "category": "cognitive-bias", "one_liner": "We favor members of groups we belong to over outsiders, often unconsciously.", "problem": "Drives tribalism, nepotism, discrimination, and poor resource allocation in organizations.", "how_it_works": "Merely categorizing people into groups (even arbitrary ones, as in Tajfel's minimal group experiments) produces favoritism toward the ingroup. We perceive ingroup members as more competent, trustworthy, and deserving. The bias operates even when people sincerely believe they are impartial.", "origin": "Henri Tajfel and John Turner, Social Identity Theory, 1979.", "connects_to": ["Fundamental Attribution Error", "Halo Effect", "Confirmation Bias", "Outgroup Homogeneity"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Feynman Technique", "category": "learning", "one_liner": "Expose gaps in your understanding by attempting to explain a concept in plain language, as if teaching a child.", "problem": "People mistake recognition (reading notes and feeling familiar) for actual understanding.", "how_it_works": "Four steps: (1) choose a topic; (2) explain it in simple language without jargon; (3) identify where the explanation breaks down or becomes vague; (4) return to source material to fill those gaps, then re-explain. The breakdown points are precisely where real learning is needed. Combats the illusion of competence.", "origin": "Named after physicist Richard Feynman (1918\u20131988); not formally published by him but derived from his learning practices.", "connects_to": ["Dunning-Kruger Effect", "Curse of Knowledge", "Double-Loop Learning", "Spaced Repetition", "First Principles Thinking"], "source_url": "https://modelthinkers.com/mental-model/the-feynman-technique"}, {"name": "Spacing Effect (Spaced Repetition)", "category": "learning", "one_liner": "Distributing study sessions over time produces far better long-term retention than massing them (cramming).", "problem": "Cramming produces rapid forgetting; students mistake short-term fluency for durable learning.", "how_it_works": "Ebbinghaus's forgetting curve shows memory decays exponentially after learning. Reviewing just before the point of forgetting (expanding intervals: 1 day, 3 days, 1 week, 1 month\u2026) strengthens the memory trace most efficiently. Spaced repetition systems (Anki, SuperMemo) automate scheduling. Combined with retrieval practice (testing), retention improves 150%+ vs. re-reading.", "origin": "Hermann Ebbinghaus, 1885; Sebastian Leitner's flashcard system, 1972; Piotr Wozniak's SuperMemo algorithm, 1987.", "connects_to": ["Forgetting Curve", "Retrieval Practice / Testing Effect", "Interleaving", "Deliberate Practice"], "source_url": "https://learningpool.com/blog/everything-you-need-to-know-about-the-spacing-effect-in-five-minutes"}, {"name": "Interleaving", "category": "learning", "one_liner": "Mixing different topics or problem types during practice produces better learning than drilling one type at a time.", "problem": "Blocked practice (all of type A, then all of type B) feels productive but produces fragile, context-dependent learning.", "how_it_works": "Interleaved practice forces the brain to retrieve and re-apply the right strategy for each problem type, strengthening discrimination. The 'desirable difficulty' of switching makes practice feel harder but produces superior long-term retention and transfer. Distinct from spacing: interleaving fills rest periods with different learning material.", "origin": "Robert Bjork's 'desirable difficulties' research; Rohrer and Taylor, 2007.", "connects_to": ["Spacing Effect", "Deliberate Practice", "Retrieval Practice", "Desirable Difficulties"], "source_url": "https://link.springer.com/article/10.1007/s10648-021-09613-w"}, {"name": "Deliberate Practice", "category": "learning", "one_liner": "Expert performance is built through focused, feedback-driven practice on specific weaknesses \u2014 not mere accumulated hours.", "problem": "Time-on-task alone does not produce expertise; most 'practice' is mindless repetition that plateaus quickly.", "how_it_works": "Five components: (1) specific goal just beyond current ability; (2) full concentration; (3) immediate feedback; (4) reflection and error correction; (5) mental representation building. Not inherently enjoyable \u2014 it's cognitively demanding. Gladwell's '10,000 hours' misreads Ericsson: quality and structure of practice matter far more than quantity.", "origin": "K. Anders Ericsson, 'The Role of Deliberate Practice in the Acquisition of Expert Performance,' 1993; book 'Peak,' 2016.", "connects_to": ["Spacing Effect", "Interleaving", "Growth Mindset", "Double-Loop Learning", "Feedback Loops"], "source_url": "https://modelthinkers.com/mental-model/deliberate-practice"}, {"name": "Growth Mindset", "category": "learning", "one_liner": "The belief that abilities and intelligence are developable through effort, strategy, and learning \u2014 not fixed traits.", "problem": "Fixed mindset causes people to avoid challenges, give up at setbacks, and interpret failure as evidence of inadequacy.", "how_it_works": "Fixed mindset: every situation is a judgment on your innate ability \u2192 avoidance, defensiveness, blame. Growth mindset: every challenge is information about what to practice \u2192 persistence, feedback-seeking, resilience. Praise process ('you worked hard') over outcome ('you're smart') to cultivate it. Neural plasticity is the scientific foundation.", "origin": "Carol Dweck, Stanford University; 'Mindset: The New Psychology of Success,' 2006.", "connects_to": ["Deliberate Practice", "Dunning-Kruger Effect", "Metacognition", "Resilience", "Self-Efficacy"], "source_url": "https://fs.blog/carol-dweck-mindset/"}, {"name": "Bloom's Taxonomy", "category": "learning", "one_liner": "A six-level hierarchy of cognitive skills, from rote recall at the bottom to creative synthesis at the top.", "problem": "Education and training often stops at recall, producing learners who can recite facts but cannot apply or evaluate them.", "how_it_works": "Six levels in ascending order: Remember \u2192 Understand \u2192 Apply \u2192 Analyze \u2192 Evaluate \u2192 Create. Lower levels are prerequisites for higher ones. Effective learning objectives and assessments should target the highest relevant level, not default to recall. Revised by Krathwohl in 2001 to add the 'Create' level.", "origin": "Benjamin Bloom and committee, 1956; revised by Lorin Anderson and David Krathwohl, 2001.", "connects_to": ["Zone of Proximal Development", "Kolb's Learning Cycle", "Deliberate Practice", "Feynman Technique"], "source_url": "https://www.simplypsychology.org/blooms-taxonomy.html"}, {"name": "Kolb's Learning Cycle", "category": "learning", "one_liner": "Learning requires cycling through four stages: concrete experience, reflection, abstract conceptualization, and active experimentation.", "problem": "People often skip stages (reflect but never experiment; act but never reflect), producing incomplete or fragile learning.", "how_it_works": "Four stages: (1) Concrete Experience \u2014 do something; (2) Reflective Observation \u2014 analyze what happened; (3) Abstract Conceptualization \u2014 build/update mental model; (4) Active Experimentation \u2014 test the new model. Entry point varies by learning style; full cycle is required for deep learning. Organizations often skip reflection under time pressure.", "origin": "David Kolb, 1984, drawing on Dewey, Piaget, and Lewin.", "connects_to": ["Double-Loop Learning", "Deliberate Practice", "Growth Mindset", "Bloom's Taxonomy"], "source_url": "https://www.simplypsychology.org/learning-kolb.html"}, {"name": "Zone of Proximal Development (ZPD)", "category": "learning", "one_liner": "Learning happens optimally in the zone between what you can do alone and what you can do with expert guidance.", "problem": "Tasks too easy produce no growth; tasks too hard produce frustration and failure. Optimal challenge is rarely calibrated.", "how_it_works": "ZPD is the gap between current independent capability and potential capability with scaffolding (expert guidance, tools, peers). The 'scaffolding' metaphor: provide just enough support to reach the next level, then withdraw it to consolidate independence. Deliberate practice and stretch goals operationalize the ZPD concept in adult learning.", "origin": "Lev Vygotsky, 1930s (published posthumously); major influence on educational scaffolding theory.", "connects_to": ["Deliberate Practice", "Bloom's Taxonomy", "Scaffolding", "Growth Mindset"], "source_url": "https://www.academia.edu/24864163"}, {"name": "Double-Loop Learning", "category": "learning", "one_liner": "Beyond fixing errors in action (single-loop), question the underlying assumptions and values that generated the action.", "problem": "Organizations and individuals keep repeating the same mistakes because they fix symptoms without examining the faulty mental models causing them.", "how_it_works": "Single-loop: detect error \u2192 adjust behavior \u2192 repeat. Thermostat analogy: it adjusts heat but never questions whether the target temperature is right. Double-loop: detect error \u2192 question governing assumptions \u2192 update mental model \u2192 change behavior from a new foundation. Requires psychological safety; threatened people revert to single-loop defensiveness.", "origin": "Chris Argyris, Harvard Business Review, 1977; 'Teaching Smart People How to Learn,' 1991.", "connects_to": ["Kolb's Learning Cycle", "Growth Mindset", "Ladder of Inference", "Deliberate Practice", "Feynman Technique"], "source_url": "https://modelthinkers.com/mental-model/double-loop-learning"}, {"name": "Learning Pyramid / Cone of Experience", "category": "learning", "one_liner": "Active learning methods (teaching others, practice) produce dramatically higher retention than passive methods (lecture, reading).", "problem": "Traditional education over-relies on passive delivery methods with low retention.", "how_it_works": "Edgar Dale's original 1946 Cone of Experience classified media by abstractness (verbal \u2192 real experience). Later organizations added specific retention percentages (lecture 5%, teaching others 90%) that are NOT scientifically validated. The directional principle \u2014 active beats passive \u2014 IS well-supported. The specific percentages are educational mythology. Use as a directional heuristic, not as precise data.", "origin": "Edgar Dale, 1946; specific percentages popularized but not validated by NTL Institute.", "connects_to": ["Deliberate Practice", "Bloom's Taxonomy", "Kolb's Learning Cycle", "Feynman Technique"], "source_url": "https://acrlog.org/2014/01/13/tales-of-the-undead-learning-theories-the-learning-pyramid/"}, {"name": "Ebbinghaus Forgetting Curve", "category": "learning", "one_liner": "Without reinforcement, memory decays exponentially \u2014 most forgetting happens within hours of learning.", "problem": "Learners are surprised by how much they forget; study strategies don't account for memory decay.", "how_it_works": "Ebbinghaus found retention drops ~56% within 1 hour, ~66% within 24 hours, and ~75% within 6 days of initial learning (for meaningless syllables; meaningful content decays more slowly). Each review 'resets and flattens' the curve. Spaced repetition uses this curve to schedule reviews at mathematically optimal intervals.", "origin": "Hermann Ebbinghaus, '\u00dcber das Ged\u00e4chtnis,' 1885.", "connects_to": ["Spacing Effect", "Retrieval Practice", "Interleaving", "Deliberate Practice"], "source_url": "https://www.structural-learning.com/post/ebbinghaus-forgetting-curve"}, {"name": "Retrieval Practice / Testing Effect", "category": "learning", "one_liner": "Actively recalling information strengthens memory far more than passively re-reading it.", "problem": "Students default to re-reading (passive), which creates false fluency while producing poor long-term retention.", "how_it_works": "The act of retrieval \u2014 not the exposure \u2014 strengthens the memory trace. Even failed retrieval attempts (followed by correct answer) produce better long-term retention than re-study. Flashcards, practice tests, and 'close the book and write what you remember' all leverage this. Combined with spaced repetition, produces 150%+ retention advantage over re-reading.", "origin": "Cattell (1887) first noted it; Roediger and Karpicke, 2006, provided influential experimental evidence.", "connects_to": ["Spacing Effect", "Interleaving", "Deliberate Practice", "Ebbinghaus Forgetting Curve"], "source_url": "https://explore.medstudy.com/blog/how-spaced-retrieval-works"}, {"name": "Metacognition", "category": "learning", "one_liner": "Thinking about your own thinking \u2014 monitoring and regulating your cognitive processes.", "problem": "Without metacognition, people don't notice when their understanding is illusory, their strategies are ineffective, or their biases are active.", "how_it_works": "Two components: (1) metacognitive knowledge \u2014 knowing about your own cognitive strengths, weaknesses, and strategies; (2) metacognitive regulation \u2014 monitoring comprehension in real time and adjusting strategy when understanding fails. High metacognitive skill correlates with academic achievement and professional expertise. Dunning-Kruger is fundamentally a metacognition failure.", "origin": "John Flavell coined the term in 1976; Vygotsky's work on inner speech is an antecedent.", "connects_to": ["Dunning-Kruger Effect", "Growth Mindset", "Feynman Technique", "Double-Loop Learning", "Circle of Competence"], "source_url": "https://modelthinkers.com/playbook/metacognition-tools-to-rethink-thinking"}, {"name": "Focused vs. Diffuse Thinking", "category": "learning", "one_liner": "Alternating between intense focused attention and relaxed unfocused mind produces better learning and creativity than sustained focus alone.", "problem": "People force continuous concentration, blocking the subconscious consolidation and insight that diffuse mode enables.", "how_it_works": "Focused mode: tight attention to a specific problem, activates known neural pathways. Diffuse mode: relaxed background processing, activates broader neural connections and produces insight. Switching is the key: study hard, then rest. Sleep, exercise, and shower are diffuse mode activators. Explains why solutions appear after stepping away.", "origin": "Popularized by Barbara Oakley in 'A Mind for Numbers,' 2014; based on neuroscience research on default mode network.", "connects_to": ["Deliberate Practice", "Spacing Effect", "Metacognition", "Creativity"], "source_url": "https://modelthinkers.com/playbook/metacognition-tools-to-rethink-thinking"}, {"name": "What? So What? Now What?", "category": "learning", "one_liner": "A three-stage reflective framework: describe what happened, extract its significance, then determine action.", "problem": "People reflect without structure, producing either shallow description or endless rumination without actionable output.", "how_it_works": "What? \u2014 observable facts, no interpretation. So What? \u2014 meaning, implications, lessons. Now What? \u2014 specific actions to take. Forces separation of observation from interpretation from decision. Applicable to individual debriefs, team retrospectives, and after-action reviews. Simple enough to use in real time.", "origin": "Adapted from John Driscoll's reflective practice model (1994); popularized in coaching and organizational learning.", "connects_to": ["Kolb's Learning Cycle", "Double-Loop Learning", "After-Action Review", "Growth Mindset"], "source_url": "https://modelthinkers.com/mental-model/what-so-what-now-what"}, {"name": "Munger's Latticework of Mental Models", "category": "learning", "one_liner": "Build a diverse library of models from multiple disciplines and use them as lenses to analyze any problem.", "problem": "Specialists apply the same narrow framework to every problem ('to a man with a hammer, everything looks like a nail').", "how_it_works": "Actively collect 80\u2013100 fundamental models from mathematics, physics, biology, psychology, economics, and history. When facing a problem, run it through multiple lenses. Convergent signals across models increase confidence; contradictions reveal complexity. The models don't give answers \u2014 they generate better questions.", "origin": "Charlie Munger, Vice Chairman of Berkshire Hathaway; 'Poor Charlie's Almanack' (2005).", "connects_to": ["Circle of Competence", "First Principles Thinking", "Second-Order Thinking", "Double-Loop Learning"], "source_url": "https://modelthinkers.com/public/mental-model/mungers-latticework"}, {"name": "Base Rate Fallacy", "category": "cognitive-bias", "one_liner": "We ignore population-level statistics (base rates) when evaluating individual cases, focusing instead on vivid specific information.", "problem": "Leads to wildly miscalibrated probability assessments in medicine, investment, security, and hiring.", "how_it_works": "Given 'this person tested positive for a rare disease (1% prevalence) with a 95% accurate test,' most people guess ~95% chance the person has the disease. The correct answer is ~16% (Bayes' theorem accounts for the many false positives from the 99% without the disease). Representativeness heuristic crowds out base rates. Kahneman's 'outside view' (reference class forecasting) is the counter.", "origin": "Bar-Hillel, 1980; related to Kahneman and Tversky's representativeness heuristic research.", "connects_to": ["Representativeness Heuristic", "Planning Fallacy", "Gambler's Fallacy", "Bayes' Theorem"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Conjunction Fallacy", "category": "cognitive-bias", "one_liner": "We judge a specific, detailed scenario as more probable than a broader, less specific one that contains it.", "problem": "Vivid, representative details make implausible combinations feel more likely than simple possibilities.", "how_it_works": "Classic example: 'Linda is a feminist bank teller' rated as more probable than 'Linda is a bank teller,' despite the latter being the logical superset. The conjunction (A AND B) can never be more probable than either A or B alone. The representativeness heuristic overrides this logic because Linda matches the feminist prototype more strongly.", "origin": "Amos Tversky and Daniel Kahneman, 1983.", "connects_to": ["Representativeness Heuristic", "Narrative Fallacy", "Availability Heuristic", "Probability Neglect"], "source_url": "https://fs.blog/bias-conjunction-fallacy/"}, {"name": "Hot-Hand Fallacy", "category": "cognitive-bias", "one_liner": "After a streak of successes, we believe the winning streak will continue due to some persistent state \u2014 even in random processes.", "problem": "Mispredicts performance continuation, leads to overinvestment in 'hot' stocks, athletes, and strategies.", "how_it_works": "Opposite of the gambler's fallacy but same root: pattern-seeking in randomness. We perceive non-existent momentum. Originally studied in basketball (players 'on fire'), Gilovich et al. (1985) found no statistical hot hand. Reanalysis with corrected methodology (Miller and Sanjurjo, 2018) found a small real hot-hand effect, making this a partially contested finding.", "origin": "Thomas Gilovich, Robert Vallone, and Amos Tversky, 1985.", "connects_to": ["Gambler's Fallacy", "Recency Bias", "Availability Heuristic", "Pattern Recognition"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Impact Bias", "category": "cognitive-bias", "one_liner": "We overestimate how intensely and how long future emotional events (good or bad) will affect us.", "problem": "Drives over-pursuit of goals whose achievement disappoints, and excessive fear of setbacks that are actually manageable.", "how_it_works": "Focalism: when imagining a future event, we zoom in on it and ignore the many other things that will fill our attention and moderate our reaction. 'Psychological immune system' \u2014 resilience mechanisms we don't anticipate \u2014 also attenuates emotional impact. Getting a promotion or losing a job rarely changes long-term happiness as much as predicted.", "origin": "Daniel Gilbert and Timothy Wilson, 2000; 'affective forecasting' research.", "connects_to": ["Optimism Bias", "Hedonic Adaptation", "Planning Fallacy", "Focusing Illusion"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Plan Continuation Bias", "category": "cognitive-bias", "one_liner": "We persist with an original plan even when new information clearly indicates we should change course.", "problem": "Causes aviation accidents, business failures, and military disasters when original plans no longer fit changed reality.", "how_it_works": "Desire for structure and goal commitment creates rigidity. The sunk cost of the original plan and the cognitive cost of re-planning both push toward continuation. Organizations codify this as 'stay the course' despite changing conditions. Pre-established decision gates and explicit 'what would cause us to change plan?' criteria counteract it.", "origin": "NTSB accident reports in aviation; Charles Dismukes and colleagues formalized the concept in safety research.", "connects_to": ["Sunk Cost Fallacy", "Confirmation Bias", "Commitment Bias", "Status Quo Bias"], "source_url": "https://sahilbloom.substack.com/p/the-cognitive-bias-handbook-b32"}, {"name": "Google Effect (Digital Amnesia)", "category": "cognitive-bias", "one_liner": "We fail to encode information into memory when we know it's stored and easily retrievable externally.", "problem": "Outsourcing memory to search engines reduces internalized knowledge and the deep connections that enable creative thinking.", "how_it_works": "Sparrow et al. (2011) showed people remember where to find information better than the information itself when they believe it will be saved. The brain rationally offloads to external storage, but loses the serendipitous mental connections that come from holding knowledge internally. Related to the Extended Mind Thesis \u2014 but with costs to deep understanding.", "origin": "Betsy Sparrow, Jenny Liu, and Daniel Wegner, 2011.", "connects_to": ["Extended Mind Thesis", "Retrieval Practice", "Metacognition", "Transactive Memory"], "source_url": "https://www.madewill.com/thinking-model/handbook-of-common-cognitive-biases.html"}, {"name": "Pomodoro Technique", "category": "productivity", "one_liner": "Break work into 25-minute focused sprints separated by short breaks to maintain concentration.", "problem": "Mental fatigue and distraction erode focus over long uninterrupted work sessions.", "how_it_works": "Set a timer for 25 minutes, work with full focus on one task, take a 5-minute break. After 4 Pomodoros, take a 15-30 minute break. The timer creates artificial urgency (countering Parkinson's Law) and the breaks prevent cognitive depletion.", "origin": "Francesco Cirillo, late 1980s; named after a tomato-shaped kitchen timer (pomodoro = Italian for tomato)", "connects_to": ["Deep Work", "Flow State", "Parkinson's Law", "Time Blocking", "Batching"], "source_url": "https://formalpsychology.com/pomodoro-technique-psychology-deep-work/"}, {"name": "Getting Things Done (GTD)", "category": "productivity", "one_liner": "Capture every commitment into a trusted external system to free the mind for actual thinking.", "problem": "Mental overhead of tracking open loops (tasks, commitments, ideas) drains cognitive capacity needed for deep work.", "how_it_works": "Five stages: Capture (externalize everything), Clarify (is it actionable?), Organize (by context/priority), Reflect (weekly review), Engage (do the right thing now). The key insight: your brain is for having ideas, not holding them.", "origin": "David Allen, book 'Getting Things Done', 2001", "connects_to": ["Two-Minute Rule", "Time Blocking", "Eisenhower Matrix", "Deep Work", "Eat the Frog"], "source_url": "https://theleanstartup.com/principles"}, {"name": "Time Blocking", "category": "productivity", "one_liner": "Assign every hour of the workday a specific task or category of work \u2014 give every minute a job.", "problem": "Reactive, interrupt-driven work prevents sustained progress on deep, high-value tasks.", "how_it_works": "Plan your day in advance by blocking calendar slots for specific work types (deep work, admin, meetings, creative). Treat blocks as appointments with yourself. Leave buffer blocks for overflow. Cal Newport calls it 'the most productive thing I do.'", "origin": "Popularized by Cal Newport in 'Deep Work' (2016); concept predates Newport but he systematized it", "connects_to": ["Deep Work", "Pomodoro Technique", "Batching", "Parkinson's Law", "GTD"], "source_url": "https://www.simplypsychology.org/cal-newport-time-block-planning-efficiency.html"}, {"name": "Eat the Frog", "category": "productivity", "one_liner": "Tackle your most important (and dreaded) task first thing in the morning before anything else.", "problem": "Procrastination on high-impact tasks because easier, lower-value work gets done first.", "how_it_works": "Identify the single most important task \u2014 the one you're most likely to avoid. Do it immediately, before email or meetings. Decision fatigue and willpower are highest at day start. Completing it creates momentum for the rest of the day.", "origin": "Brian Tracy, book 'Eat That Frog!' (2001); attributed conceptually to a Mark Twain quote", "connects_to": ["Pareto Principle", "Eisenhower Matrix", "GTD", "Deep Work", "Time Blocking"], "source_url": "https://www.todoist.com/productivity-methods/eat-the-frog"}, {"name": "Two-Minute Rule", "category": "productivity", "one_liner": "If a task takes less than two minutes, do it immediately rather than capturing it in a system.", "problem": "Small tasks accumulate in to-do lists and create overhead disproportionate to their actual execution time.", "how_it_works": "When processing inputs (email, requests, ideas), apply the test: can this be done in under 2 minutes? If yes, do it now. If no, defer, delegate, or delete. The overhead of tracking often exceeds the task itself for micro-tasks.", "origin": "David Allen, 'Getting Things Done' (2001); a core GTD heuristic", "connects_to": ["GTD", "Eisenhower Matrix", "Batching", "Eat the Frog"], "source_url": "https://www.todoist.com/productivity-methods/eat-the-frog"}, {"name": "Batching", "category": "productivity", "one_liner": "Group similar tasks together and process them in a single dedicated block to reduce context-switching cost.", "problem": "Constant context-switching between different task types (email, creative work, calls) destroys flow and wastes cognitive ramp-up time.", "how_it_works": "Cluster similar tasks \u2014 all email in one block, all calls in another, all writing in another. Each switch between task types costs 10-20 minutes of reorientation time. Batching amortizes that cost. Works best combined with Time Blocking.", "origin": "Operations management principle (batch processing); popularized in knowledge work by Tim Ferriss in 'The 4-Hour Workweek' (2007)", "connects_to": ["Time Blocking", "Deep Work", "Pomodoro Technique", "GTD"], "source_url": "https://rize.io/blog/time-management-methods"}, {"name": "Deep Work", "category": "productivity", "one_liner": "Professional activities performed in distraction-free concentration that push cognitive limits produce rare and valuable output.", "problem": "Knowledge work is increasingly fragmented by shallow tasks (email, meetings, social media), producing busyness without real output.", "how_it_works": "Schedule protected blocks (2-4+ hours) of single-task focus with zero interruptions. Eliminate shallow work ruthlessly. Cultivate the ability to concentrate deeply as a skill \u2014 it atrophies without practice. Use rituals to enter and exit deep work states.", "origin": "Cal Newport, book 'Deep Work: Rules for Focused Success in a Distracted World' (2016)", "connects_to": ["Flow State", "Time Blocking", "Pomodoro Technique", "Parkinson's Law", "Batching"], "source_url": "https://akiflow.com/blog/cal-newports-deep-work-explained"}, {"name": "Flow State", "category": "productivity", "one_liner": "Optimal performance occurs in a state of full immersion where challenge matches skill \u2014 time disappears and output peaks.", "problem": "Work that is too easy breeds boredom; too hard breeds anxiety. Neither produces peak performance.", "how_it_works": "Flow is triggered when task difficulty slightly exceeds current skill level, creating engaged stretch. Prerequisites: clear goals, immediate feedback, perceived control, minimal interruption. To induce flow: remove distractions, set clear micro-goals, match task to skill level.", "origin": "Mihaly Csikszentmihalyi, psychologist; coined the concept in research in the 1970s, popularized in book 'Flow' (1990)", "connects_to": ["Deep Work", "Pomodoro Technique", "Time Blocking", "SMART Goals"], "source_url": "https://flown.com/what-is-deep-work-your-easy-to-digest-guide"}, {"name": "SMART Goals", "category": "productivity", "one_liner": "Goals must be Specific, Measurable, Achievable, Relevant, and Time-bound to drive real execution.", "problem": "Vague goals ('be more productive', 'grow the business') provide no clear path to action or completion criteria.", "how_it_works": "For each goal, test against 5 criteria: Specific (what exactly?), Measurable (how will you know?), Achievable (realistic stretch?), Relevant (aligned with larger purpose?), Time-bound (by when?). A goal failing any criterion should be rewritten before acting.", "origin": "First formalized by George T. Doran in a 1981 Management Review paper 'There's a SMART way to write management's goals and objectives'", "connects_to": ["OKRs", "North Star Metric", "Eisenhower Matrix", "GTD", "PDCA"], "source_url": "https://dataon.com/en-en/blog/okrs-vs-other-goal-systems-definitions-differences-and-use-cases/"}, {"name": "OKRs (Objectives and Key Results)", "category": "strategic-thinking", "one_liner": "Connect ambitious qualitative objectives to 3-5 specific measurable outcomes that define what achievement looks like.", "problem": "Goals either stay abstract and uninspiring or get too tactical without connecting to strategic direction.", "how_it_works": "Set an Objective (inspiring, qualitative, what you want to achieve) plus 3-5 Key Results (specific, measurable outcomes that would prove the objective was met). Review quarterly. Grade 0-1 \u2014 a 0.7 grade is ideal; 1.0 means the goal wasn't ambitious enough.", "origin": "Andy Grove at Intel in the 1970s; evangelized at Google by John Doerr (1999); popularized by John Doerr's book 'Measure What Matters' (2018)", "connects_to": ["North Star Metric", "SMART Goals", "Hedgehog Concept", "PDCA", "KPIs"], "source_url": "https://fourweekmba.com/what-is-okr/"}, {"name": "North Star Metric", "category": "strategic-thinking", "one_liner": "One single metric that best captures the core value your product delivers \u2014 everything else aligns to move this number.", "problem": "Teams optimize local metrics (revenue, downloads, page views) that don't reflect whether the product is genuinely delivering value.", "how_it_works": "Identify the single metric that correlates most strongly with long-term customer value and retention. All teams should understand how their work affects this metric. It guides prioritization but must be paired with guardrail metrics to prevent gaming.", "origin": "Product management practice popularized at companies like Airbnb (nights booked), Facebook (DAU), Spotify (time listening); codified by Sean Ellis and growth hacking community circa 2010s", "connects_to": ["OKRs", "SMART Goals", "Unit Economics", "Flywheel Effect"], "source_url": "https://productschool.com/blog/analytics/north-star-metric"}, {"name": "Porter's Five Forces", "category": "strategic-thinking", "one_liner": "Map five structural forces \u2014 rivalry, buyer power, supplier power, substitutes, new entrants \u2014 to assess industry profitability.", "problem": "Companies set strategy based on direct competitor moves alone, missing the structural forces that actually determine long-run profitability.", "how_it_works": "Score each of five forces (competitive rivalry, threat of new entrants, threat of substitutes, buyer bargaining power, supplier bargaining power) as high/medium/low. High forces compress margins. Strategy aims to find positions where forces are weak, or to change the forces themselves.", "origin": "Michael E. Porter, Harvard Business School, book 'Competitive Strategy' (1980)", "connects_to": ["SWOT Analysis", "Blue Ocean Strategy", "Wardley Mapping", "Value Chain Analysis", "Competitive Moat"], "source_url": "https://fourweekmba.com/porter-five-forces/"}, {"name": "SWOT Analysis", "category": "strategic-thinking", "one_liner": "Map internal Strengths and Weaknesses against external Opportunities and Threats to guide strategic choices.", "problem": "Strategy is formed without systematically auditing what the organization can and can't do relative to what the environment offers.", "how_it_works": "Fill a 2x2: internal (Strengths, Weaknesses) and external (Opportunities, Threats). Then cross-analyze: use strengths to exploit opportunities (SO), use strengths to avoid threats (ST), address weaknesses to capture opportunities (WO), minimize weakness + threat exposure (WT).", "origin": "Developed at Stanford Research Institute by Albert Humphrey et al. in the 1960s-70s through Fortune 500 research", "connects_to": ["Porter's Five Forces", "PESTLE Analysis", "Ansoff Matrix", "BCG Matrix"], "source_url": "https://fourweekmba.com/porters-five-forces-vs-swot-analysis/"}, {"name": "Blue Ocean Strategy", "category": "strategic-thinking", "one_liner": "Create uncontested market space by making competition irrelevant through value innovation \u2014 offer more value at lower cost.", "problem": "Most companies fight in 'red oceans' (existing competitive markets), competing on the same dimensions and eroding margins.", "how_it_works": "Use the Four Actions Framework: Eliminate factors the industry takes for granted, Reduce factors below industry standard, Raise factors above industry standard, Create new factors the industry never offered. The result: a new value curve that serves non-customers and defies the cost-differentiation tradeoff.", "origin": "W. Chan Kim and Ren\u00e9e Mauborgne, INSEAD; book 'Blue Ocean Strategy' (2005)", "connects_to": ["Porter's Five Forces", "Jobs to Be Done", "Disruption Theory", "Value Chain Analysis"], "source_url": "https://medium.com/@tezovalli021/a-beginners-guide-to-porter-s-five-forces-swot-and-blue-ocean-strategy-59917f6e4d02"}, {"name": "BCG Matrix (Growth-Share Matrix)", "category": "strategic-thinking", "one_liner": "Plot business units or products on market growth vs. relative market share to guide portfolio investment decisions.", "problem": "Resource allocation across multiple products or business units is made subjectively without a systematic framework.", "how_it_works": "Place each product in one of four cells: Stars (high growth, high share \u2014 invest), Cash Cows (low growth, high share \u2014 harvest for cash), Question Marks (high growth, low share \u2014 decide: invest or divest), Dogs (low growth, low share \u2014 divest or minimize). Cash cows fund stars.", "origin": "Bruce D. Henderson, Boston Consulting Group, 1970", "connects_to": ["Ansoff Matrix", "Porter's Five Forces", "SWOT Analysis", "Unit Economics"], "source_url": "https://fourweekmba.com/bcg-matrix-vs-ansoff-matrix/"}, {"name": "Jobs to Be Done (JTBD)", "category": "strategic-thinking", "one_liner": "Customers don't buy products \u2014 they hire them to get a specific job done in their lives.", "problem": "Product decisions based on customer demographics or competitor features miss the actual motivation behind purchase and use.", "how_it_works": "For each product/feature, define the functional, social, and emotional 'job' the customer is trying to accomplish. Identify the struggling moment that prompts hiring a solution. Compete at the job level, not the product category level. Reveals non-obvious competitors and unserved needs.", "origin": "Tony Ulwick coined JTBD in 1990; Clayton Christensen popularized it in 'The Innovator's Solution' (2003) and Harvard Business Review", "connects_to": ["Lean Canvas", "Blue Ocean Strategy", "Minimum Viable Product", "Value Chain Analysis"], "source_url": "https://strategyn.com/jobs-to-be-done/"}, {"name": "Lean Canvas", "category": "strategic-thinking", "one_liner": "A one-page business model focused on problems, solutions, metrics, and unfair advantage \u2014 built for early-stage validation.", "problem": "Traditional business plans take months and become obsolete before execution; founders need a rapid model for testing assumptions.", "how_it_works": "Fill 9 boxes: Problem (top 3 problems), Solution, Unique Value Proposition, Unfair Advantage, Customer Segments, Key Metrics, Channels, Cost Structure, Revenue Streams. Start with the problem box, not the solution. Each box is a hypothesis to test, not a commitment.", "origin": "Ash Maurya, 2010; adaptation of Alexander Osterwalder's Business Model Canvas, layered with Lean Startup principles", "connects_to": ["Business Model Canvas", "Minimum Viable Product", "Build-Measure-Learn", "Jobs to Be Done"], "source_url": "https://fourweekmba.com/porter-five-forces/"}, {"name": "Minimum Viable Product (MVP)", "category": "strategic-thinking", "one_liner": "The smallest version of a product that collects maximum validated learning about customers with minimum effort.", "problem": "Teams build full products based on unvalidated assumptions, wasting months of effort on features nobody wants.", "how_it_works": "Identify the riskiest assumption in the business model. Build the simplest possible artifact (landing page, prototype, concierge service) that tests that assumption with real customers. Measure behavior (not opinions). Learn. Decide: persist, pivot, or kill. Speed of learning beats thoroughness of build.", "origin": "Frank Robinson coined 'MVP' circa 2001; Eric Ries systematized it in 'The Lean Startup' (2011)", "connects_to": ["Build-Measure-Learn", "Lean Canvas", "Jobs to Be Done", "PDCA", "Agile/Scrum"], "source_url": "https://leanstartup.co/resources/articles/what-is-an-mvp/"}, {"name": "Build-Measure-Learn", "category": "strategic-thinking", "one_liner": "The core Lean Startup feedback loop: build something, measure what happens, learn whether to continue or pivot.", "problem": "Long development cycles with no customer feedback produce products disconnected from market reality.", "how_it_works": "Start with a hypothesis (leap of faith assumption). Build the smallest possible test. Measure using actionable metrics (not vanity metrics). Learn: was the hypothesis valid? If yes, persist and optimize. If no, pivot \u2014 make a structured change to strategy. Minimize time per loop.", "origin": "Eric Ries, 'The Lean Startup' (2011); adapted from the Deming/Shewhart PDCA cycle for startup contexts", "connects_to": ["Minimum Viable Product", "PDCA", "Lean Canvas", "Agile/Scrum", "OODA Loop"], "source_url": "https://theleanstartup.com/principles"}, {"name": "Flywheel Effect", "category": "strategic-thinking", "one_liner": "Sustained, focused effort in one direction compounds over time \u2014 momentum builds until the flywheel spins itself.", "problem": "Organizations seek single breakthrough moments or silver bullets, missing that greatness comes from compound incremental improvements.", "how_it_works": "Map a virtuous cycle specific to the business (e.g., Amazon: low prices \u2192 more customers \u2192 more sellers \u2192 more selection \u2192 lower costs \u2192 lower prices). Push consistently on every component. No single push creates the momentum \u2014 it's the accumulation. Identify and reinforce your unique flywheel.", "origin": "Jim Collins, 'Good to Great' (2001); Amazon famously applied it as a core strategic framework", "connects_to": ["Compounding", "Hedgehog Concept", "Network Effects", "Theory of Constraints"], "source_url": "https://www.jimcollins.com/concepts/the-flywheel.html"}, {"name": "Compounding", "category": "strategic-thinking", "one_liner": "Small consistent gains multiply exponentially over time \u2014 the most powerful force in business, investing, and learning.", "problem": "Humans undervalue gradual improvement because the exponential nature of compounding is counterintuitive to linear thinking.", "how_it_works": "Apply the compound growth formula: a 1% daily improvement yields 37x improvement over a year. Identify compounding assets: skills, reputation, relationships, code, content, capital. Protect them. Avoid interruptions \u2014 compounding is destroyed by volatility. Time in the game beats peak performance.", "origin": "Mathematical concept; applied to business by Warren Buffett and Charlie Munger; popularized as a mental model by Naval Ravikant and James Clear", "connects_to": ["Flywheel Effect", "Marginal Gains", "Pareto Principle", "Moats"], "source_url": "https://fs.blog/mental-models/"}, {"name": "Theory of Constraints (TOC)", "category": "problem-solving", "one_liner": "Every system has exactly one bottleneck limiting output \u2014 improve nothing else until you fix that constraint.", "problem": "Optimization efforts spread across the whole system produce minimal gains; most work is on non-bottlenecks.", "how_it_works": "Five Focusing Steps: (1) Identify the constraint. (2) Exploit it \u2014 squeeze maximum throughput without changing anything. (3) Subordinate everything else to the constraint. (4) Elevate the constraint \u2014 invest to increase its capacity. (5) Repeat \u2014 once fixed, a new constraint emerges. Never optimize non-constraints.", "origin": "Eliyahu M. Goldratt, Israeli physicist/businessman, book 'The Goal' (1984)", "connects_to": ["Bottleneck Analysis", "Critical Path Method", "Lean/Kanban", "Pareto Principle"], "source_url": "https://www.tocinstitute.org/theory-of-constraints.html"}, {"name": "Bottleneck Analysis", "category": "problem-solving", "one_liner": "Systematically identify which single resource or step constrains total system throughput.", "problem": "Performance improvement efforts are applied uniformly across a process when only one constraint actually limits output.", "how_it_works": "Map the full value stream or process. Find the step with the lowest capacity or longest queue. That step is the bottleneck \u2014 it determines the system's output ceiling. Remove or expand it, then find the next constraint. Use data (cycle times, queue depths) not intuition.", "origin": "Industrial engineering; formalized in Theory of Constraints by Eliyahu Goldratt (1984)", "connects_to": ["Theory of Constraints", "Critical Path Method", "Value Chain Analysis", "Lean/Kanban"], "source_url": "https://www.theleansixsigmacompany.com/uk/library/theory-of-constraints-bottleneck/"}, {"name": "Critical Path Method (CPM)", "category": "productivity", "one_liner": "Identify the longest chain of dependent tasks in a project \u2014 that chain determines the minimum completion time.", "problem": "Projects slip because resources are applied to non-critical tasks while the true duration bottleneck (the critical path) gets insufficient attention.", "how_it_works": "Map all tasks, their durations, and dependencies. Calculate earliest/latest start-finish for each. The critical path is the longest chain with zero float \u2014 any delay here delays the whole project. Compress the project by accelerating critical path tasks only.", "origin": "James E. Kelley Jr. (Remington Rand) and Morgan R. Walker (DuPont), late 1950s", "connects_to": ["Theory of Constraints", "Bottleneck Analysis", "Agile/Scrum", "Eisenhower Matrix"], "source_url": "https://umbrex.com/resources/frameworks/project-management-frameworks/critical-path-method-cpm/"}, {"name": "PDCA Cycle (Plan-Do-Check-Act)", "category": "problem-solving", "one_liner": "Iterative four-step cycle for continuous improvement: plan a change, do it, check results, act on what you learned.", "problem": "Organizations implement changes without structured feedback loops, repeating mistakes or failing to lock in improvements.", "how_it_works": "Plan: identify a problem and hypothesize a solution. Do: run a small experiment. Check: measure outcomes against the hypothesis. Act: if it worked, standardize; if not, revise the hypothesis. Loop indefinitely. Each cycle produces learning, not just output.", "origin": "Walter Shewhart (1930s, Bell Labs) developed the foundation; W. Edwards Deming taught and popularized it in postwar Japan", "connects_to": ["Build-Measure-Learn", "Theory of Constraints", "Agile/Scrum", "SMART Goals", "OKRs"], "source_url": "https://www.techtarget.com/whatis/definition/PDCA-plan-do-check-act"}, {"name": "Wardley Mapping", "category": "strategic-thinking", "one_liner": "Map every component of your value chain by visibility to the user and evolutionary maturity \u2014 then exploit where things are heading.", "problem": "Strategy is made without situational awareness \u2014 leaders don't know what's evolving into a commodity or where competitors will attack next.", "how_it_works": "Draw a map: Y-axis = visibility to user (user need at top, infrastructure at bottom). X-axis = evolution (genesis \u2192 custom \u2192 product \u2192 commodity). Position every component. Patterns emerge: where to build vs. buy, where disruption will come, where to invest. Anticipate moves because evolution is predictable.", "origin": "Simon Wardley, Fotango, 2005; developed further at Canonical UK 2008-2010", "connects_to": ["Porter's Five Forces", "Theory of Constraints", "BCG Matrix", "Value Chain Analysis"], "source_url": "https://en.wikipedia.org/wiki/Wardley_map"}, {"name": "Ansoff Matrix", "category": "strategic-thinking", "one_liner": "Four growth strategies mapped by product (existing/new) and market (existing/new) to assess risk and direction.", "problem": "Growth strategy defaults to one approach without systematically evaluating the risk/reward of different expansion directions.", "how_it_works": "Four cells: Market Penetration (existing product, existing market \u2014 lowest risk), Market Development (existing product, new market), Product Development (new product, existing market), Diversification (new product, new market \u2014 highest risk). Risk increases as you move from known to unknown dimensions.", "origin": "H. Igor Ansoff, 'Strategies for Diversification', Harvard Business Review, 1957", "connects_to": ["BCG Matrix", "SWOT Analysis", "Blue Ocean Strategy", "Porter's Five Forces"], "source_url": "https://creately.com/guides/strategic-planning-frameworks/"}, {"name": "McKinsey 7S Framework", "category": "strategic-thinking", "one_liner": "Seven interdependent organizational elements must be aligned for strategy execution \u2014 change one, all others must adapt.", "problem": "Strategic plans fail in implementation because hard factors (structure, strategy, systems) are changed without adjusting soft factors (skills, staff, style, shared values).", "how_it_works": "Map the seven elements: Strategy, Structure, Systems (hard/tangible) and Shared Values, Skills, Staff, Style (soft/cultural). The center \u2014 Shared Values \u2014 is the most important. Any organizational change must identify ripple effects across all seven. Misalignment diagnoses execution failure.", "origin": "Tom Peters and Robert Waterman Jr., McKinsey & Company, 1980; published in 'In Search of Excellence' (1982)", "connects_to": ["SWOT Analysis", "OKRs", "Flywheel Effect", "Conway's Law"], "source_url": "https://www.garyfox.co/mckinsey-7s-model/"}, {"name": "PESTLE Analysis", "category": "strategic-thinking", "one_liner": "Scan six macro-environmental forces \u2014 Political, Economic, Social, Technological, Legal, Environmental \u2014 to surface external opportunities and threats.", "problem": "Organizations develop strategy in an internal vacuum, missing macro shifts that will reshape the competitive landscape.", "how_it_works": "For each of 6 dimensions, identify current state and trajectory. Rate impact and likelihood. Use findings to stress-test existing strategy and identify emerging opportunities. Typically feeds into SWOT (PESTLE findings become Opportunities and Threats). Best done as a team with diverse perspectives.", "origin": "Attributed to Francis Aguilar's 'ETPS' scan in 'Scanning the Business Environment' (1967); extended to PEST, then PESTLE over decades", "connects_to": ["SWOT Analysis", "Porter's Five Forces", "Wardley Mapping", "Scenario Planning"], "source_url": "https://creately.com/guides/strategic-planning-frameworks/"}, {"name": "Value Chain Analysis", "category": "strategic-thinking", "one_liner": "Map every activity that creates customer value and identify where competitive advantage is actually built or lost.", "problem": "Cost and differentiation advantages are assumed to live in obvious places (price, product) while the real source is in specific operational activities.", "how_it_works": "Separate activities into Primary (inbound logistics, operations, outbound logistics, marketing/sales, service) and Support (procurement, technology, HR, infrastructure). For each, assess cost and differentiation contribution. Competitive advantage concentrates in a few activities \u2014 find them, strengthen them, and align the whole chain.", "origin": "Michael E. Porter, 'Competitive Advantage: Creating and Sustaining Superior Performance' (1985)", "connects_to": ["Porter's Five Forces", "Blue Ocean Strategy", "Bottleneck Analysis", "Jobs to Be Done"], "source_url": "https://creately.com/guides/strategic-planning-frameworks/"}, {"name": "Theory of Constraints \u2014 Drum-Buffer-Rope", "category": "problem-solving", "one_liner": "Schedule production to the rhythm of the bottleneck (drum), protect it with inventory buffers, and rope the release of work to its pace.", "problem": "Traditional production scheduling overloads the system, creates variability, and hides the bottleneck.", "how_it_works": "Drum: let the bottleneck set the production pace. Buffer: place inventory protection before the bottleneck to prevent starvation. Rope: release raw materials only fast enough to feed the bottleneck. This eliminates WIP explosion while maximizing throughput. A specialized TOC scheduling technique.", "origin": "Eliyahu M. Goldratt, 'The Goal' (1984) and subsequent TOC Institute teachings", "connects_to": ["Theory of Constraints", "Kanban", "Critical Path Method", "Lean"], "source_url": "https://www.leanproduction.com/theory-of-constraints/"}, {"name": "Hedgehog Concept", "category": "strategic-thinking", "one_liner": "Great organizations find and focus on the intersection of what they're passionate about, what they can be best at, and what drives their economic engine.", "problem": "Companies pursue growth in too many directions, diluting focus and preventing the sustained momentum needed to go from good to great.", "how_it_works": "Identify the overlap of three circles: (1) What you are deeply passionate about, (2) What you can be the best in the world at, (3) What best drives your economic engine. Everything outside that intersection is a distraction. This is not an aspiration \u2014 it's a discovery about current reality.", "origin": "Jim Collins, 'Good to Great' (2001); inspired by Isaiah Berlin's essay on the Greek parable of the hedgehog vs. the fox", "connects_to": ["Flywheel Effect", "Circle of Competence", "OKRs", "North Star Metric"], "source_url": "https://www.jimcollins.com/concepts/the-hedgehog-concept.html"}, {"name": "Kanban", "category": "productivity", "one_liner": "Visualize workflow on a board, limit work-in-progress, and pull work through stages only when capacity exists.", "problem": "Invisible work queues, multitasking, and overloaded systems slow throughput and hide bottlenecks.", "how_it_works": "Create a board with columns (To Do \u2192 In Progress \u2192 Done). Set explicit WIP limits per column. New work enters only when capacity is available (pull system). Visualizing flow exposes bottlenecks and queue buildups immediately. Continuous flow beats batch processing.", "origin": "Taiichi Ohno, Toyota Production System, late 1950s; adapted for knowledge work by David J. Anderson circa 2007", "connects_to": ["Theory of Constraints", "Lean", "Agile/Scrum", "Batching", "GTD"], "source_url": "https://en.wikipedia.org/wiki/Kanban"}, {"name": "Agile / Scrum", "category": "productivity", "one_liner": "Deliver work in short iterative sprints with constant feedback loops rather than long sequential plans.", "problem": "Long development cycles without feedback produce outputs misaligned with actual needs; plans become obsolete faster than execution.", "how_it_works": "Work in 1-4 week sprints with defined goals. Daily standups surface blockers. Sprint reviews show work to stakeholders for feedback. Retrospectives improve the process itself. Product backlog is continuously reprioritized. Embraces change over following a fixed plan.", "origin": "Ken Schwaber and Jeff Sutherland, early 1990s; formalized in the 'Agile Manifesto' (2001)", "connects_to": ["Kanban", "Build-Measure-Learn", "PDCA", "Minimum Viable Product", "Critical Path Method"], "source_url": "https://en.wikipedia.org/wiki/Scrum_(project_management)"}, {"name": "PDSA Cycle (Plan-Do-Study-Act)", "category": "problem-solving", "one_liner": "Deming's preferred variant of PDCA \u2014 substitutes 'Study' for 'Check' to emphasize deep learning over mere verification.", "problem": "PDCA's 'Check' step is often treated as pass/fail verification rather than genuine learning about why something worked or didn't.", "how_it_works": "Same four steps as PDCA but 'Study' means deeply analyzing results, updating your theory of the system, and extracting causal understanding \u2014 not just confirming a metric hit or missed. This produces richer learning and better next-iteration hypotheses.", "origin": "W. Edwards Deming; he preferred PDSA and attributed the check/study distinction as important for scientific rigor", "conne
