mulate to massive long-term advantage; Deliberate Practice is the operational mechanism \u2014 it ensures each session produces genuine skill increment rather than plateauing repetition."}, {"from": "Path Dependence / Lock-In", "to": "Reversible vs. Irreversible Decisions (Type 1 / Type 2)", "relationship": "complements", "description": "Path Dependence explains the systemic mechanism by which early choices constrain later ones; Type 1/Type 2 is the decision-time heuristic that prompts extra rigor on precisely those early choices before lock-in sets in."}, {"from": "Survivorship Bias", "to": "Reference Class Forecasting", "relationship": "complements", "description": "Survivorship Bias explains why success stories mislead; Reference Class Forecasting corrects this by anchoring estimates on the full distribution of similar past attempts \u2014 including failures \u2014 not only the visible winners."}, {"from": "Black Swan", "to": "Margin of Safety", "relationship": "sequence", "description": "Black Swan establishes that extreme rare events dominate outcomes and are unpredictable; Margin of Safety is the practical design response \u2014 build buffers large enough to survive events your models did not anticipate."}, {"from": "Porter's Five Forces", "to": "Blue Ocean Strategy", "relationship": "sequence", "description": "Porter's Five Forces analyzes the existing competitive structure; Blue Ocean Strategy prescribes a response when that analysis reveals all five forces are strongly unfavorable \u2014 make the competitive map irrelevant by creating uncontested space."}, {"from": "Anchoring Effect", "to": "Anchoring", "relationship": "extends", "description": "Anchoring Effect is the cognitive bias description (first number disproportionately skews judgment); Anchoring in negotiation is the deliberate weaponization of that bias to set the reference point advantageously."}, {"from": "Framing Effect", "to": "Pre-Suasion", "relationship": "extends", "description": "Framing Effect is the cognitive bias (same information presented differently changes choices); Pre-Suasion extends this into a proactive influence strategy \u2014 shape what people attend to before they encounter the message."}, {"from": "Collective Action Problem", "to": "Ostrom's Design Principles", "relationship": "sequence", "description": "Collective Action Problem diagnoses why shared resources get destroyed by rational individual behavior; Ostrom's Design Principles provide the empirically-validated governance architecture that solves it without privatization or state control."}, {"from": "Wicked Problems", "to": "Design Thinking", "relationship": "sequence", "description": "Wicked Problems identifies the class of problems with no definitive formulation \u2014 exactly the class for which Design Thinking's empathy-first, iterative, prototype-and-test approach is prescribed over analytical decomposition."}, {"from": "MECE Principle", "to": "Issue Trees (Logic Trees)", "relationship": "contains", "description": "MECE is the quality criterion (no overlaps, no gaps); Issue Trees are the structural form that satisfies it \u2014 every branch of an issue tree must be MECE with its siblings at that level."}, {"from": "Confirmation Bias", "to": "Steel-Manning", "relationship": "sequence", "description": "Confirmation Bias is the failure mode (seeking only confirming evidence); Steel-Manning is the deliberate corrective discipline \u2014 construct the strongest opposing argument before deciding, forcing genuine engagement with disconfirming views."}, {"from": "Limits to Growth Archetype", "to": "Ansoff Matrix", "relationship": "sequence", "description": "Limits to Growth Archetype predicts that a reinforcing loop will be stopped by a constraint; Ansoff Matrix provides the strategic options (market development, product development, diversification) for growth when the current market loop hits its ceiling."}, {"from": "Dunning-Kruger Effect", "to": "Circle of Competence", "relationship": "complements", "description": "Dunning-Kruger describes the failure mode \u2014 incompetent people cannot recognize their incompetence; Circle of Competence is the structural remedy \u2014 explicitly map your domain edge so you know when you're outside it before the consequences arrive."}]</script>

<script id="jd-patterns" type="application/json">[{"name": "Classify Before Solving", "problem": "You are handed a problem and immediately start applying familiar solving tools, only to find the solution makes things worse or produces no improvement.", "solution": "Apply Cynefin Framework first to determine the problem's complexity domain. If Complicated, use analytical decomposition (Issue Trees, Root Cause Analysis). If Complex, use probe-sense-respond (Design Thinking, OODA). If Chaotic, act first then stabilize. If Clear, apply best practice directly. Never skip classification.", "models_involved": ["Cynefin Framework", "Hard Choice Model", "Wicked Problems", "System 1 / System 2 Thinking"], "produces": ["Root Cause Surgery", "Decision Scaffolding", "Reframing the Problem", "Idea Generation"]}, {"name": "Symptom vs. Structure Trap", "problem": "An intervention relieves the immediate problem but the problem keeps returning, often worse over time, and people wonder why their fixes are not working.", "solution": "Recognize the Shifting the Burden or Fixes That Fail archetype. Apply Five Whys and Fishbone to locate the structural cause. Use the Iceberg Model to identify which layer (event, pattern, structure, mental model) is generating the symptom. Intervene at the structural level using Leverage Points.", "models_involved": ["Shifting the Burden Archetype", "Fixes That Fail Archetype", "Five Whys", "Fishbone Diagram (Ishikawa / Cause-and-Effect Diagram)", "Iceberg Model", "Leverage Points", "Root Cause Analysis"], "produces": ["Systems Dynamics understanding", "Structural intervention design"]}, {"name": "Diverge Then Converge", "problem": "Groups jump to the first plausible solution, narrowing prematurely before the full solution space has been explored, producing mediocre outcomes with high false confidence.", "solution": "Explicitly split work into two phases using Divergent/Convergent Thinking. In the diverge phase, apply Brainstorming, SCAMPER, or Reverse Brainstorming with deferred judgment. In the converge phase, use Decision Matrix, MECE, or Impact-Effort Matrix to evaluate. Never allow convergence tools into the diverge phase.", "models_involved": ["Divergent / Convergent Thinking", "Brainstorming", "SCAMPER", "Reverse Brainstorming", "Decision Matrix", "MECE Principle", "Impact-Effort Matrix"], "produces": ["Better option sets", "Reduced premature closure"]}, {"name": "Reframe Before Solving", "problem": "Exhaustive solving effort produces technically correct answers to the wrong question \u2014 the problem statement was accepted uncritically, baking in the real constraint.", "solution": "Apply Abstraction Laddering before analysis begins: move up (Why?) to find the real purpose, move down (How?) to find alternatives. Use Inversion to ask what would guarantee failure. Check whether Jobs to Be Done reframes the problem from the customer's perspective. Only then commit to a problem statement.", "models_involved": ["Abstraction Laddering", "Reframing", "First Principles Thinking", "Inversion", "Jobs to Be Done (JTBD)", "Concept Fan"], "produces": ["Classify Before Solving", "Diverge Then Converge"]}, {"name": "Pre-Decision Adversarial Review", "problem": "Teams invest weeks in a plan, then commit to it under social pressure without genuinely stress-testing it, only discovering fatal flaws after launch.", "solution": "Before committing, run a Pre-Mortem (imagine it has already failed, work backward). Apply Steel-Manning to the strongest objection. Use Second-Order Thinking to trace two levels of consequences. Check Reference Class Forecasting against similar past initiatives. If any of these surface showstoppers, recycle back to option generation.", "models_involved": ["Pre-Mortem", "Inversion", "Steel-Manning", "Second-Order Thinking", "Reference Class Forecasting", "Scenario Planning", "Margin of Safety"], "produces": ["Reduced planning fallacy", "Better risk identification", "Decision Scaffolding"]}, {"name": "Bias undaries, match rules to local conditions, allow affected parties to participate in rule modification, establish monitoring, graduated sanctions, conflict resolution, and nested governance. This requires Reinforcing Feedback Loops that reward cooperation.", "models_involved": ["Tragedy of the Commons", "Collective Action Problem", "Ostrom's Design Principles", "Reinforcing Feedback Loop", "Escalation Archetype"], "produces": ["Sustainable shared resource management"]}, {"name": "Structural Communication", "problem": "Information is presented in the order it was discovered or thought of, requiring the audience to do cognitive work to find the point \u2014 causing misunderstanding, ignored recommendations, and wasted time.", "solution": "Choose the communication structure based on audience and purpose. For recommendations and conclusions: apply Minto Pyramid (lead with answer, then support). For problem-framing with narrative context: apply SCQA (situation, complication, question, answer). For persuasion with action: apply Monroe's Motivated Sequence. Never bury the conclusion.", "models_involved": ["Minto Pyramid Principle (BLUF)", "SCQA Framework", "Monroe's Motivated Sequence", "Hero's Journey (Monomyth)", "Ethos, Pathos, Logos (Rhetorical Triangle)"], "produces": ["Faster alignment", "Better executive communication", "Persuasion Architecture"]}, {"name": "Safety Before Candor", "problem": "A team adopts a direct feedback culture or challenge process, but it produces defensiveness, withdrawn behavior, and political maneuvering rather than productive improvement.", "solution": "Apply the SCARF Model to diagnose which social threat domain (Status, Certainty, Autonomy, Relatedness, Fairness) the feedback process is triggering. Build Psychological Safety as the foundation first: establish that interpersonal risk will not be punished. Only then introduce Radical Candor practices and the direct challenge dimension of the Crucial Conversations Framework. Use SBI structure oximal Development (ZPD)", "Spacing Effect (Spaced Repetition)", "Retrieval Practice / Testing Effect", "Feynman Technique", "Kolb's Learning Cycle", "Double-Loop Learning", "Ebbinghaus Forgetting Curve"], "produces": ["Expert performance", "Compounding skill advantage"]}, {"name": "Constraint-First Prioritization", "problem": "Teams improve many things simultaneously but overall throughput barely moves, because they are improving non-bottleneck steps while the bottleneck remains constant.", "solution": "Apply Theory of Constraints: identify the single binding constraint (Bottleneck Analysis), exploit it fully before adding capacity elsewhere, subordinate everything else to that constraint's pace using Drum-Buffer-Rope scheduling, then elevate the constraint. Combine with Pareto Principle to confirm that the identified bottleneck accounts for the dominant share of throughput loss. Only after elevating the current constraint search for the next one.", "models_involved": ["Theory of Constraints (TOC)", "Bottleneck Analysis", "Theory of Constraints \u2014 Drum-Buffer-Rope", "Pareto Principle (80/20 Rule)", "Critical Path Method (CPM)"], "produces": ["Execution Engine", "Strategic Prioritization"]}, {"name": "Reversibility Gate", "problem": "Teams apply the same level of deliberation to all decisions, causing paralysis on reversible small decisions and insufficient scrutiny on irreversible large ones.", "solution": "Apply Type 1/Type 2 decision classification as a gate. For Type 2 (reversible, two-way door) decisions: use OODA-speed iteration, decide quickly, learn from results. For Type 1 (irreversible, one-way door) decisions: require the full Pre-Decision Adversarial Review pattern \u2014 Pre-Mortem, Steel-Manning, Reference Class Forecasting, Margin of Safety. Combine with Path Dependence awareness for decisions that create lock-in.", "models_involved": ["Reversible vs. Irreversible Decisions (Type 1 / Type 2)", "OODA Loop", "Pre-Mortem", "Margin of Safety", "Path Dependence / Lock-In", "Opportunity Cost"], "produces": ["Pre-Decision Adversarial Review", "Decision speed calibration"]}, {"name": "Escalation De-escalation", "problem": "Two parties or two internal forces ratchet up their responses to each other in a self-reinforcing spiral that none of the participants explicitly chose but none can unilaterally exit.", "solution": "Recognize the Escalation Archetype by mapping the Causal Loop Diagram. Apply Principled Negotiation to shift from positional to interest-based framing. Use Tactical Empathy and Nonviolent Communication to de-escalate by surfacing the underlying needs driving each position. Identify whether the shared resource driving competition triggers the Success to the Successful Archetype \u2014 if so, the structural fix is expanding the resource, not winning the competition.", "models_involved": ["Escalation Archetype", "Causal Loop Diagram (CLD)", "Principled Negotiation (Interest-Based Negotiation)", "Tactical Empathy (FBI Negotiation)", "Nonviolent Communication (NVC)", "BATNA & ZOPA", "Success to the Successful Archetype"], "produces": ["Conflict resolution", "Negotiation Architecture"]}, {"name": "Moat Architecture", "problem": "A business grows successfully but finds that its advantages are easily replicated by competitors \u2014 margins compress as competitors close the gap and the company has no durable defense.", "solution": "Identify existing or buildable moat types using Competitive Moat analysis. Check whether the business has Reinforcing Feedback Loops (Flywheel) or Network Effects that compound over time. Use Wardley Mapping to find which capabilities are in early evolutionary stages where proprietary investment builds advantage. Apply Disruption Theory to stress-test whether a simpler/cheaper entrant could serve the ignored customer segment before moving upmarket.", "models_involved": ["Competitive Moat", "Network Effects", "Flywheel Effect", "Wardley Mapping", "Disruption Theory (Disruptive Innovation)", "Path Dependence / Lock-In", "Reinforcing Feedback Loop", "Porter's Five Forces"], "produces": ["Sustained competitive advantage", "Strategic planning"]}, {"name": "Antifragile Design", "problem": "Systems are designed to be efficient and optimized, which makes them brittle \u2014 they perform well in expected conditions but fail catastrophically under stress, volatility, or surprise.", "solution": "Apply Antifragility as the design goal beyond robustness: build systems that gain from disorder. Use Margin of Safety and Resilience principles to ensure survival of stress. Apply Normal Accidents Theory to accept that complex tightly-coupled systems will fail \u2014 design recovery, not just prevention. Embrace Panarchy/Adaptive Cycle: plan for the collapse-reorganization phase as opportunity. Use Black Swan thinking to prepare for events outside your model.", "models_involved": ["Antifragility", "Margin of Safety", "Resilience", "Black Swan", "Normal Accidents Theory", "Panarchy / Adaptive Cycle", "Chaos Theory / Butterfly Effect", "Gall's Law"], "produces": ["Robust system design", "Threshold Awareness"]}, {"name": "Model Lattice Navigation", "problem": "A practitioner knows many mental models but defaults to a small familiar set, systematically missing the better-fit model for the situation and importing inappropriate assumptions.", "solution": "Build Munger's Latticework deliberately \u2014 curate models across disciplines (psychology, systems, economics, physics, biology) not just within your domain. Use Cynefin as the primary routing node. Use the Cognitive Framework bias check to detect when a familiar model is being applied due to availability rather than fit. Practice Metacognition about model choice \u2014 ask 'why this model?' before applying it. Use Double-Loop Learning to update your model selection heuristics after each application.", "models_involved": ["Munger's Latticework of Mental Models", "Cynefin Framework", "System 1 / System 2 Thinking", " ation to sequence the crossing market by market.", "models_involved": ["Technology Adoption Lifecycle (Crossing the Chasm)", "Diffusion of Innovation (S-Curve)", "Tipping Point", "Jobs to Be Done (JTBD)", "Network Effects", "Social Proof (via Cialdini)"], "produces": ["Mainstream market penetration", "Platform Business Model design"]}, {"name": "Conflict as Hidden Assumption", "problem": "Two requirements, goals, or positions appear irreconcilably in conflict, forcing a compromise that satisfies neither \u2014 when in fact both could be satisfied if the underlying assumption creating the conflict were identified and challenged.", "solution": "Apply the Ishikawa Conflict Resolution Diagram (Evaporating Cloud): map the two conflicting requirements, trace them to their underlying needs, identify the shared objective both serve, then surface the hidden assumption that makes the conflict appear necessary. Challenge that assumption through First Principles Thinking or Constraint Relaxation. Win-win solutions exist whenever the conflict is based on an untested assumption rather than a genuine physical constraint.", "models_involved": ["Ishikawa Conflict Resolution Diagram (Evaporating Cloud)", "Principled Negotiation (Interest-Based Negotiation)", "First Principles Thinking", "Constraint Relaxation", "Steel-Manning", "Reframing"], "produces": ["Conflict resolution", "Creative solution generation"]}]</script>
<script>
"use strict";
var D={
  models:JSON.parse(document.getElementById("jd-models").textContent),
  connections:JSON.parse(document.getElementById("jd-connections").textContent),
  clusters:JSON.parse(document.getElementById("jd-clusters").textContent),
  patterns:JSON.parse(document.getElementById("jd-patterns").textContent)
};
var CATS=[...new Set(D.models.map(function(m){return m.category}))].sort();
var CL={"decision-making":"Decision Making","problem-solving":"Problem Solving","systems-thinking":"Systems Thinking",communication:"Communication",creativity:"Creativity","strategic-thinking":"Strategic Thinking",learning:"Learning","cognitive-bias":"Cognitive Bias",productivity:"Productivity",leadership:"Leadership",negotiation:"Negotiation"};
var af="all";
document.getElementById("s-m").textContent=D.models.length;
document.getElementById("s-c").textContent=D.connections.length;
document.getElementById("s-cl").textContent=D.clusters.length;
document.getElementById("s-p").textContent=D.patterns.length;

var tabData=[["catalog","Catalog"],["clusters","Clusters"],["connections","Connections"],["patterns","Pattern Language"]];
var tabsEl=document.getElementById("tabs");
tabData.forEach(function(t,i){
  var b=document.createElement("button");
  b.className="tab"+(i===0?" active":"");b.textContent=t[1];b.dataset.tab=t[0];
  b.addEventListener("click",function(){
    document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active")});
    document.querySelectorAll(".panel").forEach(function(x){x.classList.remove("active")});
    b.classList.add("active");document.getElementById("p-"+t[0]).classList.add("active");
  });
  tabsEl.appendChild(b);
});

var filEl=document.getElementById("fil");
function mkFil(label,cat){
  var b=document.createElement("button");b.className="fbtn"+(cat==="all"?" active":"");
  b.textContent=label;b.dataset.cat=cat;
  b.addEventListener("click",function(){
    document.querySelectorAll(".fbtn").forEach(function(x){x.classList.remove("active")});
    b.classList.add("active");af=cat;renderGrid();
  });
  filEl.appendChild(b);
}
mkFil("All","all");
CATS.forEach(function(c){
  var n=D.models.filter(function(m){return m.category===c}).length;
  mkFil((CL[c]||c)+" ("+n+")",c);
});

function esc(s){if(!s)return"";var d=document.createElement("div");d.textContent=s;return d.innerHTML;}

function renderGrid(){
  var q=(document.getElementById("q").value||"").toLowerCase();
  var g=document.getElementById("grid");
  var fm=D.models.filter(function(m){
    if(af!=="all"&&m.category!==af)return false;
    if(q&&m.name.toLowerCase().indexOf(q)<0&&(m.one_liner||"").toLowerCase().indexOf(q)<0&&(m.problem||"").toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  var h="";
  fm.forEach(function(m,i){
    var ct=(m.connects_to||[]).slice(0,3).map(function(c){return esc(c)}).join(" \u00b7 ");
    var more=(m.connects_to||[]).length>3?" \u00b7 +"+((m.connects_to||[]).length-3)+" more":"";
    h+='<div class="card" data-idx="'+D.models.indexOf(m)+'">';
    h+='<div class="card-name">'+esc(m.name)+'</div>';
    h+='<span class="badge cat-'+m.category+'">'+esc(CL[m.category]||m.category)+'</span>';
    h+='<div class="card-desc">'+esc(m.one_liner)+'</div>';
    if(ct)h+='<div class="card-connects">'+ct+more+'</div>';
    h+='</div>';
  });
  g.innerHTML=h;
}
document.getElementById("q").addEventListener("input",renderGrid);
renderGrid();

document.getElementById("grid").addEventListener("click",function(e){
  var card=e.target.closest(".card");
  if(!card)return;
  showDetail(parseInt(card.dataset.idx));
});

function showDetail(idx){
  var m=D.models[idx];if(!m)return;
  var conns=D.connections.filter(function(c){return c.from===m.name||c.to===m.name});
  var h='<div class="detail-name">'+esc(m.name)+'</div>';
  h+='<span class="badge cat-'+m.category+'">'+esc(CL[m.category]||m.category)+'</span>';
  if(m.origin)h+='<div class="dsec"><h3>Origin</h3><p>'+esc(m.origin)+'</p></div>';
  h+='<div class="dsec"><h3>Problem</h3><p>'+esc(m.problem)+'</p></div>';
  h+='<div class="dsec"><h3>How it works</h3><p>'+esc(m.how_it_works||m.one_liner)+'</p></div>';
  if(m.connects_to&&m.connects_to.length){
    h+='<div class="dsec"><h3>Connects to</h3><div class="dtags">';
    m.connects_to.forEach(function(c){
      var ci=D.models.findIndex(function(x){return x.name===c});
      if(ci>=0)h+='<span class="dtag" data-idx="'+ci+'">'+esc(c)+'</span>';
      else h+='<span class="dtag">'+esc(c)+'</span>';
    });
    h+='</div></div>';
  }
  if(conns.length){
    h+='<div class="dsec"><h3>Relationships ('+conns.length+')</h3>';
    conns.forEach(function(c){
      var other=c.from===m.name?c.to:c.from;
      var dir=c.from===m.name?"\u2192":"\u2190";
      var ci=D.models.findIndex(function(x){return x.name===other});
      h+='<div style="margin:6px 0;font-size:0.88rem"><span class="ctype">'+esc(c.relationship)+'</span> '+dir+' ';
      if(ci>=0)h+='<span class="clink" data-idx="'+ci+'">'+esc(other)+'</span>';
      else h+='<strong>'+esc(other)+'</strong>';
      h+='<br><span style="color:var(--muted);font-size:0.82rem">'+esc(c.description)+'</span></div>';
    });
    h+='</div>';
  }
  document.getElementById("dc-content").innerHTML=h;
  document.getElementById("ov").classList.add("show");
}

document.getElementById("ov").addEventListener("click",function(e){
  if(e.target===document.getElementById("ov"))document.getElementById("ov").classList.remove("show");
});
document.getElementById("dc").addEventListener("click",function(){document.getElementById("ov").classList.remove("show")});
document.getElementById("det").addEventListener("click",function(e){
  var t=e.target.closest("[data-idx]");
  if(t)showDetail(parseInt(t.dataset.idx));
});

// Clusters
var clh="";
D.clusters.forEach(function(cl){
  clh+='<div class="ccard"><div class="ccard-name">'+esc(cl.name)+'</div>';
  clh+='<div class="ccard-theme">'+esc(cl.theme)+'</div>';
  clh+='<div class="ccard-models">';
  (cl.models||[]).forEach(function(mn){
    var ci=D.models.findIndex(function(x){return x.name===mn});
    if(ci>=0)clh+='<span class="cmtag" data-idx="'+ci+'">'+esc(mn)+'</span>';
    else clh+='<span class="cmtag">'+esc(mn)+'</span>';
  });
  clh+='</div></div>';
});
document.getElementById("cl-list").innerHTML=clh;
document.getElementById("cl-list").addEventListener("click",function(e){
  var t=e.target.closest("[data-idx]");if(t)showDetail(parseInt(t.dataset.idx));
});

// Connections
function renderConns(){
  var q=(document.getElementById("cq").value||"").toLowerCase();
  var fc=D.connections.filter(function(c){
    if(!q)return true;
    return c.from.toLowerCase().indexOf(q)>=0||c.to.toLowerCase().indexOf(q)>=0||(c.relationship||"").toLowerCase().indexOf(q)>=0||(c.description||"").toLowerCase().indexOf(q)>=0;
  });
  var h="";
  fc.forEach(function(c){
    var fi=D.models.findIndex(function(x){return x.name===c.from});
    var ti=D.models.findIndex(function(x){return x.name===c.to});
    h+='<div class="crow">';
    h+=(fi>=0?'<span class="clink" data-idx="'+fi+'">':'<span>')+esc(c.from)+'</span>';
    h+=' <span class="ctype">'+esc(c.relationship)+'</span> \u2192 ';
    h+=(ti>=0?'<span class="clink" data-idx="'+ti+'">':'<span>')+esc(c.to)+'</span>';
    h+=' <span class="cdesc">'+esc(c.description)+'</span>';
    h+='</div>';
  });
  document.getElementById("cn-list").innerHTML=h;
}
document.getElementById("cq").addEventListener("input",renderConns);
renderConns();
document.getElementById("cn-list").addEventListener("click",function(e){
  var t=e.target.closest("[data-idx]");if(t){
    document.querySelectorAll(".tab")[0].click();showDetail(parseInt(t.dataset.idx));
  }
});

// Patterns
var pth="";
D.patterns.forEach(function(p){
  pth+='<div class="pcard"><div class="pcard-name">'+esc(p.name)+'</div>';
  if(p.problem)pth+='<div class="psec"><strong>Problem</strong><p>'+esc(p.problem)+'</p></div>';
  if(p.solution)pth+='<div class="psec"><strong>Solution</strong><p>'+esc(p.solution)+'</p></div>';
  if(p.models_involved&&p.models_involved.length){
    pth+='<div class="psec"><strong>Models involved</strong><div class="ccard-models">';
    p.models_involved.forEach(function(mn){
      var ci=D.models.findIndex(function(x){return x.name===mn});
      if(ci>=0)pth+='<span class="cmtag" data-idx="'+ci+'">'+esc(mn)+'</span>';
      else pth+='<span class="cmtag">'+esc(mn)+'</span>';
    });
    pth+='</div></div>';
  }
  if(p.produces&&p.produces.length)pth+='<div class="psec"><strong>Produces</strong><p>'+esc(p.produces.join(", "))+'</p></div>';
  pth+='</div>';
});
document.getElementById("pt-list").innerHTML=pth;
document.getElementById("pt-list").addEventListener("click",function(e){
  var t=e.target.closest("[data-idx]");if(t){
    document.querySelectorAll(".tab")[0].click();showDetail(parseInt(t.dataset.idx));
  }
});
</script>
</body>
</html>
