<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf9f6;--card:#fff;--border:#e8e5e0;--text:#2d2a26;--muted:#7a746c;
  --accent:#c47a5a;--accent-bg:#fdf3ee;
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.container{max-width:1400px;margin:0 auto;padding:20px 24px}
h1{font-size:1.8rem;font-weight:700;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:0.95rem;margin-bottom:24px}
.stats{display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 18px}
.stat-num{font-size:1.5rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0}
.tab{padding:10px 20px;cursor:pointer;border:none;background:none;font-size:0.95rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search{padding:10px 16px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;width:300px;background:var(--card)}
.search:focus{outline:none;border-color:var(--accent)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:0.8rem;color:var(--muted);transition:all 0.2s}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.2s}
.card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(0,0,0,0.06);transform:translateY(-1px)}
.card-name{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px}
.cat-decision-making{background:#e8f0fe;color:#4a90d9}
.cat-problem-solving{background:#fef0e6;color:#e67e22}
.cat-systems-thinking{background:#e8f6ef;color:#27ae60}
.cat-communication{background:#f3e8f9;color:#8e44ad}
.cat-creativity{background:#fef7e6;color:#f39c12}
.cat-strategic-thinking{background:#e8eff6;color:#2980b9}
.cat-learning{background:#e6f6f2;color:#16a085}
.cat-cognitive-bias{background:#fce8e8;color:#c0392b}
.cat-productivity{background:#eef0f2;color:#7f8c8d}
.cat-leadership{background:#fef0e6;color:#d35400}
.cat-negotiation{background:#e6f6f2;color:#1abc9c}
.card-desc{font-size:0.88rem;color:var(--muted);line-height:1.55}
.card-connects{margin-top:10px;font-size:0.78rem;color:var(--muted)}
.card-connects span{color:var(--accent)}
.panel{display:none}.panel.active{display:block}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;display:none;justify-content:center;align-items:center}
.overlay.show{display:flex}
.detail{background:var(--card);border-radius:16px;padding:32px;max-width:680px;width:90%;max-height:80vh;overflow-y:auto;position:relative}
.detail-close{position:absolute;top:16px;right:16px;cursor:pointer;font-size:1.3rem;color:var(--muted);background:none;border:none}
.detail-name{font-size:1.4rem;font-weight:700;margin-bottom:8px}
.dsec{margin-top:16px}
.dsec h3{font-size:0.85rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:6px}
.dsec p{font-size:0.93rem;line-height:1.6}
.dtags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.dtag{padding:4px 12px;background:var(--accent-bg);border-radius:16px;font-size:0.82rem;color:var(--accent);cursor:pointer}
.dtag:hover{background:var(--accent);color:#fff}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.ccard-name{font-size:1.1rem;font-weight:600;margin-bottom:4px}
.ccard-theme{font-size:0.88rem;color:var(--muted);margin-bottom:10px}
.ccard-models{display:flex;flex-wrap:wrap;gap:6px}
.cmtag{padding:4px 10px;background:#f5f3ef;border-radius:12px;font-size:0.78rem;color:var(--text);cursor:pointer}
.cmtag:hover{background:var(--accent-bg);color:var(--accent)}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;border-left:4px solid var(--accent)}
.pcard-name{font-size:1.15rem;font-weight:600;margin-bottom:8px}
.psec{margin-top:12px}
.psec strong{font-size:0.82rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--muted)}
.psec p{font-size:0.9rem;margin-top:3px}
.crow{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.88rem;flex-wrap:wrap}
.clink{font-weight:600;color:var(--accent);cursor:pointer}
.clink:hover{text-decoration:underline}
.ctype{padding:2px 8px;border-radius:8px;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.03em;background:#eef0f2;color:var(--muted)}
.cdesc{color:var(--muted);font-size:0.82rem;flex:1;min-width:200px}
.conn-search{padding:10px 16px;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;width:300px;background:var(--card);margin-bottom:16px}
.conn-search:focus{outline:none;border-color:var(--accent)}
@media(max-width:768px){.grid{grid-template-columns:1fr}.search,.conn-search{width:100%}.controls{flex-direction:column}}
</style>

<script id="jd-models" type="application/json">[{"name": "Decision Matrix", "category": "decision-making", "one_liner": "Score options against weighted criteria to remove subjectivity from multi-factor decisions.", "problem": "When multiple options exist and several factors must be weighed simultaneously, subjective gut-feel leads to inconsistent or biased choices.", "how_it_works": "List options as rows and criteria as columns. Score each option on each criterion (e.g., 1\u20135), assign importance weights to criteria, multiply scores by weights, sum totals per option, and choose the highest score.", "origin": "Widely attributed to engineering and management science traditions; popularized on Untools by Adam Amran.", "connects_to": ["Hard Choice Model", "Impact-Effort Matrix", "Second-Order Thinking", "Expected Value"], "source_url": "https://untools.co/decision-matrix/"}, {"name": "Impact-Effort Matrix", "category": "decision-making", "one_liner": "Prioritize initiatives by mapping expected impact against implementation effort on a 2\u00d72 grid.", "problem": "Teams face too many competing initiatives with limited resources and no principled way to sequence them.", "how_it_works": "Place initiatives on a 2\u00d72 grid: High Impact / Low Effort = Quick Wins (do first); High Impact / High Effort = Major Projects (plan carefully); Low Impact / Low Effort = Fill-Ins (when idle); Low Impact / High Effort = Money Pits (eliminate). Quadrant placement drives priority.", "origin": "Rooted in management consulting and Lean/Six Sigma traditions; widely adopted in product management circa 2000s.", "connects_to": ["Decision Matrix", "Eisenhower Matrix", "Pareto Principle", "Opportunity Cost"], "source_url": "https://untools.co/impact-effort-matrix/"}, {"name": "OODA Loop", "category": "decision-making", "one_liner": "Cycle through Observe \u2192 Orient \u2192 Decide \u2192 Act faster than your adversary to seize the initiative.", "problem": "In fast-changing, competitive environments with incomplete information, slow or rigid decision processes lose ground.", "how_it_works": "Observe: gather situational data. Orient: synthesize via experience and mental models. Decide: choose a course of action. Act: execute. Repeat the loop continuously and faster than competitors, making your behavior unpredictable and adaptive.", "origin": "Colonel John Boyd, USAF military strategist, developed it through decades of aerial combat analysis in the 1970s\u201380s.", "connects_to": ["Cynefin Framework", "Hard Choice Model", "Confidence Determines Speed vs. Quality"], "source_url": "https://untools.co/ooda-loop/"}, {"name": "Cynefin Framework", "category": "decision-making", "one_liner": "Classify situations into five complexity domains so you pick the right decision approach for each.", "problem": "Applying the wrong problem-solving method (e.g., best-practice playbooks in a complex system) produces failure; most leaders lack a way to distinguish problem types.", "how_it_works": "Assign the situation to a domain: Clear (sense\u2013categorize\u2013respond), Complicated (sense\u2013analyze\u2013respond), Complex (probe\u2013sense\u2013respond), Chaotic (act\u2013sense\u2013respond), or Disorder (decompose and re-classify). Each domain prescribes a different leadership and decision response.", "origin": "Dave Snowden at IBM in 1999; refined over subsequent decades.", "connects_to": ["OODA Loop", "Hard Choice Model", "Second-Order Thinking", "Scenario Planning"], "source_url": "https://untools.co/cynefin-framework/"}, {"name": "Hard Choice Model", "category": "decision-making", "one_liner": "Categorize a decision by impact \u00d7 comparability to know how much effort to spend deciding.", "problem": "People over-deliberate trivial choices and under-deliberate genuinely hard ones, wasting cognitive energy in the wrong places.", "how_it_works": "Plot the decision on a 2\u00d72: Impact (low/high) vs. Comparability (easy/hard to compare). No-brainer: decide fast. Apples-and-Oranges: align with values. Big Choice: research thoroughly. Hard Choice: accept ambiguity and run experiments or a Decision Matrix.", "origin": "Wes O'Haire, Dropbox Design team; published on Dropbox Design blog.", "connects_to": ["Decision Matrix", "Cynefin Framework", "Confidence Determines Speed vs. Quality", "OODA Loop"], "source_url": "https://untools.co/hard-choice-model/"}, {"name": "Second-Order Thinking", "category": "strategic-thinking", "one_liner": "Ask 'and then what?' repeatedly to surface downstream consequences missed by first-order analysis.", "problem": "Most people stop at immediate effects; policies, products, and personal decisions that look good first-order often create serious second- and third-order harms.", "how_it_works": "For each decision, list first-order effects, then ask 'and then what?' for each to generate second-order effects. Alternatively, map outcomes across three timeframes: 10 minutes, 10 months, 10 years. Evaluate whether second-order benefits outweigh first-order costs, or vice versa.", "origin": "Howard Marks, 'The Most Important Thing' (2011); popularized by Shane Parrish at Farnam Street.", "connects_to": ["Inversion", "Pre-Mortem", "Scenario Planning", "Goodhart's Law", "Systems Thinking"], "source_url": "https://fs.blog/second-order-thinking/"}, {"name": "Inversion", "category": "problem-solving", "one_liner": "Solve problems by asking what would guarantee failure, then avoid those conditions.", "problem": "Forward-thinking is additive and optimistic; it misses failure modes and unintended harms that backward-thinking reveals.", "how_it_works": "Flip the goal: instead of 'how do I succeed?' ask 'what would guarantee I fail?' List those conditions, then eliminate or avoid them. Spend energy on obstacle removal, not excellence-chasing. Works on life, strategy, and design problems equally.", "origin": "Carl Gustav Jacob Jacobi (German mathematician, 19th c.): 'man muss immer umkehren.' Popularized in business by Charlie Munger.", "connects_to": ["Pre-Mortem", "Second-Order Thinking", "First Principles Thinking", "Steel-Manning"], "source_url": "https://fs.blog/inversion/"}, {"name": "Pre-Mortem", "category": "decision-making", "one_liner": "Imagine the plan has already failed, then work backward to identify why \u2014 before you launch.", "problem": "Overconfidence and groupthink suppress risk identification during planning; standard risk reviews feel hypothetical and generate weak lists.", "how_it_works": "Before executing a plan, tell participants: 'It's one year from now; this project failed spectacularly. Independently write down every reason it could have gone wrong.' Share results, synthesize causes, and build mitigations. Prospective hindsight improves risk identification by ~30%.", "origin": "Gary Klein, research psychologist; first detailed in Harvard Business Review, 2007.", "connects_to": ["Inversion", "Second-Order Thinking", "WRAP Framework", "Scenario Planning"], "source_url": "https://www.gary-klein.com/premortem"}, {"name": "Eisenhower Matrix", "category": "decision-making", "one_liner": "Separate tasks by urgency and importance to prioritize what truly matters over what merely feels pressing.", "problem": "Busyness masquerades as productivity; urgent-but-trivial tasks crowd out important-but-non-urgent strategic work.", "how_it_works": "Quadrant 1 (urgent + important): do immediately. Quadrant 2 (important + not urgent): schedule \u2014 this is where strategic progress lives. Quadrant 3 (urgent + not important): delegate. Quadrant 4 (neither): eliminate. Protect Q2 time ruthlessly.", "origin": "Dwight D. Eisenhower coined the urgency/importance distinction (1954 speech); Stephen Covey formalized it into the 4-quadrant matrix in '7 Habits of Highly Effective People' (1989).", "connects_to": ["Impact-Effort Matrix", "Pareto Principle", "Parkinson's Law", "Decision Matrix"], "source_url": "https://untools.co/eisenhower-matrix/"}, {"name": "Six Thinking Hats", "category": "decision-making", "one_liner": "Structure group thinking by having everyone adopt the same cognitive lens simultaneously.", "problem": "Unstructured group decisions devolve into argument, emotion, and premature convergence; different people bring different thinking modes that clash rather than complement.", "how_it_works": "Each hat = one mode: White (facts/data), Red (emotions/gut), Black (risks/caution), Yellow (benefits/optimism), Green (creativity/alternatives), Blue (process facilitation). All participants wear the same hat at the same time, preventing cross-mode conflict and ensuring full coverage of every perspective.", "origin": "Edward de Bono, 'Six Thinking Hats' (1985).", "connects_to": ["Decision Matrix", "Productive Thinking Model", "First Principles Thinking", "Pre-Mortem"], "source_url": "https://untools.co/six-thinking-hats/"}, {"name": "Veil of Ignorance", "category": "decision-making", "one_liner": "Design rules by imagining you don't know which position in the system you'll occupy.", "problem": "Self-interest biases decisions about fair systems, policies, or rules; people design rules that favor their current position.", "how_it_works": "Before deciding on a policy or structure, imagine you are behind a 'veil of ignorance' \u2014 you don't know your role, status, wealth, or position in the resulting system. Choose the structure you'd accept under this uncertainty. Research across 7 experiments with 6,000+ participants shows this reliably shifts choices toward the greater good.", "origin": "John Rawls, philosopher, 'A Theory of Justice' (1971). Also called 'the original position.'", "connects_to": ["Second-Order Thinking", "Pre-Mortem", "Expected Value", "Inversion"], "source_url": "https://ethicsunwrapped.utexas.edu/glossary/veil-of-ignorance"}, {"name": "Regret Minimization Framework", "category": "decision-making", "one_liner": "Project yourself to age 80 and choose the option you'd least regret not having pursued.", "problem": "Short-term fear and loss aversion distort major life decisions; we overweight present discomfort relative to future regret over inaction.", "how_it_works": "Visualize yourself at age 80 looking back. Ask: 'Which option would I regret not taking?' Research by Gilovich and Medvec (1994) shows humans regret inaction more than action over long time horizons. This framing strips away present-moment anxiety and grounds decisions in long-term values.", "origin": "Jeff Bezos, 1994, when deciding to leave a Wall Street career to start Amazon.", "connects_to": ["10-10-10 Rule", "Opportunity Cost", "Reversible vs. Irreversible Decisions", "Inversion"], "source_url": "https://fourweekmba.com/regret-minimization-framework/"}, {"name": "Reversible vs. Irreversible Decisions (Type 1 / Type 2)", "category": "decision-making", "one_liner": "Match decision rigor to reversibility \u2014 move fast on two-way doors, deliberate on one-way doors.", "problem": "Organizations apply the same heavyweight decision process to all choices, making them slow without improving quality on reversible decisions.", "how_it_works": "Type 1 (one-way door): high-stakes, irreversible \u2014 require deep deliberation. Type 2 (two-way door): reversible, limited consequences \u2014 decide fast with ~70% of desired information. Misclassifying Type 2 as Type 1 kills innovation; misclassifying Type 1 as Type 2 creates costly errors.", "origin": "Jeff Bezos, Amazon shareholder letter, 2016.", "connects_to": ["Hard Choice Model", "Regret Minimization Framework", "OODA Loop", "Confidence Determines Speed vs. Quality"], "source_url": "https://fs.blog/reversible-irreversible-decisions/"}, {"name": "Expected Value", "category": "decision-making", "one_liner": "Multiply the magnitude of each outcome by its probability to compare decisions under uncertainty.", "problem": "Human intuition handles single vivid outcomes well but fails on probabilistic sequences; we confuse low-probability/high-magnitude events with high-probability/low-magnitude ones.", "how_it_works": "For each option, enumerate possible outcomes, assign probabilities and magnitudes (positive/negative), multiply P \u00d7 V for each outcome, sum them for expected value. Choose the highest EV option, adjusted for variance tolerance. Works rigorously in repeatable scenarios; qualitative in one-off decisions.", "origin": "Blaise Pascal and Pierre de Fermat (17th c. probability theory); Daniel Bernoulli added utility (1738). Central to modern decision theory.", "connects_to": ["Probabilistic Thinking", "Bayesian Updating", "Margin of Safety", "Opportunity Cost"], "source_url": "https://fs.blog/expected-value/"}, {"name": "Opportunity Cost", "category": "decision-making", "one_liner": "Every choice forfeits the next-best alternative; the true cost of any decision includes what you give up.", "problem": "People evaluate options in isolation, ignoring the implicit cost of not choosing alternatives \u2014 leading to resource misallocation and anchoring on sunk effort.", "how_it_works": "Before committing, explicitly identify the next-best use of the same money/time/attention. Calculate both the direct cost and the opportunity cost. Choose only when the chosen option's expected return exceeds the forgone alternative. Pairs with Expected Value thinking.", "origin": "Fr\u00e9d\u00e9ric Bastiat ('That Which Is Seen and That Which Is Not Seen,' 1850); formalized in mainstream microeconomics by John Stuart Mill and later neoclassical economists.", "connects_to": ["Expected Value", "Sunk Cost Fallacy", "Margin of Safety", "Pareto Principle"], "source_url": "https://toolbox.nesslabs.com/opportunity-costs"}, {"name": "Sunk Cost Awareness", "category": "cognitive-bias", "one_liner": "Past irrecoverable investments are irrelevant to future decisions \u2014 only forward-looking costs and benefits matter.", "problem": "Loss aversion and status quo bias cause people to continue failing projects because of what they've already spent, deepening losses rather than cutting them.", "how_it_works": "When evaluating whether to continue a course of action, mentally strip out all past investments (money, time, effort) as non-recoverable. Evaluate only: does the marginal benefit of continuing exceed the marginal cost? If no, exit regardless of prior spend. Explicitly name opportunity cost of staying.", "origin": "Hal Arkes and Catherine Blumer, 1985, first empirical study. Named by behavioral economists; Kahneman's Prospect Theory explains the psychological mechanism (loss aversion).", "connects_to": ["Opportunity Cost", "Loss Aversion", "Inversion", "Expected Value"], "source_url": "https://thedecisionlab.com/biases/the-sunk-cost-fallacy"}, {"name": "Margin of Safety", "category": "strategic-thinking", "one_liner": "Build a buffer between your estimate and reality to absorb errors, uncertainty, and surprise.", "problem": "Estimates are always wrong; operating at theoretical limits leaves no room for the unexpected, making systems fragile.", "how_it_works": "Quantify intrinsic value or required capacity, then invest/build only when actual price/load is substantially below that estimate (e.g., 30\u201350% below intrinsic value in investing). The larger the uncertainty, the larger the required margin. Applied in engineering, investing, project management, and personal finance.", "origin": "Benjamin Graham, 'The Intelligent Investor' (1949); refined by Warren Buffett as his central investing criterion.", "connects_to": ["Expected Value", "Probabilistic Thinking", "Second-Order Thinking", "Pre-Mortem"], "source_url": "https://fs.blog/mental-models/"}, {"name": "Occam's Razor", "category": "problem-solving", "one_liner": "Among competing explanations, prefer the one requiring the fewest unsupported assumptions.", "problem": "Complex explanations are easy to generate and hard to falsify; they waste cognitive resources and resist efficient action.", "how_it_works": "When multiple hypotheses fit observed facts, eliminate those with extra unnecessary entities or assumptions. Default to the simpler explanation until evidence forces complexity. Used to cut through noise in diagnosis, root-cause analysis, and theory selection.", "origin": "William of Ockham, 14th-century English friar and logician: 'Pluralitas non est ponenda sine necessitate' (Plurality must not be posited without necessity).", "connects_to": ["Hanlon's Razor", "First Principles Thinking", "Inversion", "Probabilistic Thinking"], "source_url": "https://fs.blog/mental-models/"}, {"name": "Hanlon's Razor", "category": "cognitive-bias", "one_liner": "Never attribute to malice what can be adequately explained by incompetence or ignorance.", "problem": "Humans default to hostile attribution in ambiguous situations, escalating conflicts that stem from simple mistakes rather than bad intent.", "how_it_works": "When a negative outcome affects you, before assuming bad intent, ask: 'Could this be explained by error, ignorance, or indifference instead?' Favor the benign explanation until evidence rules it out. Reduces paranoia, preserves relationships, and directs energy toward fixing systems rather than blaming people.", "origin": "Robert Hanlon, submitted to 'Murphy's Law Book Two' (1980). Roots in Goethe's 'The Sorrows of Young Werther' and Napoleon-era thought.", "connects_to": ["Occam's Razor", "Ladder of Inference", "Confirmation Bias"], "source_url": "https://sahilbloom.substack.com/p/hanlons-razor"}, {"name": "Probabilistic Thinking", "category": "decision-making", "one_liner": "Estimate the likelihood of multiple outcomes rather than assuming a single prediction will hold.", "problem": "Binary/deterministic thinking fails in complex systems; single-point forecasts ignore uncertainty and lead to overconfidence.", "how_it_works": "Enumerate plausible outcomes with rough probability estimates. Use three sub-tools: Bayesian Thinking (update priors with new evidence), Fat-Tailed Curves (plan for extreme unlikely events), and Asymmetries (account for directional biases in estimates). Track calibration over time.", "origin": "Thomas Bayes (18th c.) laid the mathematical foundations; popularized as a general thinking tool by Shane Parrish at Farnam Street.", "connects_to": ["Bayesian Updating", "Expected Value", "Margin of Safety", "Reference Class Forecasting"], "source_url": "https://fs.blog/probabilistic-thinking/"}, {"name": "Bayesian Updating", "category": "decision-making", "one_liner": "Revise beliefs by combining prior probability with the weight of new evidence using Bayes' rule.", "problem": "New information is routinely either over-weighted (base-rate neglect) or under-weighted (conservatism bias), producing miscalibrated beliefs.", "how_it_works": "Start with a prior probability (your existing belief strength). When new evidence arrives, compute how much more (or less) likely that evidence is under your hypothesis versus alternatives. Update proportionally: P(H|E) \u221d P(E|H) \u00d7 P(H). The posterior becomes the new prior for the next update.", "origin": "Thomas Bayes, 'An Essay Toward Solving a Problem in the Doctrine of Chances' (published posthumously, 1763); Richard Price forwarded it; Pierre-Simon Laplace formalized it.", "connects_to": ["Probabilistic Thinking", "Expected Value", "Reference Class Forecasting", "Confirmation Bias"], "source_url": "https://www.lesswrong.com/w/bayesian-update"}, {"name": "First Principles Thinking", "category": "problem-solving", "one_liner": "Decompose a problem to its foundational truths, then reason up to novel solutions unconstrained by convention.", "problem": "Reasoning by analogy from existing solutions inherits their constraints and assumptions; breakthrough solutions require questioning fundamentals.", "how_it_works": "Ask 'What do I know is definitely true here?' repeatedly, stripping away assumptions until irreducible facts remain. Rebuild solutions from those facts. Contrast with analogy-thinking ('how do others do this?'). Applied by Musk to rocket construction: broke SpaceX costs into raw material costs, not 'the going rate for rockets.'", "origin": "Aristotle, 'Posterior Analytics': first principles (archai) as fundamental premises of all knowledge. Independently re-articulated by Descartes ('Meditations,' 1641).", "connects_to": ["Inversion", "Occam's Razor", "Second-Order Thinking", "Issue Trees"], "source_url": "https://fs.blog/first-principles/"}, {"name": "Circle of Competence", "category": "strategic-thinking", "one_liner": "Stay inside the domain where your knowledge gives you a genuine edge; know the boundary as precisely as the interior.", "problem": "Overconfidence drives people to make consequential decisions in domains where they lack real expertise, producing avoidable failures.", "how_it_works": "Explicitly map areas of genuine expertise versus surface-level familiarity. Within the circle: act with conviction. At the boundary: apply extra skepticism. Outside: defer, hire, or abstain. Shrinking or expanding the circle deliberately is more valuable than acting outside it. Buffett's rule: 'The size of that circle is not very important; knowing its boundaries is vital.'", "origin": "Warren Buffett (1996 shareholder letter) and Charlie Munger; popularized through Berkshire Hathaway annual letters.", "connects_to": ["Margin of Safety", "Occam's Razor", "Hard Choice Model", "Probabilistic Thinking"], "source_url": "https://fs.blog/mental-models/"}, {"name": "Map Is Not the Territory", "category": "systems-thinking", "one_liner": "Your mental model of reality is a useful simplification, not reality itself \u2014 act on the territory, not the map.", "problem": "People mistake their mental representations, models, and language for the actual world they describe, leading to rigid thinking and surprise when reality diverges.", "how_it_works": "Treat all models, plans, and beliefs as approximations with known gaps. When a model fails, update it rather than dismissing the evidence. Ask: 'What does my map omit?' and 'Where does this abstraction break down?' Maintains epistemic humility while still enabling action.", "origin": "Alfred Korzybski, 'Science and Sanity' (1933): 'A map is not the territory it represents.'", "connects_to": ["Bayesian Updating", "First Principles Thinking", "Ladder of Inference", "Cynefin Framework"], "source_url": "https://fs.blog/mental-models/"}, {"name": "Ladder of Inference", "category": "decision-making", "one_liner": "Trace the seven-rung path from raw data to action to expose where faulty assumptions entered your reasoning.", "problem": "People jump from selective observation to sweeping conclusions in milliseconds, unaware of the interpretive leaps made \u2014 creating decisions built on unexamined assumptions.", "how_it_works": "The seven rungs: (1) Observable data \u2192 (2) Selected data \u2192 (3) Interpretation \u2192 (4) Assumptions \u2192 (5) Conclusions \u2192 (6) Beliefs \u2192 (7) Actions. When a conclusion or decision feels obvious but contested, climb back down: 'What data did I select? What assumption did I add?' Slows reflexive judgment.", "origin": "Chris Argyris, organizational psychologist; popularized by Peter Senge in 'The Fifth Discipline' (1990/1992).", "connects_to": ["Confirmation Bias", "Hanlon's Razor", "Map Is Not the Territory", "Bayesian Updating"], "source_url": "https://untools.co/ladder-of-inference/"}, {"name": "Pareto Principle (80/20 Rule)", "category": "strategic-thinking", "one_liner": "Roughly 80% of outcomes derive from 20% of inputs \u2014 identify and focus on the vital few.", "problem": "Treating all inputs/tasks as equally valuable disperses effort across low-leverage activities.", "how_it_works": "Analyze output distribution: which 20% of customers, features, tasks, or causes produce 80% of results? Redirect time and resources toward those high-leverage inputs. Apply iteratively \u2014 the top 20% of the 20% often generates an even greater share. Pair with Parkinson's Law to limit time to the critical 20%.", "origin": "Vilfredo Pareto, 1906 (observed 20% of Italian population owned 80% of wealth); Joseph Juran formalized the management principle (~1940s).", "connects_to": ["Eisenhower Matrix", "Impact-Effort Matrix", "Opportunity Cost", "Bottlenecks"], "source_url": "https://thedecisionlab.com/reference-guide/economics/the-pareto-principle"}, {"name": "10-10-10 Rule", "category": "decision-making", "one_liner": "Evaluate a decision by asking how you'll feel about it in 10 minutes, 10 months, and 10 years.", "problem": "Emotionally charged decisions are dominated by immediate feelings; the 10-minute perspective crowds out long-term values.", "how_it_works": "For any significant decision, answer three questions: How will I feel about this choice in 10 minutes? In 10 months? In 10 years? Divergence across timeframes flags decisions driven by short-term emotion rather than long-term alignment. Useful for personal and professional crossroads.", "origin": "Suzy Welch, journalist and author; popularized in her book '10-10-10: A Life-Transforming Idea' (2009).", "connects_to": ["Regret Minimization Framework", "Second-Order Thinking", "Eisenhower Matrix"], "source_url": "https://www.briantaitinternational.com/post/10-decision-making-frameworks-to-master-life-s-crossroads"}, {"name": "WRAP Framework", "category": "decision-making", "one_liner": "Counter the four villains of decision-making by widening options, reality-testing assumptions, attaining distance, and preparing to be wrong.", "problem": "Narrow framing, confirmation bias, short-term emotion, and overconfidence systematically corrupt decisions.", "how_it_works": "W \u2014 Widen options (avoid binary framing; generate at least 3 alternatives). R \u2014 Reality-test assumptions (seek disconfirming evidence, run small experiments). A \u2014 Attain distance (use the 10-10-10 test or advisor perspective to remove emotion). P \u2014 Prepare to be wrong (set tripwires for when to revisit the decision).", "origin": "Chip Heath and Dan Heath, 'Decisive: How to Make Better Choices in Life and Work' (2013).", "connects_to": ["Pre-Mortem", "Confirmation Bias", "10-10-10 Rule", "Inversion"], "source_url": "https://litfl.com/wrap-decision-making-approach/"}, {"name": "Confidence Determines Speed vs. Quality", "category": "decision-making", "one_liner": "Match decision speed to your confidence level: low confidence in the problem \u2192 move fast; high confidence in solution \u2192 invest quality.", "problem": "Teams apply uniform decision-making rigor to all situations, making them too slow on obvious problems and too fast on uncertain ones.", "how_it_works": "Three scenarios: (1) Low confidence in problem importance \u2192 act quickly to test whether the problem matters. (2) High confidence in problem, low in solution \u2192 balance speed and quality with iteration. (3) High confidence in both \u2192 invest deliberate quality. Prevents analysis paralysis and reckless speed equally.", "origin": "Adam Amran, Untools; grounded in product management practice.", "connects_to": ["Hard Choice Model", "Reversible vs. Irreversible Decisions", "OODA Loop"], "source_url": "https://untools.co/confidence-determines-speed-vs-quality/"}, {"name": "Steel-Manning", "category": "decision-making", "one_liner": "Build the strongest possible version of the opposing argument before responding or deciding.", "problem": "Confirmation bias leads people to engage only with weak versions of opposing views, producing decisions that fail when the strong version turns out to be true.", "how_it_works": "Before evaluating options or opponents, explicitly articulate the best-case version of the argument you're inclined to reject. Ask: 'If this position is correct, what is the most compelling evidence for it?' Engage with that version, not a caricature. Reduces blind spots and improves risk identification.", "origin": "Emerged from logic and philosophy communities; popularized in rationalist forums (LessWrong, SSC) as the antidote to the straw-man fallacy.", "connects_to": ["Inversion", "Pre-Mortem", "Confirmation Bias", "Ladder of Inference"], "source_url": "https://verybigbrain.com/psychology-thinking/steel-manning-the-smarter-alternative-to-straw-man-arguments/"}, {"name": "Goodhart's Law", "category": "systems-thinking", "one_liner": "When a measure becomes a target, it ceases to be a good measure.", "problem": "Organizations optimize metrics at the expense of the underlying goal those metrics were designed to track, producing perverse outcomes.", "how_it_works": "Identify what a metric is actually measuring vs. what goal it proxies. When the proxy becomes the objective, people optimize the proxy directly, distorting behavior (e.g., schools teach to tests; sales teams chase volume over margin). Counter by rotating metrics, tracking leading and lagging indicators, and measuring diverse signals simultaneously.", "origin": "Charles Goodhart, Bank of England economist, 1975; formally stated in monetary policy context.", "connects_to": ["Second-Order Thinking", "Incentives", "Pareto Principle", "Map Is Not the Territory"], "source_url": "https://modelthinkers.com/mental-model/goodharts-law"}, {"name": "Reference Class Forecasting", "category": "decision-making", "one_liner": "Anchor estimates on the actual distribution of outcomes for similar past projects, not your inside-view narrative.", "problem": "The planning fallacy causes systematic underestimation of costs and timelines due to optimistic inside-view thinking.", "how_it_works": "Identify a reference class of comparable past projects. Compile the actual distribution of outcomes (cost, duration, success rate). Position your project within that distribution based on its characteristics. Use that base rate as your forecast anchor before adjusting for specific differences. Counter-acts optimism bias structurally.", "origin": "Daniel Kahneman and Amos Tversky (planning fallacy, 1979); Reference Class Forecasting developed by Bent Flyvbjerg for infrastructure projects; adopted by UK Treasury as standard practice.", "connects_to": ["Probabilistic Thinking", "Bayesian Updating", "Margin of Safety", "Pre-Mortem"], "source_url": "https://en.wikipedia.org/wiki/Reference_class_forecasting"}, {"name": "Confirmation Bias", "category": "cognitive-bias", "one_liner": "The tendency to seek, notice, and remember information that confirms existing beliefs while ignoring disconfirming evidence.", "problem": "Decisions based on selectively filtered information appear well-supported but systematically ignore the strongest counter-evidence.", "how_it_works": "Awareness: label the bias when you feel high certainty. Countermeasures: (1) actively seek disconfirming evidence, (2) consider the pre-mortem, (3) appoint a devil's advocate, (4) use reference class forecasting for estimates, (5) separate information gathering from evaluation. Research shows it has the most significant detrimental effect on decision outcomes of all cognitive biases.", "origin": "Peter Wason, 1960 (Wason selection task); named and studied extensively by Kahneman, Tversky, and the behavioral economics tradition.", "connects_to": ["Bayesian Updating", "Ladder of Inference", "Steel-Manning", "Pre-Mortem"], "source_url": "https://thedecisionlab.com/biases/confirmation-bias"}, {"name": "Loss Aversion", "category": "cognitive-bias", "one_liner": "Losses feel roughly twice as painful as equivalent gains feel good \u2014 causing risk-avoidance even at positive expected value.", "problem": "Decisions are distorted by asymmetric emotional weighting of losses vs. gains; people reject positive-EV bets and hold losing positions too long.", "how_it_works": "Recognize when a decision is being evaluated through a loss frame vs. gain frame. Reframe choices in expected-value terms. Apply the 'outside view': would a neutral observer accept this bet? Use pre-commitment devices to override loss-aversion in investing and long-term planning. Pair with Sunk Cost Awareness.", "origin": "Daniel Kahneman and Amos Tversky, Prospect Theory (1979); Nobel Prize in Economics awarded to Kahneman, 2002.", "connects_to": ["Sunk Cost Awareness", "Expected Value", "Status Quo Bias", "Regret Minimization Framework"], "source_url": "https://en.wikipedia.org/wiki/Loss_aversion"}, {"name": "Parkinson's Law", "category": "productivity", "one_liner": "Work expands to fill the time available for its completion.", "problem": "Without tight constraints, tasks inflate in complexity and duration, consuming all allocated time regardless of actual requirement.", "how_it_works": "Set artificially tight deadlines for tasks, slightly shorter than comfortable. The constraint forces prioritization of essential work over perfectionism and low-value elaboration. Combines powerfully with the Pareto Principle: limit time to the 20% of effort that produces 80% of value.", "origin": "C. Northcote Parkinson, 'The Economist' (1955); satirical observation about bureaucracy that proved empirically accurate.", "connects_to": ["Pareto Principle", "Eisenhower Matrix", "Impact-Effort Matrix"], "source_url": "https://bramlettpartners.com/blog/the-pareto-principle-parkinsons-law"}, {"name": "Scenario Planning", "category": "strategic-thinking", "one_liner": "Develop multiple coherent narratives of alternative futures to stress-test strategy against uncertainty.", "problem": "Single-point forecasts create false certainty; strategy built on one assumed future is brittle when reality diverges.", "how_it_works": "Identify key uncertainties. Build 3\u20134 distinct but plausible future scenarios varying along those uncertainties (not best/worst \u2014 qualitatively different). Test current strategy against each scenario. Identify robust moves (work across all scenarios) and hedges (protect against specific scenarios). Update as signals emerge.", "origin": "Pierre Wack and Ted Newland at Shell (1970s); later developed by Peter Schwartz at GBN. Academic roots in Herman Kahn's work at RAND.", "connects_to": ["Second-Order Thinking", "Cynefin Framework", "Pre-Mortem", "Probabilistic Thinking"], "source_url": "https://fiveable.me/improvisational-leadership/unit-8/decision-trees-scenario-planning/study-guide/Cm5XW3PyNL2lDaCW"}, {"name": "Decision Tree", "category": "decision-making", "one_liner": "Map a branching sequence of choices and chance events with probabilities and payoffs to identify the highest expected-value path.", "problem": "Sequential decisions under uncertainty are too complex to reason about intuitively; the interactions of choices and probabilities escape working memory.", "how_it_works": "Draw a tree: square nodes for decisions, circular nodes for chance events. Assign probabilities to chance branches and payoffs to terminal nodes. Fold back by replacing chance nodes with expected values, then choose the highest-value decision branch. Enables 'roll-back' analysis and sensitivity testing.", "origin": "Operations research origins, 1950s\u201360s; Howard Raiffa and Robert Schlaifer at Harvard Business School formalized decision analysis.", "connects_to": ["Expected Value", "Scenario Planning", "Probabilistic Thinking", "Cynefin Framework"], "source_url": "https://modelthinkers.com/mental-model/decision-tree"}, {"name": "Abstraction Laddering", "category": "problem-solving", "one_liner": "Reframe any problem by moving up (Why?) to broader purpose or down (How?) to concrete alternatives.", "problem": "Teams get stuck solving the wrong problem because they treat the first problem statement as fixed.", "how_it_works": "Place the current problem in the middle of a vertical ladder. Ask 'Why?' to climb to more abstract framings (expanding the solution space). Ask 'How?' to descend toward concrete implementations (finding alternative approaches). Run until a more useful problem statement emerges.", "origin": "Design thinking methodology; documented by Wes O'Haire at Dropbox/Autodesk; featured prominently on Untools.", "connects_to": ["First Principles Thinking", "Issue Trees", "Inversion", "Concept Fan"], "source_url": "https://untools.co/abstraction-laddering/"}, {"name": "Issue Trees (Logic Trees)", "category": "problem-solving", "one_liner": "Decompose a complex problem into a MECE hierarchy of sub-problems to enable divide-and-conquer solving.", "problem": "Large problems feel intractable because they lack structure; important sub-issues get missed or double-counted.", "how_it_works": "Draw the problem as the trunk. Branch into MECE categories (mutually exclusive, collectively exhaustive). For diagnosis use 'Why?' branches (problem tree); for solutions use 'How might we?' branches (solution tree). Apply 80/20 rule to prioritize the highest-impact branches.", "origin": "Consulting methodology; codified by McKinsey & Company and Barbara Minto's Pyramid Principle (1970s). MECE principle attributed to Barbara Minto.", "connects_to": ["MECE Principle", "First Principles Thinking", "Abstraction Laddering", "Five Whys", "Minto Pyramid"], "source_url": "https://untools.co/issue-trees/"}, {"name": "MECE Principle", "category": "problem-solving", "one_liner": "Structure any set of ideas or problem categories so they are Mutually Exclusive and Collectively Exhaustive.", "problem": "Poorly structured analysis leads to gaps (missed causes) or overlaps (double-counting), producing flawed conclusions.", "how_it_works": "When decomposing a problem or argument, verify each item: (1) no two items overlap (mutually exclusive) and (2) all items together cover the whole space (collectively exhaustive). Apply to issue trees, slide structures, option sets.", "origin": "Barbara Minto, first female MBA at McKinsey & Company, developed it in the 1960s\u201370s; published in The Pyramid Principle (1985). Traces conceptually to Aristotle.", "connects_to": ["Issue Trees", "Minto Pyramid", "Problem Decomposition"], "source_url": "https://www.mckinsey.com/alumni/news-and-events/global-news/alumni-news/barbara-minto-mece-i-invented-it-so-i-get-to-say-how-to-pronounce-it"}, {"name": "Five Whys", "category": "problem-solving", "one_liner": "Repeatedly ask 'Why?' (typically five times) to drill past symptoms to the root cause of a problem.", "problem": "Addressing only visible symptoms leaves the underlying cause intact, so problems recur.", "how_it_works": "State the problem. Ask 'Why does this happen?' Record the answer. Ask 'Why?' again about that answer. Repeat until you reach a cause that is actionable and foundational \u2014 usually within five iterations. Works best as a focused drill, not a branching tree.", "origin": "Developed by Sakichi Toyoda; popularized by Taiichi Ohno as part of the Toyota Production System in the 1950s.", "connects_to": ["Fishbone Diagram", "Root Cause Analysis", "First Principles Thinking", "Issue Trees"], "source_url": "https://en.wikipedia.org/wiki/Five_whys"}, {"name": "Fishbone Diagram (Ishikawa / Cause-and-Effect Diagram)", "category": "problem-solving", "one_liner": "Visually map all potential causes of a problem across standard categories to reveal root causes.", "problem": "Teams focus on the most obvious causes and miss systemic or multi-category contributors to a problem.", "how_it_works": "Draw the effect (problem) as the fish head on the right. Draw a spine. Add major cause categories as bones (commonly: People, Process, Equipment, Materials, Environment, Management). Brainstorm sub-causes for each bone. Use the diagram to prioritize which causes to investigate further.", "origin": "Created by Kaoru Ishikawa, Japanese quality engineer, in the 1960s for Kawasaki shipyards. One of the seven basic tools of quality control.", "connects_to": ["Five Whys", "Root Cause Analysis", "Pareto Principle"], "source_url": "https://en.wikipedia.org/wiki/Ishikawa_diagram"}, {"name": "TRIZ (Theory of Inventive Problem Solving)", "category": "problem-solving", "one_liner": "Resolve engineering contradictions using patterns distilled from analysis of millions of patents.", "problem": "Technical innovation is treated as random inspiration; TRIZ makes invention systematic by mapping contradictions to proven solution patterns.", "how_it_works": "1) Define the specific problem. 2) Identify the technical or physical contradiction (improving parameter X worsens Y). 3) Consult the Contradiction Matrix to find relevant Inventive Principles. 4) Apply the principle via analogy to your problem. Also includes ARIZ (algorithm for inventive problem solving) for harder problems.", "origin": "Genrich Altshuller, Soviet inventor and engineer, starting in 1946; derived from analysis of 400,000+ patents. Formalized 40 Inventive Principles and a Contradiction Matrix.", "connects_to": ["Morphological Analysis (Zwicky Box)", "Analogical Thinking", "Design Thinking", "Constraint Relaxation"], "source_url": "https://psynso.com/triz/"}, {"name": "SCAMPER", "category": "creativity", "one_liner": "Apply seven lenses (Substitute, Combine, Adapt, Modify, Put to other uses, Eliminate, Reverse) to generate ideas from an existing product or process.", "problem": "Blank-slate brainstorming is hard; SCAMPER gives concrete prompts to systematically explore variations of something that already exists.", "how_it_works": "Take an existing idea, product, or process. Run each SCAMPER question: What can be Substituted? Combined with something else? Adapted from elsewhere? Modified/Magnified? Put to other uses? Eliminated? Reversed or Rearranged? Each prompt forces a different creative angle.", "origin": "Checklist originating in Alex Osborn's Applied Imagination (1953); refined and named SCAMPER by Bob Eberle in his 1971 book SCAMPER: Games for Imagination Development.", "connects_to": ["Lateral Thinking", "Morphological Analysis (Zwicky Box)", "Brainstorming", "Design Thinking"], "source_url": "https://en.wikipedia.org/wiki/SCAMPER"}, {"name": "Lateral Thinking", "category": "creativity", "one_liner": "Escape dominant thought patterns by deliberately introducing disruptions, provocations, and indirect approaches.", "problem": "Vertical (logical) thinking digs deeper in the same direction; when the problem requires a different framing entirely, logic alone cannot escape the rut.", "how_it_works": "Use four core techniques: (1) Provocation \u2014 state a deliberately absurd 'PO' statement to jar loose assumptions; (2) Random Entry \u2014 introduce a random word/image to force unexpected associations; (3) Concept Fan \u2014 branch the problem up and sideways to find alternative framings; (4) Multiple Perspectives \u2014 force the point of view of different stakeholders. Move idea fragments toward workable solutions.", "origin": "Edward de Bono, Maltese physician and psychologist, coined the term in his 1967 book The Use of Lateral Thinking.", "connects_to": ["Concept Fan", "Six Thinking Hats", "SCAMPER", "Reframing", "Constraint Relaxation"], "source_url": "https://en.wikipedia.org/wiki/Lateral_thinking"}, {"name": "Morphological Analysis (Zwicky Box)", "category": "creativity", "one_liner": "Map all possible combinations of independent problem dimensions in a matrix to systematically generate novel solutions.", "problem": "Conventional brainstorming stays near familiar solutions; morphological analysis forces exhaustive exploration of the entire solution space by combining dimensions that are never normally paired.", "how_it_works": "1) Identify 3\u20136 independent dimensions/parameters of the problem (e.g., target audience, delivery method, pricing model). 2) List 3\u20136 values for each dimension. 3) Systematically select one value per dimension to generate combinations \u2014 including counterintuitive ones. 4) Evaluate promising combinations.", "origin": "Fritz Zwicky, Swiss astrophysicist at Caltech, developed morphological analysis in the 1940s while working on jet and rocket propulsion.", "connects_to": ["SCAMPER", "TRIZ", "Design Thinking", "Divergent Thinking"], "source_url": "https://untools.co/zwicky-box/"}, {"name": "Design Thinking", "category": "problem-solving", "one_liner": "Solve problems through iterative human-centered cycles of empathy, problem definition, ideation, prototyping, and testing.", "problem": "Solutions designed without deep understanding of user needs fail in adoption; Design Thinking grounds innovation in real human context before investing in building.", "how_it_works": "Five non-linear stages: (1) Empathize \u2014 observe and interview users; (2) Define \u2014 synthesize insights into a clear problem statement; (3) Ideate \u2014 generate many solutions without judgment; (4) Prototype \u2014 build cheap, testable artifacts; (5) Test \u2014 gather feedback and iterate. Stages repeat non-sequentially.", "origin": "Methodology developed and popularized by IDEO (David Kelley) and Stanford d.school from the 1990s; formalized in the Double Diamond by British Design Council in 2005.", "connects_to": ["Double Diamond", "Divergent/Convergent Thinking", "Empathy Map", "Brainstorming", "Prototyping"], "source_url": "https://ixdf.org/literature/topics/design-thinking"}, {"name": "Double Diamond", "category": "problem-solving", "one_liner": "Apply two diverge-converge cycles: one to discover and define the right problem, another to develop and deliver the right solution.", "problem": "Teams jump to solutions before validating they are solving the right problem, wasting effort on well-executed answers to the wrong question.", "how_it_works": "Diamond 1 (Problem space): Discover broadly (diverge), then Define the core problem (converge). Diamond 2 (Solution space): Develop many options (diverge), then Deliver the best solution (converge). Each diamond is a deliberate expansion then narrowing of thinking.", "origin": "British Design Council, 2005, adapted from B\u00e9la H. B\u00e1n\u00e1thy's 1996 divergence-convergence model, which itself traces to Alex Osborn/Sidney Parnes CPS process of the 1950s\u201360s.", "connects_to": ["Design Thinking", "Divergent/Convergent Thinking", "CPS Model"], "source_url": "https://en.wikipedia.org/wiki/Double_Diamond_(design_process_model)"}, {"name": "Divergent / Convergent Thinking", "category": "creativity", "one_liner": "Generate many possible solutions (diverge) then systematically narrow to the best option (converge).", "problem": "Mixing idea generation with evaluation simultaneously kills creative options prematurely; separating modes improves both quality and quantity of solutions.", "how_it_works": "Divergent phase: defer judgment, generate fluently and flexibly, pursue originality and elaboration, volume over quality. Convergent phase: apply criteria, evaluate systematically, select and refine. Use alternating cycles rather than one pass each.", "origin": "J.P. Guilford introduced the divergent/convergent distinction in his Structure of Intellect model (1956). Operationalized as a process principle by Osborn and Parnes in the CPS model (1950s\u20131960s).", "connects_to": ["CPS Model", "Double Diamond", "Design Thinking", "Brainstorming", "SCAMPER"], "source_url": "https://www.cogn-iq.org/guilford-divergent-convergent-thinking.php"}, {"name": "Creative Problem Solving (CPS) Model", "category": "creativity", "one_liner": "Structured six-stage process alternating divergent and convergent thinking to move from fuzzy situations to creative, actionable solutions.", "problem": "Unstructured creativity produces ideas that cannot be implemented; unstructured analysis kills creativity. CPS provides a container for both.", "how_it_works": "Six stages: Mess-Finding (identify challenge), Fact-Finding (gather data), Problem-Finding (reframe the problem), Idea-Finding (generate options), Solution-Finding (evaluate and strengthen), Acceptance-Finding (plan implementation). Each stage opens wide (diverge) then narrows (converge) before moving to the next.", "origin": "Alex Osborn (Applied Imagination, 1953) and Sidney Parnes (1967 onward). Expanded by Isaksen & Treffinger (1985). Now stewarded by the Creative Problem Solving Group.", "connects_to": ["Divergent/Convergent Thinking", "Brainstorming", "SCAMPER", "Double Diamond"], "source_url": "https://www.mycoted.com/Creative_Problem_Solving_-_CPS"}, {"name": "Root Cause Analysis", "category": "problem-solving", "one_liner": "Systematically trace a problem backwards from symptoms to the foundational cause that, if fixed, prevents recurrence.", "problem": "Treating symptoms wastes resources and allows problems to return; RCA finds the deepest fixable cause.", "how_it_works": "1) Define the problem precisely. 2) Collect data about when, where, how the problem occurs. 3) Identify all possible causes (e.g., via Fishbone). 4) Drill down using Five Whys. 5) Identify the root cause \u2014 the deepest cause that is actionable. 6) Implement a fix and verify the problem does not recur.", "origin": "Emerged from industrial quality management in the early 20th century; formalized through Toyota Production System. No single inventor \u2014 an umbrella for Five Whys, Fishbone, Fault Tree Analysis, etc.", "connects_to": ["Five Whys", "Fishbone Diagram", "Issue Trees", "First Principles Thinking"], "source_url": "https://online.hbs.edu/blog/post/root-cause-analysis"}, {"name": "Concept Fan", "category": "creativity", "one_liner": "Expand the solution space by re-stating the problem at progressively broader levels until new solution branches appear.", "problem": "Teams exhaust solutions at one level of abstraction without realizing a slight problem re-framing would reveal entirely different options.", "how_it_works": "Place the current problem in the center. To the right, generate specific solutions. If stuck, move left \u2014 restate the problem more broadly (ask 'Why are we trying to do this?'). From the broader statement, fan out new solution branches. Repeat the leftward move if still stuck.", "origin": "Edward de Bono, described in Serious Creativity (1992).", "connects_to": ["Lateral Thinking", "Abstraction Laddering", "Six Thinking Hats", "Reframing"], "source_url": "https://www.funblocks.net/thinking-matters/classic-mental-models/concept-fan"}, {"name": "Mind Mapping", "category": "creativity", "one_liner": "Radiate ideas visually from a central topic using branches, colors, and images to mirror the brain's associative structure.", "problem": "Linear note-taking suppresses associative thinking; mind maps externalize how the brain actually connects and generates ideas.", "how_it_works": "Write the central concept in the middle. Draw branches for main sub-topics. Add sub-branches for details. Use keywords only (not sentences), colors per branch, and images where possible. The non-linear structure lets you see connections and gaps across the whole idea space simultaneously.", "origin": "Tony Buzan, coined the term and popularized it on his BBC TV series 'Use Your Head' in 1974, drawing on radiant thinking, Leonardo da Vinci's notebooks, and Joseph Novak's concept mapping.", "connects_to": ["Brainstorming", "Divergent/Convergent Thinking", "Concept Map", "Problem Decomposition"], "source_url": "https://mind-map.com/tony-buzan-the-man-who-invented-the-mind-map/"}, {"name": "Synectics", "category": "creativity", "one_liner": "Use four types of analogy (personal, direct, symbolic, fantasy) to make the familiar strange and the strange familiar, unlocking creative breakthroughs.", "problem": "Problems become invisible when they are too familiar; analogies from distant domains force re-perception of the problem structure.", "how_it_works": "Apply four analogy mechanisms: (1) Personal analogy \u2014 embody the problem (be the gear, be the bacteria); (2) Direct analogy \u2014 find a parallel in nature or other domains; (3) Symbolic analogy \u2014 create a compressed poetic image of the problem; (4) Fantasy analogy \u2014 wish for impossible solutions, then ask what principle makes them work. Map insights back to the real problem.", "origin": "William J.J. Gordon, Synectics Inc., 1961. Documented in Synectics: The Development of Creative Capacity (1961).", "connects_to": ["Lateral Thinking", "Analogical Thinking", "TRIZ", "Brainstorming"], "source_url": "https://en.wikipedia.org/wiki/Synectics"}, {"name": "Analogical Thinking", "category": "creativity", "one_liner": "Transfer a solution structure from a well-understood source domain to solve a problem in an unfamiliar target domain.", "problem": "Novel problems lack obvious solution templates; analogies borrow proven structures from different domains to create a starting point.", "how_it_works": "1) Identify the core structure or mechanism of the problem. 2) Find a domain where a similar structural relationship has been solved (nature, history, another industry). 3) Extract the solution mechanism. 4) Map it back, adapting for the differences. Requires abstracting away surface details to see structural similarity.", "origin": "Ancient reasoning technique; formalized in cognitive science by Dedre Gentner's Structure-Mapping Theory (1983). Used as the basis for Synectics and TRIZ.", "connects_to": ["Synectics", "TRIZ", "First Principles Thinking", "Biomimicry"], "source_url": "https://larrygmaguire.com/analogical-thinking/"}, {"name": "Constraint Relaxation", "category": "problem-solving", "one_liner": "Temporarily remove or loosen assumed constraints to explore a wider solution space, then re-impose constraints to narrow to practical solutions.", "problem": "Perceived constraints (often self-imposed mental ones, not real ones) artificially narrow the solution space, causing impasse.", "how_it_works": "List all constraints you believe apply to the problem. For each constraint, ask: 'Is this actually fixed, or is it an assumption?' Temporarily relax one or more constraints. Solve the simpler/unconstrained version. Then selectively re-impose constraints to bring the solution back to feasibility.", "origin": "Cognitive psychology research by Ohlsson (1992) on insight problem-solving via Representational Change Theory. Popularized in books such as Algorithms to Live By.", "connects_to": ["Reframing", "First Principles Thinking", "TRIZ", "Lateral Thinking"], "source_url": "https://www.mindmax.me/thinking-matters/classic-mental-models/constraint-relaxation"}, {"name": "Reframing", "category": "problem-solving", "one_liner": "Deliberately shift the problem definition or context to change what solutions become visible.", "problem": "The way a problem is framed determines which solutions are conceivable; a poor frame makes the right solution invisible.", "how_it_works": "Question the problem statement itself: Who defined it this way? What assumptions are embedded? What if the goal were different? What would someone in a different role or culture see? Generate 2\u20133 alternative framings, then select the most productive one to work on. Often more valuable than solving the original problem faster.", "origin": "Rooted in cognitive therapy (Aaron Beck, 1960s) and NLP. In problem-solving contexts, developed through Design Thinking and Abstraction Laddering.", "connects_to": ["Abstraction Laddering", "Concept Fan", "Constraint Relaxation", "Lateral Thinking", "First Principles Thinking"], "source_url": "https://untools.co/abstraction-laddering/"}, {"name": "Productive Thinking Model", "category": "problem-solving", "one_liner": "Six-step structured creative problem-solving process from situation understanding to execution.", "problem": "Ad-hoc problem-solving skips critical phases (defining success, formulating the right questions) and produces solutions that do not stick.", "how_it_works": "Six sequential steps: (1) What's going on? (understand situation, impacts, desired future); (2) What's success? (DRIVE framework: Do/Restrictions/Invest/Values/Essentials); (3) What's the question? (formulate catalytic 'How might we?' questions); (4) Generate answers (brainstorm broadly); (5) Forge the solution (evaluate against success criteria, refine); (6) Align resources (who, what, when for execution).", "origin": "Tim Hurson, Think Better: An Innovator's Guide to Productive Thinking (2007).", "connects_to": ["Design Thinking", "CPS Model", "First Principles Thinking", "Issue Trees"], "source_url": "https://untools.co/productive-thinking-model/"}, {"name": "Brainstorming", "category": "creativity", "one_liner": "Generate a large quantity of uncensored ideas in a group by deferring all judgment during the generation phase.", "problem": "Self-censorship and social pressure kill ideas before they can be evaluated; brainstorming separates generation from judgment.", "how_it_works": "Four rules: (1) Defer judgment \u2014 no criticism during generation; (2) Go for quantity \u2014 more ideas increases the odds of a good one; (3) Build on others' ideas; (4) Welcome wild ideas. After the session, converge by grouping, voting, and evaluating.", "origin": "Alex Osborn, advertising executive, introduced the term in Applied Imagination (1953).", "connects_to": ["Divergent/Convergent Thinking", "SCAMPER", "Mind Mapping", "Brainwriting", "CPS Model"], "source_url": "https://www.strategiclearning.asia/creative-thinking-tools/"}, {"name": "Retrograde Analysis (Working Backwards)", "category": "problem-solving", "one_liner": "Start from the desired end state and reason backwards to determine the path or preconditions that lead to it.", "problem": "Forward-planning from the present has too many branching paths; working backwards from a fixed goal prunes the search space dramatically.", "how_it_works": "1) Clearly define the desired outcome. 2) Ask: 'What must be true immediately before this outcome for it to occur?' 3) Repeat the question for each prior state. 4) Continue until you reach the current state. The chain of backward steps becomes the forward action plan.", "origin": "Chess endgame analysis technique; popularized for general problem-solving by Farnam Street and chess grandmaster Maurice Ashley. Related to backward induction in game theory.", "connects_to": ["Inversion", "Pre-mortem", "First Principles Thinking", "Issue Trees"], "source_url": "https://fs.blog/working-backward-to-solve-problems/"}, {"name": "Problem Decomposition", "category": "problem-solving", "one_liner": "Split a large problem into smaller, independently solvable sub-problems.", "problem": "Complex problems are cognitively overwhelming as a whole; decomposition makes each piece tractable and assignable.", "how_it_works": "Identify natural boundaries in the problem (by domain, time, actor, cause type). Break it along those boundaries so each piece can be solved without requiring the others to be solved first (or with minimal dependency). Solve parts in parallel or sequence. Integrate solutions back into a coherent whole.", "origin": "Fundamental computer science principle (divide and conquer algorithms, Knuth); also core to McKinsey consulting methodology and systems engineering.", "connects_to": ["Issue Trees", "MECE Principle", "Mind Mapping", "Abstraction Laddering"], "source_url": "https://untools.co/issue-trees/"}, {"name": "Empathy Map", "category": "problem-solving", "one_liner": "Build a shared understanding of a user by capturing what they Think, Feel, Say, and Do in a given context.", "problem": "Teams build solutions based on assumptions about users rather than genuine insight into their experience, needs, and pain points.", "how_it_works": "Draw four quadrants: Says (direct quotes), Thinks (beliefs, concerns not voiced), Does (observable actions), Feels (emotional state). Fill in from user research. Add Pains and Gains below. Use to challenge internal assumptions and ground ideation in real user reality.", "origin": "Dave Gray, founder of XPLANE, created the Empathy Map; widely adopted within Design Thinking practice at IDEO and Stanford d.school.", "connects_to": ["Design Thinking", "Jobs to Be Done", "Persona", "User Story Mapping"], "source_url": "https://www.strategiclearning.asia/creative-thinking-tools/"}, {"name": "Reverse Brainstorming", "category": "creativity", "one_liner": "Generate ideas by asking how to cause or worsen a problem, then invert those ideas into solutions.", "problem": "Direct brainstorming hits a wall; inverting the question ('how do we make this worse?') is psychologically easier and often generates more original insights.", "how_it_works": "1) Invert the problem: 'How could we make this problem worse?' or 'How could we guarantee failure?' 2) Generate freely without judgment. 3) Reverse each idea to its opposite. 4) Evaluate the reversed ideas as potential real solutions. Combines the benefit of Inversion with the generative energy of brainstorming.", "origin": "No single inventor; emerged as a creativity technique in innovation and education contexts. Combines Osborn's brainstorming with inversion thinking.", "connects_to": ["Brainstorming", "Inversion", "SCAMPER", "Lateral Thinking"], "source_url": "https://www.strategiclearning.asia/creative-thinking-tools/"}, {"name": "Ishikawa Conflict Resolution Diagram (Evaporating Cloud)", "category": "problem-solving", "one_liner": "Surface the hidden assumption underlying a conflict between two apparently incompatible requirements, then invalidate it to find a win-win.", "problem": "Conflicts that appear to be dilemmas (A vs B) often rest on an unstated assumption; surfacing and challenging that assumption dissolves the conflict rather than forcing a compromise.", "how_it_works": "Map: Objective \u2192 Need A \u2192 Want A; Objective \u2192 Need B \u2192 Want B; Want A conflicts with Want B. Enumerate all assumptions linking each arrow. Challenge each assumption \u2014 finding even one false assumption evaporates the conflict and opens a solution that satisfies both needs.", "origin": "Eliyahu M. Goldratt, Theory of Constraints, introduced as the 'Evaporating Cloud' in The Goal (1984) and It's Not Luck (1994). Untools lists it as Conflict Resolution Diagram.", "connects_to": ["Issue Trees", "First Principles Thinking", "Constraint Relaxation", "Inversion"], "source_url": "https://untools.co/conflict-resolution-diagram/"}, {"name": "Delphi Method", "category": "problem-solving", "one_liner": "Achieve expert group consensus through iterative anonymous questionnaires with controlled feedback, eliminating social pressure biases.", "problem": "Group meetings let dominant voices suppress minority expert views; anonymity and iteration allow genuine independent judgment to surface.", "how_it_works": "1) Select a panel of experts. 2) Distribute a questionnaire and collect independent responses. 3) Aggregate and anonymize responses; share summary with the panel. 4) Allow revision in light of others' reasoning. 5) Repeat until consensus stabilizes. Results reflect genuine expert judgment, not social conformity.", "origin": "Developed by Olaf Helmer and Norman Dalkey at RAND Corporation in the 1950s for military forecasting applications.", "connects_to": ["Brainstorming", "Nominal Group Technique", "Decision Matrix"], "source_url": "https://www.strategiclearning.asia/creative-thinking-tools/"}, {"name": "Reinforcing Feedback Loop", "category": "systems-thinking", "one_liner": "A self-amplifying cycle where change in one variable drives more change in the same direction, producing exponential growth or collapse.", "problem": "Explains why small advantages compound into dominance, and why vicious/virtuous cycles are hard to escape.", "how_it_works": "Variable A increases \u2192 causes B to increase \u2192 B increases A further. The loop has no natural ceiling unless a balancing loop intervenes. Direction matters: reinforcing loops can drive growth (virtuous) or decay (vicious).", "origin": "Jay Forrester, MIT System Dynamics Group, 1950s\u201360s; popularized by Peter Senge in The Fifth Discipline (1990).", "connects_to": ["Balancing Feedback Loop", "Limits to Growth Archetype", "Tipping Point", "Network Effects (Metcalfe's Law)", "Stock and Flow"], "source_url": "https://untools.co/systems-thinking/"}, {"name": "Balancing Feedback Loop", "category": "systems-thinking", "one_liner": "A self-correcting cycle that pushes a system back toward a goal or equilibrium when it deviates.", "problem": "Explains why systems resist change, why policies often underperform, and how homeostasis works.", "how_it_works": "Compares current state to a desired goal; the gap drives corrective action. Negative feedback: if temperature > target, cool down. When balancing loops are weak or slow, systems overshoot. Delay in the loop causes oscillation.", "origin": "Norbert Wiener (cybernetics, 1948); Jay Forrester system dynamics; foundational to control theory.", "connects_to": ["Reinforcing Feedback Loop", "Balancing Process with Delay Archetype", "Leverage Points", "Homeostasis"], "source_url": "https://untools.co/systems-thinking/"}, {"name": "Stock and Flow", "category": "systems-thinking", "one_liner": "Stocks are accumulations (bathtub water); flows are rates of change (faucet, drain) \u2014 the two building blocks of every dynamic system.", "problem": "Makes visible what accumulates and what moves in a system, preventing confusion between levels and rates.", "how_it_works": "A stock = current quantity (people, money, CO2). Inflows add to it; outflows deplete it. Stocks change only via flows \u2014 they cannot jump instantly. This creates delays that make systems counterintuitive. Draw the stock-flow diagram before intervening.", "origin": "Jay Wright Forrester, Industrial Dynamics (1961). Hydraulic metaphor: water in reservoirs connected by pipes.", "connects_to": ["Causal Loop Diagrams", "Delays", "Leverage Points", "Feedback Loops"], "source_url": "https://pmresearcher.substack.com/p/the-mental-models-of-systems-thinking"}, {"name": "Causal Loop Diagram (CLD)", "category": "systems-thinking", "one_liner": "A visual map of cause-and-effect relationships showing feedback loops within a system.", "problem": "Makes hidden system structure visible before intervening; prevents linear thinking in non-linear systems.", "how_it_works": "Draw variables as nodes. Connect them with arrows labeled + (same direction) or \u2013 (opposite direction). Identify loops: even number of \u2013 signs = reinforcing loop; odd number = balancing loop. Reading the diagram reveals where leverage lies.", "origin": "Emerged from system dynamics; formalized by Donella Meadows and colleagues. Popularized via Peter Senge's Fifth Discipline (1990).", "connects_to": ["Stock and Flow", "System Archetypes", "Feedback Loops", "Leverage Points"], "source_url": "https://www.semanticscholar.org/paper/Developing-System-Dynamics-Models-from-Causal-Loop-Binder-Vox/cf00b9084b05ba357bf0c5fa7a5b9cc1b5695015"}, {"name": "Leverage Points", "category": "systems-thinking", "one_liner": "Donella Meadows' 12-level hierarchy of places to intervene in a system, ranked from least (parameters) to most effective (paradigms).", "problem": "Tells you where to focus effort for maximum impact in a complex system; prevents wasting resources on low-leverage interventions.", "how_it_works": "12 levels from weakest to strongest: 12. Parameters/numbers \u2192 11. Buffer sizes \u2192 10. Physical structure \u2192 9. Delays \u2192 8. Balancing loops \u2192 7. Reinforcing loops \u2192 6. Information flows \u2192 5. Rules \u2192 4. Self-organization \u2192 3. Goals \u2192 2. Paradigms \u2192 1. Transcending paradigms. Most people intervene at level 12; highest leverage is changing goals and paradigms.", "origin": "Donella H. Meadows, 'Leverage Points: Places to Intervene in a System' (1999), Donella Meadows Project.", "connects_to": ["Causal Loop Diagrams", "Stock and Flow", "Feedback Loops", "Iceberg Model", "System Archetypes"], "source_url": "https://donellameadows.org/archives/leverage-points-places-to-intervene-in-a-system/"}, {"name": "Iceberg Model", "category": "systems-thinking", "one_liner": "A four-level framework that reveals root causes by moving from visible events down through patterns, structures, and mental models.", "problem": "Reactive thinking treats symptoms (events) while root causes (structures and mental models) remain invisible and unchanged.", "how_it_works": "Level 1 (tip): Events \u2014 what happened? Level 2: Patterns \u2014 what trends recur? Level 3: Structures \u2014 what feedback loops/incentives create patterns? Level 4 (deepest): Mental models \u2014 what beliefs/assumptions created these structures? Intervening at level 4 produces lasting change.", "origin": "Systems thinking tradition; popularized by Peter Senge and associates at MIT. Widely used in organizational learning.", "connects_to": ["Leverage Points", "Causal Loop Diagrams", "System Archetypes", "Mental Models (Senge)", "Second-Order Thinking"], "source_url": "https://untools.co/systems-thinking/"}, {"name": "Connection Circles", "category": "systems-thinking", "one_liner": "A visual tool that maps relationships between system elements to expose feedback loops and interdependencies.", "problem": "Difficulty seeing how elements of a system or story relate and create circular causality.", "how_it_works": "Write key variables in a circle. Draw arrows between elements that influence each other, labeling direction of effect. When arrows form loops back to starting elements, you have identified feedback loops. Especially useful for teams to build shared system understanding.", "origin": "Systems thinking education; attributed to Waters Foundation systems thinking in schools program.", "connects_to": ["Causal Loop Diagrams", "Feedback Loops", "Stock and Flow"], "source_url": "https://untools.co/systems-thinking/"}, {"name": "Limits to Growth Archetype", "category": "systems-thinking", "one_liner": "A reinforcing growth loop eventually encounters a constraint that slows or reverses growth, regardless of how hard you push.", "problem": "Explains why growth initiatives plateau and why pushing harder on the original strategy makes things worse.", "how_it_works": "Reinforcing loop drives initial growth. As performance increases, it strains a limiting factor (capacity, resources, quality). The limiting factor activates a balancing loop that throttles growth. The fix: address the constraint directly rather than push harder on the growth lever.", "origin": "Peter Senge, The Fifth Discipline (1990). Related to Donella Meadows' Limits to Growth (1972 Club of Rome report).", "connects_to": ["Shifting the Burden Archetype", "Reinforcing Feedback Loop", "Balancing Feedback Loop", "Growth and Underinvestment Archetype"], "source_url": "https://en.wikipedia.org/wiki/System_archetype"}, {"name": "Shifting the Burden Archetype", "category": "systems-thinking", "one_liner": "A symptomatic fix relieves pressure, reducing motivation to solve the root cause, which then worsens \u2014 creating dependency on the fix.", "problem": "Short-term solutions crowd out fundamental solutions, leading to escalating reliance on symptomatic fixes.", "how_it_works": "Problem symptom triggers two balancing loops: one applies a quick fix (symptomatic), one addresses root cause (fundamental). The quick fix works fast but generates a side effect that further weakens the fundamental solution. Over time, the burden shifts to the quick fix. Classic example: organizational fire-fighting vs. process improvement.", "origin": "Peter Senge, The Fifth Discipline (1990); Jay Forrester system dynamics lineage.", "connects_to": ["Fixes That Fail Archetype", "Limits to Growth Archetype", "Reinforcing Feedback Loop", "Iceberg Model"], "source_url": "https://www.saybrook.edu/unbound/systems-archetypes/"}, {"name": "Tragedy of the Commons", "category": "systems-thinking", "one_liner": "Rational individual exploitation of a shared resource destroys the resource for everyone, even when each individual would prefer it to survive.", "problem": "Explains why shared resources degrade without collective governance, and why individual rationality produces collective irrationality.", "how_it_works": "Each actor using a common resource gains full benefit of their use but shares the cost of depletion with everyone. Individually rational to over-use; collectively catastrophic. Multiple reinforcing individual-use loops overpower the balancing resource-recovery loop. Ostrom's solution: establish clear boundaries, monitoring, graduated sanctions, collective choice.", "origin": "Garrett Hardin, Science (1968); extended and challenged by Elinor Ostrom, Governing the Commons (1990) \u2014 Nobel Prize 2009.", "connects_to": ["Prisoner's Dilemma", "Free Rider Problem", "Collective Action Problem", "Ostrom's Design Principles", "Reinforcing Feedback Loop"], "source_url": "https://en.wikipedia.org/wiki/System_archetype"}, {"name": "Fixes That Fail Archetype", "category": "systems-thinking", "one_liner": "A quick fix solves a problem symptom immediately but generates delayed unintended consequences that make the original problem worse.", "problem": "Explains why organizations repeatedly apply the same failing solutions, mistaking symptom relief for problem-solving.", "how_it_works": "Fix \u2192 symptom improves (balancing loop). Delay. Unintended consequence emerges \u2192 symptom worsens again (reinforcing loop). More fixes applied. Diagnosis: map the delay and the side effect to see the hidden reinforcing loop. Solution: accept short-term pain to address root cause.", "origin": "Peter Senge, The Fifth Discipline (1990); systems thinker Daniel Kim.", "connects_to": ["Shifting the Burden Archetype", "Cobra Effect", "Unintended Consequences", "Goodhart's Law"], "source_url": "https://www.saybrook.edu/unbound/systems-archetypes/"}, {"name": "Escalation Archetype", "category": "systems-thinking", "one_liner": "Two or more parties respond to each other's threatening actions in a reinforcing cycle that ratchets up conflict or competition.", "problem": "Explains arms races, price wars, and interpersonal conflicts that seem to have a life of th
